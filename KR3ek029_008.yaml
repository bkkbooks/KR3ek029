body:
  text: 卷八疔瘡疔瘡之生膏粱人居其半皆因營衛過滯火毒外發也非獨節候寒溫之失令肅殺瞬息之違和得之故所生之處無一定之部位其症頗多古今稱名不一孫真人分一十五種李東垣分二十三種申啟玄分三十四種其實華元化分五種盡之矣五種者分五臟也稱名多者乃象形而名之也名多反無一定治法不若遵元化五疔為要大凡疔形色赤者心疔也色白者肺疔也色青紫者肝疔也色黃者脾疔也色黑者腎疔也以五色辨五臟以五臟別五疔以五疔分治療又何誤乎雖然各疔之形色病狀亦不可不細晰之也如心疔者俗名火焰疔生於心臟之俞募經井之端或生於唇口手之小指掌中初生一點紅黃小泡振動癢痛非常左右肢體麻木重則發寒發熱心煩意亂頭暈眼花睡臥不安言語昏憒小便短少面紅口渴舌上有珠此乃發於心經之病也如肝疔者俗名紫燕疔生於肝臟部位足大趾之端脅肋之次筋骨之間初生便作青紫之泡次日破流血水三日後串筋爛骨疼痛苦楚重則眼紅目昧指甲純青寒熱交作頭項皆痛口苦脅疼小便艱澀舌強神昏睡語驚惕此乃發於肝經之病也如脾疔者俗名黃鼓疔生於脾臟之部位或生於口角腮顴眼胞上下及太陽正面之處初生黃泡光亮明潤四邊紅赤纏繞不散或麻或癢繃急硬強其症不食寒熱交作重則噁心嘔吐肢體木痛煩悶乾噦此乃發於脾經之病也如肺疔者俗名白刃疔生於肺之部位經絡手之大指初生白泡頂硬根突破流脂水癢痛難熬易腐易陷其症發熱咳嗽重則腮損咽焦毛聳肌熱口吐濃痰鼻掀氣急此乃發於肺經之病也如腎疔者俗名黑靨疔多生於腎經部絡或耳竅胸腹腰腎偏僻之間或生於足之小趾湧泉等穴初生黑斑紫泡毒串皮膚漸攻肌肉頑硬如石痛入骨髓其症寒熱不常日輕夜重面色䵟黑重則手足青紫驚悸沉困軟陷孔深目晴透露此乃發於腎經之病也故見色之黑者即知為腎疔治腎而加解毒去火之味見色之黃者即知為脾疔治脾而加解毒去火之味見色之白者即知為肺疔治肺而加解毒去火之味見色之青紫者即知為肝疔治肝而加解毒去火之味見色之紅赤者即知為心疔治心而加解毒去火之味何疔之不易散哉猶慮五疔之色未可盡據更將各疔之名開列於後以便世人之辨症云麻子疔其狀肉起頭如黍麥之多色稍黑四邊微赤多癢此亦腎疔也石疔其狀皮肉相堅色如黑豆甚硬刺之不入微痛忌針砭亦腎疔也雄疔其狀疱黑四畔仰疱漿起有水出色黃大如錢孔形項高突亦腎疔也雌疔其狀稍黃向里靨亦似灸瘡四面疱漿起心凹色赤如錢孔之形此脾疔也火疔其形如湯火燒燙瘡頭黑靨四邊有煙漿又如赤粟米狀忌灸烙此心疔也爛疔其形色稍黑有白斑瘡潰流膿有大小如匙而此亦腎疔也蛇頭疔又名蛇眼疔其形頭如蛇頭有二目似蛇眼大痛苦甚多生手足指頭上宜取去其眼系而後上藥亦腎疔也鹽膚疔其狀如匙面四邊皆赤有黑粟粒忌食鹽此心疔也水洗疔其狀如錢形有孔瘡頭白里黑靨汁出中間硬忌飲水及水洗此肺疔也刀瘡疔其狀闊狹如薤葉大長一寸左側肉黑如燒烙忌針刺刀割宜藥治之此亦腎疔也浮漚疔其狀曲圓少許不合長而狹如薤葉大內黑外黃黑處刺之不痛黃處則痛此亦腎疔也牛拘疔其狀肉色疱起掐不破無忌縱不治亦不殺人此乃脾疔也乃疔之最輕者豬疔其形圓而小瘡口內有油忌食豬肉此肝疔也牛疔其形圓瘡口內無油疱起掐之不破發寒發熱忌食牛肉此肺疔也狗疔其形長而帶尖色赤發寒熱忌食犬肉此心疔也羊疔其形長而色白有寒熱忌羊肉此肺疔也驢馬疔其形三角頂上有黑點根腳赤色凸頂有寒熱忌食驢馬肉此亦腎疔也瓜藤疔不計其數其形圓長如瓜形因食瓜毒而生忌食瓜亦腎疔也豆腐疔其狀白疱三日內頂陷因食豆腐內有人汗所生麵筋亦然此肺疔也氣疔其形或大或小疱白如有氣於內因感怒恚之氣而生忌氣怒此亦肺疔蓋肺中有毒以制肝木也鬼疔其形亦大小不一色青因中邪毒之氣而生異於諸疔此氣疔夜甚令人言如見鬼狀此肝疔也紅絲疔其形縷縷如絲線周身纏擾如手足上則入心即死宜松針刺去血忌食熱物此心疔也內疔言其疔生於內臟腑上脛裡面喉口內與外疔更不同尤為利害此五臟之疔也蒲桃疔其形黑而兼紫如水晶光亮故名之疱內黑血毒水宜去之此亦腎疔也楊梅疔其形黑紫如熏梅狀如遍體有梅瘡內有一二疔瘡則遍身梅瘡皆不發矣須針刺其毒外泄而梅瘡始不陷內此亦腎疔也魚臍疔其形如魚肚臍之狀多生胳膊肚小腿肚上乃手足太陽經分此肺疔也痘疔有小大之不同出痘之時忽生此小疔則遍身痘瘡皆不起發看其色之何如以分五臟之疔也蜈蚣疔其形長如蜈蚣亦有頭足發寒發熱雖因食蜈蚣所遊之饌而得之亦火毒在肺之故耳治肺而加解毒去火之味外用雄黃錠子或蜒蚰塗之則自安然矣滿大星疔其形黑浮起如黑豆四畔起赤色今日生一顆明日生二顆一日增至三十六不再生此亦腎疔也其毒最橫其疔最凶必須早治若生至三十六數雖有仙丹亦無可如何也以上各疔皆忌房事倘一犯之輕變重重變死矣拔疔散岐天師傳統治諸疔紫花地丁一兩甘菊花一兩水煎服六劑全愈慈姑湯巫彭真君傳統治諸疔神效山慈姑二錢蒼耳子三錢當歸一兩白芷二錢王不留行三錢天花粉三錢水二碗煎水一碗加酒一杯再煎共一杯服之必出汗而愈散疔湯伯高太師傳治諸樣疔瘡紫花地丁一兩連翹三錢夏枯草一兩水煎服一劑即消二劑全愈仙菊飲巫彭真君傳治疔瘡痛甚無論各疔治之皆驗菊花根葉共用二兩生甘草為末三錢將菊花根葉搗汁取白布絞汁再用滾水沖在菊花根內仍用布瀝出汁調生甘草末飲之入口即愈桑花飲巫彭真君傳治各疔神效干桑葉五錢生甘草三錢瓜蔞二錢當歸五錢榆樹皮二錢荊芥二錢紫花地丁五錢水煎汁一碗飢服服後飲酒微醉即散二仙散管勾傳外治一切疔腫惡瘡生礬黃丹等分臨時以三稜針刺血待盡敷之不過三上決愈山海丹太倉公傳專治疔瘡惡瘡海馬一對酒炙黃穿山甲土炒三錢水銀一錢雄黃三錢兒茶三錢麝香一分黃柏五錢為末同水銀再研不見水銀星為度遇瘡生處將藥井水調塗即出毒神效秋葉散岐天師傳治疔毒初起絲瓜葉十片明礬二錢雄黃二錢先將絲瓜葉搗極爛取汁調二味藥末以鵝翎敷疔瘡上隨干隨潤一日即消蔥礬丸衛生寶鑑治各疔腫毒雪白礬石取末五錢蔥白煨熟搗和成丸用當歸五錢干菊花五錢煎湯送丸五錢即愈孕婦不可服掖回散專治疔毒起死回生乳香一錢生研膽礬一錢生研兒茶一錢冰片一錢麝香一錢龍骨一錢共為細末瓷器盛之遇疔瘡初起挑破頭將末入些須即解防丁散治疔瘡勢不甚橫者即消防風一錢生甘草八分金銀花一錢五分連翹一錢紫花地丁一錢五分天花粉一錢生地二錢玄參一錢赤芍五分水二碗煎八分溫服化疔湯生薺苨三兩生甘草三錢水煎服一碗頓服之三劑全愈集簡方治疔瘡腫毒端午採豨薟草日乾為末每服半兩熱酒調下汗出即愈極有效驗又方治疔腫初起王不留行子為末五錢蟾酥三分為末水丸如黍米大每三丸酒下汗出即愈蒺藜散治一切疔毒蒺藜子一升熬搗以醋和封頭上拔根載外臺秘要骨羨瘡骨羨瘡生於神堂二穴或膈關膈俞之穴上也雖穴屬太陽膀胱之經似乎陽經之病然而此瘡不發則已發則未有不癢者也夫瘡之痛乃毒發於陽瘡之癢乃毒發於陰也癢之極者陰之極矣骨羨瘡之癢正患其癢之極也癢極則不可忍必抓搔而少已而無如愈搔而愈癢愈癢而愈搔抓搔不已必至皮肉損破久而抓搔乃見骨矣此瘡雖是陰虛而生亦生於祟也祟之來也原非無故大約乃冤家債主耳急為祈禱庶幾易救但既已祈禱而無神方治之恐亦難痊也我有仙傳之方不忍秘隱公傳萬世以救之也救祟湯巫彭真君傳治骨羨陰瘡人參五錢黃耆一兩當歸一兩金銀花二兩茯苓三錢貝母三錢草烏一錢水數碗煎一碗半飢服服數劑即不癢而漸愈骨毒滯瘡骨毒滯瘡生於兩腿之內箕門之穴也腿上箕門之穴原屬足太陰脾經也脾旺則氣血流通雖有火毒必然易散即或不散而生瘡亦必輕而易愈大約輕者必痛重者必癢如生瘡不痛而發癢必難治也一名腿發十二日可刺如膿黃赤色可治清稀腐臭者不治其瘡赤白色是毒發於骨本是難治之症倘毒發於外十日之內未膿必死完足湯巫彭真君傳治骨毒滯瘡白朮一兩當歸一兩金銀花二兩牛膝五錢貝母三錢水數碗煎一碗服連服數劑無膿有膿可以不死骨痿瘡骨痿瘡生於兩胯骨之上乃環跳之間也先小後大筋骨俱疼癊開流水水盡則死如胯相對並有瘡腫者十無一生勿謂瘡不若癰即可輕視之也此處生瘡左右俱難側臥用大馬屁勃墊睡不令磨著內服補中益氣藥治之補中益氣湯祖傳治骨痿瘡生於腿上胯骨間人參五錢白朮一兩生黃耆一兩當歸五錢柴胡一錢升麻五分陳皮一錢生甘草二錢半夏二錢茯苓三錢水煎服數劑愈加味參耆湯祖傳治腳腿生疽或忽然腫起一塊不痛者並治各瘡黃耆一兩人參五錢荊芥三錢當歸五錢天花粉三錢附子三分生甘草一錢牛膝三錢金銀花一兩水煎服多服自愈陳肝瘡陳肝瘡即蚤疽也生於左右臂上三五處如癤毒腫痛痛不可忍擦挨難忍如有頭二七可刺刺之有膿者生刺而無膿身熱虛硬面赤者二八日便有歸陰者癢甚者一月後死然大補氣血亦有變死為生者矣未可信是死症而聽其必死也加味參耆湯祖傳治兩臂生陳肝瘡神效黃耆一兩人參五錢荊芥三錢當歸五錢天花粉三錢附子三分牛膝三錢金銀花一兩白芍藥五錢白朮五錢水煎服數劑亦不至死赤炎瘡赤炎瘡遍身有赤點子乃手太陰肺經受風熱而生者也肺主皮毛肺經氣有餘而血不足風熱在肺難於抒泄無血以潤之故留戀於皮毛而不散矣又名赤炎風因肺熱而心火又侵則火以助火血愈耗矣血耗則肺氣更熱此赤點所以更現或有或無久而不愈變為癘風者有之故治法必須消風退熱而瘡自愈也潤肺化炎湯巫彭真君傳治赤炎風瘡桔梗三錢桑白皮三錢炙甘草二錢黃芩二錢玄參五錢麥冬三錢天門冬三錢貝母二錢陳皮五分生地三錢升麻一錢水二碗煎八分食後服數劑自消倘左寸脈旺大乃心火也本方去黃芩換黃連一錢可也亦服數劑自愈血胤瘡血胤瘡生脅肋淵液之間也此處本是足少陽膽經所屬膽經屬木木氣若舒何至生此瘡乎膽木之氣不舒則木難攄泄多生此瘡論理婦女郁多男子郁少男之郁易解女之郁難開故男生此瘡易於散女生此瘡難於痊往往有結成腋癧數年不化忽至腫突崩潰流黑水而死矣所以此瘡必須將憂愁頓釋後服藥餌為妙蓋瘡雖成於膽經之郁然膽鬱則肝亦郁矣肝膽同郁則肝膽同病也夫肝之氣最宜通達而不宜閉塞肝氣閉塞則肝血必至騰越腫突崩潰非氣之通達乃血之潰壞也是以治此瘡必當先用舒膽舒肝之藥而佐之生血生氣之品則肝膽相宜而鬱結自散瘡亦愈矣苟不知治法而妄用敗毒之劑則瘡必現於肉中隱然作痛或忽長大至胸發於期門而成腋癧矣可不慎哉解鬱散毒湯巫彭真君傳治血胤瘡腋癧神效白芍四錢白芥子三錢香附二錢鬱金二錢柴胡一錢五分茯苓二錢蒲公英三錢陳皮五分生甘草一錢白礬一錢當歸三錢野菊花根二錢薏苡仁三錢乳香末一錢水數碗煎一碗連服八劑自化如已潰者本方倍加當歸少加附子二分去鬱金野菊花白礬加黃耆三錢白朮五錢多服自愈天疱瘡天疱瘡生於頭面遍身手足之間乃毒結於皮毛而不入於營衛論理尚輕然治之不得法疼痛難忍不啻如火烙炎燒矣此瘡乃肺氣虛而火毒結於肺本是暑熱濕蒸之氣因肺氣虛而犯之也其症燎漿白疱皮破赤沾小兒生於夏日居多故治法必須用解暑散火之藥然單散火而不補肺則火不能去而氣益虛瘡難速愈矣補氣而佐之解暑則火毒自消而瘡亦易愈外用絲瓜葉搗爛調定粉敷之尤易奏功也香薷補氣飲內治天疱瘡香薷一錢天花粉一錢生黃耆一錢白朮二錢炙甘草一錢黃芩一錢茯苓二錢人參五分厚朴五分麥冬二錢陳皮三分桔梗一錢五分水煎服數劑愈定粉散定粉五錢火煅為末絲瓜葉搗汁半茶鍾輕粉五分為末雄黃三錢將定粉雄黃輕粉共研細末將絲汁調搽瘡上即效應如響仙爐脂治小兒天疱瘡香爐蓋上煙脂三錢黃連二錢青黛二錢冰片二分各為細末雞子清調或豬汁調敷甚妙瘰癧瘡瘰癧之病甚多名狀不一大約得病有九一因怒而得一因鬱而得一因食鼠食之物而得一因食螻蛄蜴蠍所傷之物而得一因食蜂蜜之物而得一因食蜈蚣所遊之物而得一因大喜飽飧果品而得一因縱欲傷腎飽飧血物而得一因驚恐失枕氣不順而得初生之時每現於項腋之間或牽蔓於胸脅之處其形之大小宛如梅核或動或靜或長或圓或連或斷及至潰爛或流水流膿流血之各異未破之先易於醫療已破之後難於收功蓋未破雖虛而不至於五臟之損已潰漸虧而難救夫七腑之傷故必須補其虛而救其傷始為妙法也然病雖有九而治法止有三也其一治在肝膽其二治在脾胃其三治在心腎治肝膽者其左關之脈必澀而右關之脈必滑者也蓋肝膽之郁不開必下克脾胃之土土氣受制難化水穀必至生痰以助結而瘰癧不化矣治其肝膽而消化其痰涎則瘰癧易化矣治脾胃者其右關之脈必浮而無力或滑而有力也明是脾胃之中無非痰氣之升騰土氣之蕭索不健脾則痰不能消不健胃則涎不能化痰涎日盛瘰癧難開何能治乎故必大補脾胃以消化痰涎然後佐之敗毒之味則病去如掃矣治心腎者切其左寸之脈必滑右尺之脈必澀者也明是心腎兩開不能既濟而肝膽脾胃各不相應故痰塊不消瘰串更甚補其心腎則陰陽和合而少佐之去毒破堅之味則取效益速矣倘不明三治之法而妄用刀針愈虧其根本安得濟事乎必至與死為鄰不重可惜哉開鬱散巫彭真君傳治肝膽鬱結之瘰癧神效白芍五錢當歸二錢白芥子三錢柴胡一錢炙甘草八分全蠍三個白朮三錢茯苓三錢鬱金二錢香附三錢天葵草三錢水煎服連服十劑自愈培土化毒丹巫彭真君傳治脾胃多痰瘰癧難消治之神效人參二兩白朮十兩茯苓六兩炙甘草一兩紫蘇八錢半夏二兩殭蠶二兩陳皮六錢白芷七錢木通一兩金銀花十兩天花粉三兩各為末蜜為丸飯後吞服三錢早晚各一服一料全愈然必須斷色欲三月神龜散巫彭真君傳治心腎不交瘰癧久不愈者神效大龜二個一雌一雄遠志一兩麥冬三兩山茱萸四兩肉桂一兩白朮炒五兩蒼朮二兩熟地十兩玄參十兩茯神四兩何首烏十兩生用桑椹四兩紫花地丁四兩夏枯草五兩各為細末將大龜飯鍋蒸熟火焙乾為粉同用蜜為丸每日早晚白滾水各於飯後送吞三錢一料必全愈治瘰癧腫硬疼痛久不瘥貓頭蹄骨一具酥炙黃為末昆布一兩五錢海藻一兩五錢二味酒洗去鹽水曬乾連翹一兩黃芩一兩金銀花一兩穿山甲一兩皂角五錢枳殼一兩香附一兩用醋煮乾為細末將玄參煎膏為丸如桐子大每服七八十丸一日三服以薑汁三匙調入好酒下能收全功消愁破結釀岐天師傳治瘰癧殭蠶炒五錢全蠍五個不去頭尾足白芷一兩白芥子炒一兩白朮土炒二兩附子二分紫背天葵根八兩先將前六味各為末將天葵煮汁一碗同入在黃酒內用酒二十斤煮三炷香三日後日服三杯以面紅為妙樟腦丹活法機要治癧瘡潰爛牽至胸前兩腋塊如茄子大或牽至兩肩上四五年不能療者皆治之其效如神樟腦三錢雄黃三錢為末先用荊芥根下一段剪碎煎沸湯溫洗良久看爛破處紫黑以針一刺去血再洗三四次然後用樟腦雄黃末麻油調掃上出水次日再洗再掃以愈為度專忌酒色葛真君湯治瘰癧載在末卷十五卷內內外臁瘡臁瘡有內外之殊內臁屬足厥陰肝經之部位外臁屬足陽明胃經之部位也似乎外臁輕於內臁以胃為多氣多血之腑以肝為多血少氣之腑耳然而臁瘡雖分內外而臟腑無濕毒則左右內外俱不生也惟是臁瘡自感濕氣因而生瘡者居多但亦有因打撲抓磕或遇毒蟲惡犬咬破損傷遂至成瘡苟非胃肝原有濕毒未必日久而不愈也故治法活血以去濕未必骨腐無如世人不知禁忌久占房事以致皮黑肉爛臭穢難當若夫婦人女子經期血散亦往往肉黑肌壞故經年累月而不愈也所以男婦苟生內外臁瘡必當節欲慎房始易奏功耳內用補中解毒之劑外用隔紙神膏貼之不須數個便可速愈矣補中益氣加味散祖傳治內外臁瘡神效人參二錢白朮三錢茯苓三錢生甘草一錢當歸三錢生黃耆三錢金銀花五錢陳皮五分柴胡一錢升麻五分半夏一錢水煎服連用四劑外用蔥二條將瘡口洗淨之後再用水同煎藥渣煎好洗瘡口一次日用隔紙膏貼一個日日如此不過數個全愈然必須絕欲一月不再發疳瘡膏藥治內外臁瘡隔紙膏杏霜丹斂瘡丹俱載在十五卷治一切臁瘡膏方將膏藥用溫水浸捏成為餅如瘡口大用帶紮緊不可行走一晝一夜如前換之黃蠟二兩五錢提過陳松香一兩水提過人參六分銅青五錢赤石脂五錢黃連一錢五分紅花三錢飛礬一錢五分龍骨五錢研末先將黃蠟松香煎熟後將前藥研末齊下不住手攪以滴水成珠就好如若太老再加麻油少許一煎可用要忌鵝糟發物人面瘡人面瘡非生膝上即生於肘上也瘡形頗象人面重者有口有鼻有眼多是鬼物憑之然口鼻眼雖具多不能言未嘗不能動也動者狀似愁苦口中與之以肉食則實能化古人謂其能食信不誣也有一種口眼皆不能動似非鬼物憑之但既非鬼物何瘡中生有口眼乎不知人面之瘡原有生死二種生者能食能動死者則不能動不能食也其實二種皆有祟也非天譴之罰即冤孳自到耳必須省察禱謝而後用藥治之始能愈也輕雷丸岐伯天師傳治生死人面瘡神效雷丸三錢輕粉一錢白茯苓一錢各為絕細末研勻敷上即消蓋雷丸最能去毒而逐邪輕粉深入骨髓邪將何隱茯苓不過去其水濕之氣共成奇功耳倘更加懺悔祈禱尤為善後之福也血風瘡血風瘡多生在兩腿裡外之臁上至膝下至踝骨前人謂是血受風邪而生也誰知皆好飲之徒過飲於酒以至濕滯於下腿而不散血氣一衰而瘡漸生矣其瘡初生之時必小小而癢久則大癢非手抓搔則癢不可止然過於抓搔則肌皮必傷而縱飲如故則癢又加甚皮破難於收酒濕難於散爛皮腐肉終無已日久之而肉中帶濕則必生蟲蟲多財更癢矣治之法必須斷酒然後用內藥補其氣血而兼消風濕外用膏藥敷貼則水去蟲死自愈補氣分濕湯巫彭真君傳治血風瘡白朮五錢茯苓三錢當歸五錢黃耆一兩柞木枝五錢薏仁五錢生甘草二錢萆薢二錢肉桂一錢紅花一錢澤瀉二錢水煎服多服為妙外用十神膏貼之十神膏治血風瘡蚯蚓糞一兩血竭三錢馬齒莧一兩黃柏五錢輕粉一錢烏桕根三錢銀硃四錢胡粉三錢潮腦二錢麝香三分各為末同豬油調為膏貼在油紙上照瘡之大小貼之另用布包好縛定聽其出水連用數個則水乾矣換膏藥時用金銀花一兩煎湯溫洗瘡口再另貼此膏若無水流出不必頻換再用數個必然奏功然不斷欲戒酒不必為彼治之也
