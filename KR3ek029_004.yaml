body:
  text: 卷四瘡瘍敷藥論瘡瘍內散第一善法也至瘡口已潰內不能散必須外治之矣外治之法最多大約敷法為佳敷者化也散也乃化散其毒使不壅滯耳然瘍瘡之緩急不同火毒之冷熱亦異必須敷得其宜而後效驗始速如赤腫焮痛此陽火之毒也宜用寒性化毒敗火之藥敷之如不變色而腫勢深暗者此陰火之毒也宜用溫性化毒敗火之藥敷之如不熱不涼此半陰半陽之火毒也宜用和解化毒敗火之藥敷之自然肌肉不壞而毒隨藥散火隨藥消膿易熟而肉不敗也倘宜寒而用熱愈增其外炎倘宜熱而用寒益添其內陷倘宜和解而用攻擊自至於敗壞而不止也總之瘡瘍貴內外兼治而敷藥亦不可猛浪輕忽要貴用得宜耳又曰瘡瘍既以陰陽辨之矣而陰陽之中俱用敷藥貼之如陽症用寒藥貼之期其必散也後用熱藥散之不可竟用寒藥也如陰瘡初起即用熱藥後不必又用寒藥也如半陰半陽以敷藥和之雜用溫藥散之不可先用寒後用熱也故不必論其皮之厚薄或先或後或干或濕或生或死或香或臭惟以三者消息之斷不爽也瘡瘍治法論瘡瘍治法甚多針灸之外有用溻浴之法者有用熏炙之法者有用點照之法者有用追蝕之法者有用蒸之法者有用吸之法者有用烙之法者用之得宜皆可奏功用之失宜皆能敗績余所以一概棄而不用也古人創造諸法未嘗不效故留法以示人而無如後人不善用之反至取敗耳夫有效有不效尚非萬全之法況無功而有敗又何取哉余近得異人之傳皆以內治收功並不見有敗壞之時間有敗壞之症多是垂成別用以上外治之法而變遷之也故余益信溻浴熏炙照點追蝕蒸吸烙盡非良法也宇宙之大鐸何敢謂諸法儘可廢棄或別有仙傳制度得宜奏效如響亦未可知而鐸實未遇之也以上諸法之內追蝕而用水蛭以吮血吸治而用贍蜍以收火無害有益似可用之余則未敢信其皆善也總之爭先之法莫妙用內治為良內治必須急早治之蓋治之早則必散之速治之緩則必散之遲何苦因循懈怠必俟成膿出毒後用諸法之紛紛哉瘡瘍調護論瘡瘍火毒亦甚大矣哉而世人往往輕視自以性命為兒戲也大癰惡疔至危至險出生入死多在呼吸之際必宜謹慎即小瘡細癤亦不可輕忽蓋七情犯之十惡沖之或食異禽野獸之味未潰者忽變為深陷已潰者倏易為黑紫終年纍月醫療不轉可不慎乎無如世人偏易相犯其間諸忌之中尤宜慎者惱怒與色欲耳然而犯惱怒者不過瘡口有疼痛開裂之虞若一犯色欲則瘀肉有冰凍之苦新肉有流水之害然此猶陽症之瘡瘍也苟是陰症一犯色欲多至暴亡非大用人參耆朮歸熟而重加金銀花桂附之品以急救之斷無生理萬不可仍治其毒而夭人性命也世人何苦貪片刻之歡愈受長夜之疼痛乎或謂瘡口開裂流水畢竟有火毒留於其中恐純用大補終非救療之法不知瘡瘍已潰之後原作陰虛治療況已結痂而復碎況已止血而流水又有何火何毒可已虛而重虛乎毋怪頃刻之驟亡也吾願行醫者時將危語陳說於病人之前庶幾少知畏懼不至輕蹈色欲之戒乎說知故犯罪在病人自取速亡與醫者何尤哉或曰先生既云犯色欲之禁者必用大補乃用金銀花獨非瀉毒之物乎何所取而用之不知金銀花雖曰化毒實亦補氣血之品也誠恐餘毒猶存故爾用之取其補而能斂非取其瀉而去火也倘真信其無毒而單用補劑尤治療之神鐸又何敢議哉又曰瘡瘍飲食之間最宜細慎如食驢馬駝騾豬狗魚蝦蟹鱉自死之屬如鵝鴨鴻雁鷹雀鴛鷺鳩鴉雞雉能言之類如獐鹿狐兔虎豹熊豺毒死之輩如黃瓜茄子胡荽生薑蓼芥蔥蒜薤韭之物如桃杏棗栗梨梅櫻柿未熟之品如饅首蒸餅餛飩及燔熬煎炙油膩飽食均宜忌之惟羊肉蔓蘿蔔與黃白米糧可用舍癰從症論瘡瘍之症變怪百端然皆因火毒之盛也但火毒在未潰之前其勢甚凶其禍少緩而火毒當已潰之後其勢大衰其禍更速夫勢凶則禍速宜也何故勢衰而禍轉不緩乎不知癰疽與各惡瘡當膿血崩泄之餘其邪火熱毒盡行外越所存余血盡化為膿且隨之而同敗惟一口正氣留戀於軀殼之中又有何實之有譬如強賊久居村莊一旦變亂劫人資財虜人妻女將各家金錢盡行席捲驅少壯良民皆為盜黨而去而城市空虛所存父老子弟非孱弱幼小即瘡痍殺傷之輩自救不遑安能重整戈矛再圖爭戰乎且寇盜雖去而無衣無食何以度日自然枵腹難熬變生疾病療生之不暇又烏能修我牆垣葺理茅舍乎其捉襟露肘之苦有不可言語形容者於是痛定思痛窘迫之狀百倍於強梁現在之日往往民欲不從而不可得者故瘡瘍已潰之禍較未潰之前而更速也所以未潰之前變止在於攻突之內而已潰之後變每出於敗壞之餘實有意想之所不到者當觀其所變以治症而不可執其經以治病也倘執經以治變未有不速之死者矣然則治變之法奈何大補其胃氣而不必問其火毒之存與不存者此舍癰治症之法即定變救癰之法也名為舍癰正所以療癰耳願與同人共商之焉舍脈從癰論瘡瘍之脈未有不緊數洪大者或浮而弦或細而數或澀而緊或滑而洪種種不同必須辨其陰陽大約細澀者陰也緊數洪大浮滑皆陽也然陰陽之脈更須分別已未潰觀之未潰之時脈見緊數洪大浮滑弦實者乃順之脈也若見細澀等脈則逆矣已潰之時脈見浮沉遲細軟弱澀乃順之脈也若見洪大等脈則逆矣然而順逆不常虛實宜別脈可執而不可盡執也脈既不可盡執而癰則可見矣往往有未潰之前脈現洪大而得生已潰之後脈現細澀而反死蓋攻補之異也大約癰瘍各症未潰宜補以用攻已潰宜補而不可散而脈之或洪大或細澀可不論也鐸又曰癰瘍有變換之時脈隨癰瘍之變換而遷改也故瘡可據之以辨陰陽而脈不可據之以辨虛實以可據者可信脈而不可據者豈可信脈哉余素信脈者也但人生癰瘍者有時脈不可全信所以從癰瘍而舍脈也非脈不可信而全不信有如此人亦宜善看癰瘍參酌於二者之間而已舍時從癰論凡四時之際多發瘡瘍非因時而發乎然瘡瘍之發多緣於火熱夏天之時正火熱時也瘡瘍生於夏天謂非火熱之極乎然夏天瘡瘍是火熱也若秋冬之時其火已散其熱已解火散熱解其毒已消不比春天之郁正熾也故瘡瘍生於四時不可與夏天同論以時有不同也是以瘡瘍生於夏日與生於四時有異蓋夏日可據時以論症而四時不可因症以論疴以夏日有火熱而四時無火熱也夫夏日之火熱隨外而動四時之火熱隨內而生內無火熱則外之火熱何以引之苟外不必引而內之火熱自動者以內之火熱自甚也故瘡瘍生於夏日者內之火熱因於外之火熱相逼也瘡瘍生於四時者內之火熱不因於外之火熱相逼也所以生於四時者較夏日而更重舍時從癰又何疑哉然則腫赤煩躁發熱飲冷便祕作渴脈洪數而實雖在嚴寒之時皆火熱也必用苦寒之藥瀉其陽而救其陰則火熱自散烏可因時冷而用熱藥哉若脈細皮寒瀉利腸鳴飲食不入嘔吐無時手足逆冷雖在盛暑之時皆寒冷也必用辛熱之劑散其陰而回其陽則火熱自解烏可因時熱而用寒藥哉誠以夏日不可與春日並斷而尤不可與秋冬並論也四時五虛五實之不同而瘡瘍不可拘也若泥而執之則誤之甚矣又曰五實之症如腫赤煩躁發熱引冷便閉作渴脈洪數者是也雖生於嚴寒必用大苦寒之藥瀉其陽以救陰也五虛之症如脈細皮寒瀉利腸鳴飲食不入嘔吐無時手足逆冷者是也雖生於盛暑必用大辛熱之劑散其陰以回陽也若寒時治寒熱時治熱鮮不誤矣瘡瘍用金銀花論瘡瘍必用金銀花者以金銀花可以消火毒也然毒實不同有陰毒陽毒之分其毒之至者皆火熱之極也金銀花最能消火熱之毒而又不耗氣血故消火毒之藥必用金銀花也以金銀花可以奪命不分陰陽皆可治之蓋此藥為純補之味而又善消火毒無奈世人以其消毒去火而不肯多用遂至無功而且輕變重而重變死也若能多用何不可奪命於須臾起死於頃刻哉誠以金銀花少用則力單多用則力厚而功巨也故瘡瘍一門舍此味無第二品也所以瘡瘍初起必用金銀花可以止痛瘡瘍潰膿必用金銀花可以去眩瘡瘍收口必用金銀花可以起陷然此猶補陽症之瘡瘍也若陰症初生背必如山之重服金銀花而背輕矣陰症潰膿心如火焚必服金銀花而心涼矣陰症收口瘡如刀割必服金銀花而皮癢矣然此猶陰症而無大變也苟痛癢之未知昏憒之罔察內可洞其肺肝外可窺其皮骨飲之而不欲食之而不知惟金銀花與同人參大劑治之亦可以奪命而返魂也誰謂金銀花豈小補之物哉而世人棄之者因識其小而忘其大是以他藥可以少用而金銀花必須多用也知金銀花之功力若此又何患哉瘡瘍不可純委鬼神論瘡瘍昏憒多是虛症其見神見鬼者人謂是前愆夙債耳夫前愆可以曉蓋夙債可以今償每用銀錢以買命棄珠玉以贖怨亦有得生者世遂謂有鬼神可以誠求可以哀告耳而孰知不然蓋瘡瘍之鬼神因虛而自作不補其虛而惟求鬼神之解結鬼神其肯去乎況鬼神之現必非無由因虛自召非真有鬼神也故補虛而鬼神自絶不補其虛虛且難回鬼神何以去乎苟能察其自虛而大用金銀花之類佐之參耆歸術則鬼神自去正歸而邪自散也及至瘡瘍漸愈而鬼神暗失始信前非謂是無鬼無神之論而仍不信者謂之何哉鐸又曰世有生瘡瘍而召鬼神者亦有不生瘡瘍而多集鬼神者是鬼神不因瘡瘍而有也余醫瘡瘍者有年往往見危困之時每遇鬼神痛哭呼號暗擊重責而不已者是瘡瘍確有鬼神也及至大用參耆之後漸復其元而佐之消毒去火之劑健脾和胃之品正氣日旺邪氣日退不必逐鬼而鬼自走不必祛神而神自歸豈藥可祛逐鬼神乎可見人虛自召補虛正祛鬼神之法非鬼神之果無也鐸又曰言鬼而神在其中尼山云敬鬼神而遠之遠之者敬之也非無鬼無神之論補虛者正遠鬼神也人能常敬鬼神斷不戕賊身體致生瘡瘍以召鬼神暗擊重責耳産婦生瘡瘍宜用補陰論古人云産後必大補氣血為主其他俱從末治可見産婦未有不虛者虛則必用補氣補血之味氣不補則氣衰血不補則血少氣血衰少者陰不足故耳故産婦必以補陰為先以亡血過多必至失陰耳或謂陰不可以驟生必先補氣以氣能生血氣旺則血旺血旺則氣益旺矣不知産婦之生瘡瘍者不可徒補氣也補氣必至生血血旺而瘡瘍同旺者奈何況瘡瘍之生皆血虧耳血虧則陰愈虧補陰而瘡瘍自失蓋陰能制夫陽也陽受制則陰日旺矣陰旺而瘡瘍之間有血以潤腸胃有血以蔭筋骨又何火毒之不盡散乎若補其陽有不增瘡瘍之勢哉故補陰於産婦勝補陽於産婦也是以補陰於陽中不若補陰於陰中也大約補陽者四補陰者六斷無陽旺而陰消矣鐸又曰産婦生瘡瘍當分別生産與未生産未生産之前胎不崩墮血未虧也止補陽以生氣不必補陰以生血少佐之消毒敗火藥則得矣已生産之後血大虧也惟補陰以生血兼且補陽以生氣而消毒敗火之劑不必佐之也若慮瘡瘍之害而不顧産婦之虛怯一味消毒收火鮮不誤矣瘡瘍不必隨經絡用藥論瘡瘍之生宜分經絡既有經絡烏可不分哉吾以為不必分者以瘡瘍貴去其火毒不必逐經逐絡而用藥也以瘡瘍之生有經絡之分而用藥之妙單以消火毒為主以火毒去而瘡瘍自失經絡不必分而自分也試思解火毒之藥不外金銀花與蒲公英之類若必隨經隨絡而分之亦鑿之甚矣用藥胡可雜哉鐸又曰瘡瘍之生不在一處若不分別經絡則五臟七腑何以清頭面手足何以辨不識不知何所據以治痛癢哉雖金銀花蒲公英之類皆可散消火毒然無佐使之藥引之以達於患處亦不能隨經而入之是經絡之藥不可不用亦不可竟用之耳
