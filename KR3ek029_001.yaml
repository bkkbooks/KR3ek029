body:
  text: 卷一瘡瘍標本論凡病皆有標本之異而瘡瘍亦宜知之苟不知標本輕妄施藥不中病情往往生變是標本不可不辨也二者之中本重於標知本而標無難治也世人皆謂瘡瘍生於肌膚何必問其臟腑誰知外生瘡瘍皆臟腑內毒蘊結於中而發越於外也苟不治內而惟事外攻則內毒未散外毒安能化乎故必先看其生瘡於何處糸何經部位如生在頭額則是太陽之病生在脅肋則是厥陰之疾所謂本也次察其痛癢痛則陽症癢則陰疴所謂標也標本分明自然用藥無誤生在陽經而作痛此純病於陽也內外俱用瀉味自易成功倘生於陽而作癢此陽虛而病陰也補陰以化毒而不可損陽以耗氣也生在陰經而作癢此純病於陰也內外俱用補劑無難奏效倘生於陰而作痛此陰虛而病陽也補陽以化毒而不可損陰以虧血也蓋耗陽之氣虧陰之血俱能損傷營氣夫營氣最忌損傷瘡瘍之生原因營氣之逆也營氣之逆者又因於胃氣之逆也人生以胃氣為本烏可使之逆乎胃氣逆於前而經絡不通臟腑壅塞以致結成癰疽倘再逆於後又何以化毒哉是胃氣之斷不可逆也而胃氣之所以逆者何故乎損之甚者逆之甚傷之至者逆之至也故治瘡瘍者總以顧胃氣為主有胃氣則本病陰而能生無胃氣則標病陽而亦死治瘡瘍者辨明標本而加意於胃氣何患術之不神哉薛新甫曰若病急而元氣實者先治其標病緩而元氣虛者先治其本若病急而元氣又虛者必先治本而兼以治標大約瘇高焮痛膿水稠黏元氣未損也治之則易漫瘇微痛膿水清稀者元氣虛弱也治之則難不瘇不痛或漫瘇黯黑不潰者元氣虛甚治之尤難者也愚意薛氏所言元氣者即胃氣也瘡瘍辨脈論診脈所以治內病也若瘡瘍則辨症而不必辨脈以瘡瘍之病在外也雖然有諸中必現於外安在診其里不可以知其表哉況瘡瘍之毒皆出諸臟腑乎既是臟腑內病烏可徒辨症而不辨脈乎惟是瘡瘍之變症多端而瘡瘍之變脈亦不一狀吾又何能盡示之乎然不可盡示之中而實有簡要之法在大約瘡瘍未潰之先脈欲其有餘而瘡瘍已潰之後脈欲其不足有餘者火毒旺也不足者正氣虛也未潰而現有餘之脈乃宜盛而盛順之象也已潰而現不足之脈乃宜虛而虛亦順之象也倘已潰而現有餘不宜盛而盛也未潰而現不足不宜衰而衰也不宜盛而盛乃火毒之大熾不宜衰而衰乃火毒之甚深皆逆之象也順吉而逆凶又何疑哉而有餘不足之脈何分順逆乎夫浮也芤也滑也實也弦緊也洪長也大散數也皆有餘之脈微也沉也緩也澀遲也伏軟也弱結細也皆不足之脈也有餘之脈宜現於未潰之先而不宜現於已潰之後不足之脈宜現於已潰之後而不宜現於未潰之先治之法未潰而現不足須補陽以發其毒而人參黃耆不可緩用也已潰而現有餘須補陰以化其毒而熟地當歸所當亟投也更有祕訣者毋論有餘不足各脈倘無斷續之形皆可用大補之味而佐之消毒之品同群共用亦能轉危為安反敗為福未可以脈之不順即棄之而不治也瘡瘍陰陽論瘡瘍最要分別陰陽陰陽不分動手即錯或謂陰陽者分於氣血也不知氣血亦分陰陽之一端而不可執之以概定陰陽也蓋瘡瘍有陰症有陽症有陰熱陰寒有陽熱陽寒有陰滯陽滯有陰陷陽陷有先陰變陽有先陽變陰各各不同也病不同而何以辨之陽症必熱陰症必寒陽症必實陰症必虛陽症之形必高突而腫起陰症之形必低平而陷下陽症之色必純紅陰症之色必帶黑陽症之初起必疼陰症之初起必癢陽症之潰爛必多其膿陰症之潰爛必多其血陽症之收口身必輕爽陰症之收口身必沉重陰熱者夜重而日輕陽熱者夜輕而晝重陰寒者飲溫湯而作嘔陽寒者飲冷水而欲吐陰滯者色紫黑而不變也陽滯者色微紅而不化也陰陷者色黯黑而不起也陽陷者色紅黃而不起也先陽變陰者始突而不平初害痛而後害癢也先陰後陽者初平而潰始患熱而後惡寒也陽中之陰者似熱而非熱雖腫實虛若黑而非淡欲痛而無膿既浮而復消外盛而內腐也陰中之陽者似冷而非冷雖虛而實腫雖淡而似赤若燥而寒痛既平而實突外淺而內橫也陽變陰者其人多肥陰變陽者其人多瘦陽變陰者服涼藥之過也陰變陽者服熱藥之驟也然陽變陰者多死陰變陽者多生以此消息之萬不失一苟以氣血分陰陽或以癰為陽疽為陰未為通論蓋癰疽各有陰陽必氣血兼補而佐之消毒始能奏功甚速倘執陽病是氣而不敢用補氣之藥毋論未潰之前火毒不能遽散即已潰之後肌肉何能驟生單一味補血無濟於事也必補氣以生血則氣血兩旺氣得血而流通亦血得氣而充足何懼火毒之不星散哉倘執陰病是血而不敢用補氣之味尤為不可總之氣血不可失治而瘡瘍必當兼用之也惟是陰陽之症不可不分知是陽症可少用金銀花化毒之品而輕佐之補血補氣之味知是陰症可多用金銀花化毒之品而重佐之補氣補血之味自然陰變為陽而無陷滯之虞陽不變陰而有生化之妙也更有以陰陽分寒熱者殺人必多矣夫病分寒熱是人素稟之偏豈可以陽為熱陰為寒耶故浮洪弦數本陽脈也然陽乃氣虛而非熱沉細弱澀本陰脈也然陰乃血虛而非寒辨其陰陽而不可分為寒熱以瘡瘍之陰陽無非正虛邪實故氣血可以共補也瘡瘍善惡論瘡瘍不論大小專論善惡蓋大者有生之機小者有死之兆也惟是大小易見而善惡難知不知善惡者安知吉凶乎故善惡必須辨也大約善有五惡有七吾先言其善者起居安適無躁動之狀一善也大小便如常無諸痛苦二善也凡服藥餌隨手奏效腫易平復無膿血之多三善也神清氣爽言語響亮四善也飲食健旺易於消化口不大渴五善也有此五善雖瘡瘍形大而病實輕吉之徵也吾再言其惡者口大渴呼飲煩躁不常腹中時痛口中時咳大便作瀉小便成淋此惡之一也膿少血多不腫而痛皮肉腐壞臭氣難聞瘡口低陷沿開廣闊此惡之二也喘粗氣短不足以息恍恍惚惚如見鬼祟此惡之三也黑睛緊小白睛青赤長多斜視上視此惡之四也手足無措神氣昏暗面目炭色此惡之五也見食厭惡服藥嘔吐不能飲食此惡之六也聲啞面腫鼻黑唇青此惡之七也有此七惡雖瘡瘍形小而病實重凶之徵也凶者多死吉者多生雖然生死何常之有往往吉變為凶生變為死大約皆酒色害之也夫吉兆既可變為凶豈凶徵獨不能變為吉生兆既可變為死豈死徵獨不可變為生要在人善於悔悟而調理又得其宜亦可挽回於萬一也夫調理者慎勞絶欲居其半節食擇藥亦居其半也倘病人心自悔悟而藥餌亂投恐非轉凶起死之法大約瘡瘍惡症脈無止歇而有胃氣者必可救援故一現惡徵急用參耆以救之則胃氣不亡可變凶為吉轉死為生也惟是惡徵之現皆胃氣欲絶也吾欲使絶者不絶參耆必宜多用斷不可畏首畏尾而些少用之也瘡瘍經絡論五臟七腑各有經絡臟腑之氣血不行則臟腑之經絡即閉塞不通而外之皮肉即生瘡瘍矣然經絡隱皮肉之內何從知之然內有經絡外有部位部位者經絡之外應也如瘡瘍生於頭頂即屬足太陽經之病蓋頭頂乃膀胱之部位也生於面即屬足陽明經之病面乃胃之部位也生於頸項即屬足厥陰經之病蓋頸項乃肝之部位也生於肋即屬足少陽之病蓋肋乃膽之部位也生於手足心即屬手少陰經之病蓋手足心乃心之部位也生於背為諸陽生於腹為諸陰臂膊即手之三陰三陽經之所行股脛即足之三陰三陽經所屬七竅者五臟之竅也生於目乃肝經病也生於耳乃腎經病也生於鼻乃肺經病也生於舌乃心經病也生於口乃脾經病也不可據之外部位以知內之經絡臟腑乎雖瘡瘍因氣血之凝滯而生原無定位然凝滯於何經即生於何經之部位安可不即治於是經乎或曰跌僕刀傷蟲獸爪損亦能成瘡豈皆經絡之凝滯耶然既傷損於是經別治他經恐難奏效何如專治是經之為親切乎獨是經絡有氣血多少之異氣血多者易於成功氣血少者難於建績又當分別之也若三焦若心經若肺經若膽經若腎經若脾經此六經皆氣多而血少非補血則未潰不能化已潰不能消也若包絡若小腸若膀胱若肝經此四經皆血多氣少非補氣則未潰不能散已潰不能生也若胃經則氣血俱多初可用消而終亦必佐之以補氣血則收功自速矣部位既明經絡無錯自然用藥得宜無憂猛浪之誤治也瘡瘍內外論瘡瘍之生內經雖言營衛之氣血不行也然而營衛之氣血不行實有其故有外傷而氣血不行者有內傷而氣血不行者有不內不外之傷而氣血因之不行者亦不可不辨也夫外傷者傷於風寒暑濕燥火之六氣內傷者傷於喜怒憂思驚恐悲之七情也一有所傷則臟腑之氣血不從逆於肉理變生癰腫矣但天地之六氣無歲不有人身之七情何時不發乃有病有不病者何也蓋氣血旺而外邪不能感氣血衰而內正不能拒此所以六氣之傷傷於氣血之虧而七情之傷亦傷於氣血之乏也然而傷於外者輕傷於內者重輕者其勢反重重者其勢反輕疑似之間最難辨識吾何從而辨之乎吾一辨之於脈輕而反重者陽症也右手寸脈必浮大而洪數重而反輕者陰症也左手寸脈必沉實而細數吾再辨於形輕而反重者表症也其瘡口必掀突於外重而反輕者里症也其瘡口必平陷於內似乎陽與表易治而陰與里難治也然而瘡瘍總宜急散散之急則陽陰表里皆能速愈也至於不內不外之傷較六氣之傷七情之傷為少差等耳宜乎不藥有喜然而世人之氣血未必皆有餘者也況加之損殘其肌膚戕賊其肢體則已傷復傷矣吾恐損者不易續而缺者不易全矣必須補其氣血使營衛之調和滋其臟腑俾經絡之安逸即有毒氣自然消化於烏有矣瘡瘍火毒論瘡瘍之症皆火毒症也但火有陽火陰火之不同而毒有陰毒陽毒之各異夫既曰火則火勢燎原救之烏可緩乎惟是陽火驟而烈陰火緩而酷夫火雖有驟緩而至於炎燒其禍則一也故救焚俱不可遲一見人生瘡瘍無論是陽是陰當速為撲滅則隨手奏功無奈世人視為平常因循懈怠以至輕變為重陽變為陰往往潰壞決裂而不可救療或曰陽火驟似乎難遏陰火緩似乎易圖何其酷烈反勝於陽火乎蓋天下陽毒易防而陰毒難防瘡瘍火毒又何獨不然且亦知瘡瘍之火毒為何毒乎乃龍雷之火鬱而出於木中也夫龍雷之火藏於地中天氣鬱勃火不能藏往往發越於外然而龍雷之火又藏於木中非破木焚林而火不得外泄其所出之處有焚燒屋廬者有殛死人物者苟攖其鋒多成灰炭其毒為何如乎人之生瘡瘍者雖因氣血之不和而不和者乃氣血之郁也五臟六腑之氣血皆能成鬱而生瘡瘍其實無不因肝腎二經之郁以成之也肝腎二經屬陰皆有龍雷之火火鬱之極必變蘊而為毒火為陰火則毒亦陰毒也陰毒不發則已發則衝擊禍害有不可勝言者此毒之所以酷烈也夫陽毒尚有養癰之患而陰毒尤禁養癰者以其潰壞決裂有百倍於陽毒也可見陰陽瘡瘍俱宜急早治之但治法不同又不可不分而治之也大約治陽毒之瘡瘍宜散重而補輕治陰毒之瘡瘍宜散輕而補重總之陰陽火毒非補則火不肯滅而毒不易消也但分輕重以用藥而萬不可單用散劑以治瘡瘍苟不辨別其陽火陰火與陽毒陰毒而止用攻堅表邪之味吾恐火未必退而氣先失毒未必化而血先涸矣安得不夭人性命哉瘡瘍腫潰虛實論夫瘡瘍宜分虛實未可漫然用藥也雖治瘡瘍之法俱宜用補然不知虛實孟浪治之亦難速效故必審其虛實之重輕以酌量其補瀉之多少始為上工也惟虛實何以辨之乎亦於初腫已潰時用辨之也初腫之時腫而高突焮赤作痛是陽邪毒盛病在表實也如腫而堅硬深痛亦陽邪毒盛病在裡實也表實可散裡實可攻攻散之中略兼用補則在表者不至入里而在裡者必易發表矣倘腫不甚高突雖焮赤作痛而少衰此陽邪毒衰病在表虛也如腫雖堅硬痛不甚深此陽邪毒衰病在裡虛也表虛不可純散裡虛不可純攻攻散之中重於用補則表虛者力能托外裡虛者力能出內矣若已潰之後猶然腫硬焮痛發熱煩躁大便祕結瘡口堅實此陽毒未化乃邪實也尚宜補而兼散倘膿大出而反痛瘡口久而不斂發熱口乾膿水清稀腫下軟漫此陽毒已盡乃正虛也切戒散而必補以上治法猶論陽症之瘡瘍也若陰症之瘡瘍毋論未潰之前與已潰之後皆宜用補豈特必宜用補尤宜大補為急而不可用些小之補藥也蓋陰症瘡瘍其毒最深其火最烈非用大補之劑則火不肯遽滅而毒不易驟消也或曰毒深火烈反用大補不助熱以增橫乎不知瘡瘍之火毒因虛而成者也不比他症之火毒得補而添其炎惟瘡瘍陰火愈補而愈衰瘡瘍陰毒愈補而愈化也或曰然則竟不消其火毒乎曰是又不然藥品之中有補味而兼攻者吾採而用之名為補而仍是攻散之也又何懼哉瘡瘍順逆論瘡瘍最宜知者陰陽也其次宜知順逆大約陽症多順陰症多逆順者生逆者亡故知順逆即知陰陽知陰陽即知生死矣然而順逆不易知也其順逆之中有順而實逆有逆而反順此即陽症似陰陰症似陽之説也苟不知順逆之真何知順逆之假乎余有辨順逆之真法如瘡瘍之初起頂高根活色赤發熱焮腫疼痛日漸突起腫不開散者順也若頂平根散色暗微腫不熱不疼身體倦怠者非逆而何如瘡瘍之已成瘡形獻起焮痛皮薄光亮易膿易腐飲食知味二便調和身溫者順也若腫堅色紫不作膿不腐潰瘡頂軟陷口乾作渴心多煩躁者非逆而何如瘡瘍之已潰膿稠色鮮不臭腐肉自脫焮腫易消身輕痛減者順也若皮爛肉堅不腐腫仍不消痛仍不減心煩臥不寧者非逆而何如瘡瘍之潰後膿厚稠黃新肉易生瘡口易斂飲食漸進無有痛楚作癢者順也若膿水清稀腐肉雖脫新肉不生色敗臭穢飲食不進者非逆而何倘逆而變順生之機也逆而不順死之兆也
