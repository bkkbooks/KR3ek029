body:
  text: 卷九杖瘡杖瘡受官刑而成瘡也氣血有餘易於生合氣血不足難於化消倘受刑少者血不凝滯受刑多者血必穢瘀受刑輕者氣不蕭索受刑重者氣必敗殘蓋刑輕刑少忍痛而斷不叫號刑重刑多悲傷而自多涕泣此氣血所以愈虧也倘受刑之先身體原弱而不強則惡血奔心往往有死者必須活其血而補其氣敗其毒而消其火然後外用膏藥貼之或末藥敷之不至死亡也調中化瘀湯巫彭真君傳內治杖瘡神效服之無性命之憂當歸五錢生地五錢三七根末三錢丹皮二錢白芍三錢生黃耆三錢生甘草一錢大黃一錢枳殼三分虛極者加人參三錢水一碗童便一碗同煎服二劑瘀血即散外用末藥膏藥貼之即愈仙花散外治杖瘡鳳仙花葉搗汁馬齒莧搗汁黃蠟二兩蔥白搗汁松香二兩五倍子為末一兩乳香二錢將鳳仙蔥莧先搗取汁二碗將黃松香熬膏入倍子末攤膏貼之自愈禿瘡禿瘡乃是太陽膀胱督脈二經受濕熱故生蟲作癢其實亦因父母生兒之前不節色欲或服熱藥浪戰頻頻泄精以致胎中受毒不能即散而小兒之首受之毒輕者瘡輕毒重者瘡重既生之後小兒或食煎炒之味或多餐水果或多受暑風而頭上禿瘡因而生蟲痂高堆起白屑滿盈終年纍月而不愈矣瘡輕者外治即痊瘡重者必須內外兼治庶易愈也世人多不急治所以多纍竟至蟲蝕發盡成為禿子耳蝸蜂丹外治禿瘡蝸牛十個黃蜂窠二錢生甘草一錢白礬一錢將蝸牛搗爛塗禿遍透後將下三味研為細末豬油調敷如用熊油調搽更妙清首湯內治禿瘡玄參三錢生甘草一錢茯苓二錢白芷一錢山豆根五分紫草一錢黃柏一錢蔓荊子一錢白蒺藜一錢半夏五分水煎服四劑後以前方外治無後患也此方以十歲為準年小減之魚臍瘡魚臍瘡生於肘肚乃手少陰心經也此處屬少海靈道之穴生於小腿肚者乃足太陽膀胱經也此處屬承山飛揚之穴上下二處之瘡其疼痛皆甚初起一二日先用灸法最易解散心經多氣少血膀胱經多血少氣少血者宜補血以消毒少氣者宜補氣以消毒然氣血雙補而佐之消毒之藥更佐以引經之品何瘡之不速愈乎俗名魚臍疔治法正同耳化魚湯巫彭真君傳治魚臍瘡疔不論肘腿俱效金銀花一兩當歸五錢生甘草二錢青黛二錢地榆二錢白礬一錢生黃耆五錢水煎服陰包毒瘡陰包瘡生於大腿內臁之上乃足肝經風熱之毒也肝本多血少氣之經若生此瘡必然疼痛治法必須補氣以解風熱則已潰未潰尤易散也外用膏藥貼之更效如神黃耆散陰湯治腿內外股瘡毒疽癤生黃耆五錢柴胡一錢五分白芍五錢炒梔子一錢五分大力子一錢甘草二錢連翹一錢金銀花一兩肉桂三分薏仁五錢半夏一錢水煎服燕窩瘡羊胡瘡燕窩瘡生於腦後項之窩乃足太陽兼督脈之經也羊胡瘡生於下唇下巴骨之處乃任脈之經承漿地閣穴道也兩處生瘡多是感犯濕氣濕久則熱熱久則毒難化矣於是氣血不通濕熱不散而瘡有經月不愈者在小兒尤多倘內服除濕清熱之味以消太陽任督之毒外用藥摻之或搽之則瘡即結靨而愈矣除濕清熱散家傳內治燕窩瘡羊胡瘡神妙茯苓二錢炙甘草一錢白朮一錢白芷五分蒲公英二錢澤瀉一錢豬苓一錢蒼朮一錢羌活五分天花粉一錢五分水煎服神異丹巫真君傳外治燕窩瘡羊胡瘡最妙輕粉一錢兒茶三錢黃丹二錢炒黃柏三錢枯礬五分冰片三分各為末濕則乾摻干則用麻油調敷數日即愈胎毒瘡戀眉瘡瘡生於頭上眉上終年終月而不愈皆受母胎之毒也似與禿瘡相同然而禿瘡止生於頭而不生於眉也今頭與眉俱生尤胎毒之重者也故禿瘡可以外治而戀眉之瘡必須內外兼治倘瘡止生頭上用清首湯妙矣或兒畏湯劑不肯吞服亦可止用蝸蜂丹外治無不愈者若頭眉俱生必須先服清首湯另用釋眉丹外搽不至淹纏歲月也清首湯治胎毒瘡載禿瘡門釋眉丹治戀眉瘡黃連五分油調塗碗內艾煙燻過入皂礬一分為末輕粉一分末冰片半分末麻油少許再調塗之數次全愈或用膠髓膏亦神效載在奇驗方門肺風瘡齇鼻瘡肺風齇鼻瘡生於鼻面之間乃肺經之病也夫肺開竅於鼻肺氣不清而鼻乃受害矣鼻既受害遂沿及於面世人不知肺經有病或冷水洗面使熱血凝滯因結於面而生瘡矣治之法必須清肺氣而兼消其風活肺血而再祛其火然後用搽藥外治未有不速痊者也加味甘桔湯治肺風齇鼻瘡桔梗三錢甘草一錢甘菊二錢青黛二錢茯苓三錢白附子八分天花粉二錢白芷五分水煎服杏黃散載後粉花瘡裙邊瘡粉花瘡生於人面窠瘻生癢乃肺受風熱也此瘡婦女居多蓋絞面感冒寒風以致血熱不活遂生粉刺濕熱兩停也裙邊瘡者亦婦女生於內外足踝之骨或裙短而不能遮風又不慎房帷乃致足寒而濕熱不行凝滯而生瘡也粉花瘡輕於裙邊以上濕易散上熱易化而下之濕熱未易消也故粉花瘡止消外治若裙邊瘡必兼內治始妙也二粉散載後大風膏載後五色湯巫彭真君傳內治裙邊瘡茯苓三錢薏仁三錢黃柏一錢黃耆三錢荊芥一錢紅花一錢烏桕根三錢白礬一錢水煎服服數劑外用大風膏調搽自愈臟毒痔漏瘡痔瘡生於穀道肛門之邊乃五臟七腑受濕熱之毒而生者也故瘡亦甚多形亦不一有狀似菱角者有狀似蓮花者有狀似穿腸者有狀似鼠奶者有狀似花瓣者有狀似蜂窠者有狀似懸珠者有狀似鉤腸者有狀似核桃者有狀似栗子者有狀似雞冠者有狀似珊瑚者有狀似擔腸者有狀似垂珠者有狀似雞心者有狀似牛奶者有狀似羊奶者有狀似串臀者有伏似翻花者有狀似氣突者有狀似血射者更有外無形而內苦者有內外俱無形而齊苦者總之初生之時形小久則形大矣初有形之時痛尚可忍久則痛不可忍矣雖痔之形狀甚多而犯濕熱則一也夫濕熱亦易消之病何愈消而愈痛乎皆因不守禁忌貪色欲而不止叨食味而無窮遂至痔變為漏矣痔易治而漏難治也蓋痔有諸形之異而各無孔竅之破服藥尚無漏卮之虞一至成漏服飲食則泄氣矣吞藥餌則損血矣血損氣泄何能成功哉況好色者多斷欲者少欲奏異績實非易事且肛門糞口上通大小之腸前達任脈後達督脈其皮肉橫中有直正中有斜一經破損難於生合且成漏卮損傷皮肉尾閭不閉其何能合乎人肯節欲則漏猶未甚而無如明知故犯者又甚多乎所以漏病之輕重專分於欲事之多寡大約漏病有八一曰氣漏二曰風漏三曰陰漏四曰冷漏五曰色漏俗名痔漏六曰血漏俗名熱漏七曰偏漏俗名瘻痼漏八曰痿漏俗各痿腮漏氣漏者時腫時消疼脹難忍也風漏者孔竅作癢也陰漏者男婦陰內疼痛出水也冷漏者孔內出白膿也色漏者犯色流膿流精也血漏者時流鮮血也偏漏者肛門之外生孔竅出膿血也痿漏者瘡口黑爛出黃黑水也世人治法多用刀針掛線益增疼痛反耗氣血若不節食斷色未有能生之者或用熏洗點搽之藥多有愈者然內無藥餌療之亦虛歲月矣人能絶嗜欲慎氣惱淡滋味內服丸散外用洗敷雖老人尚易奏績矧中年者哉漏瘡多生於肛門穀道然亦有生於身上面上手足之上者此皆生他疽他毒久已收口不慎色欲泄精以傷化氣血一泄不已又泄又不已至於三泄而瘡乃成管終年流水流膿變成漏矣此等漏瘡較穀道肛門者少輕惟生於胸膈者頗重必須大補氣血斷欲半載加之補漏神丹服之則愈榆羊丸仲景張真君傳治痔瘡各痔無不神效地榆二兩當歸三兩羊蹄後殼三副土炒共為末飯為丸日三服於未飲食飯前服之每服三錢一月即愈不再發地榆出臟之濕熱也當歸補新血也羊蹄殼直達於直腸故用此為使且此物亦去濕熱故相濟成功牆苔散秦真人傳治痔漏久不愈者神效不測緑苔要牆上生者刮下五錢火焙乾為細末羊爪殼五副用後蹄不用前爪炒白朮二兩茯苓二兩槐花五錢白芷一兩共為細末米飯為丸每日臨臥先服一錢後壓之美膳一月即內消管化烏有矣參龜丸鬼真君傳治各痔漏神效人參一兩瓦松乾者三錢此物最不肯幹佩身半月即干妙在取人之氣茯苓五兩活龜一個將前藥各為末以綿紙同龜包之十餘層則龜不能出微火焙之龜死則用武火焙之龜死則將藥末取出另包惟焙龜干搗碎再焙乾全身用之同藥蜜為丸每日只消服三十丸不必服一料半料而漏管俱消而愈此方至神至聖但服此方至須忌房事三月鵝肉則終身忌之犯則痛生急以瓦松數條加皮硝數錢煎湯熱熏溫洗可救前方不可妄自加減一加減則不效矣用紙包龜者取龜聞藥而死也尤善消痔漏也否則功減半矣補漏神丹南陽張真君傳治胸膈漏瘡並頭面手足漏瘡俱神效人參五兩白朮三兩炙黃耆八兩金銀花四兩當歸二兩人指甲三錢各為細末蜜為丸每日服三次每服五錢一料必愈忌鵝肉一載房事三月如面漏加白芷四錢頭上加川芎一兩熏塗法醫方摘要治痔瘡腫痛皂角三挺火燒煙先熏之後以鵝膽汁調白芷末塗之即消用鬱金末水調塗亦消也墨汁散保壽堂方治痔漏瘡發旱蓮草一把根鬚洗淨用石臼擂如泥以極熱酒一盞衝入取汁飲之滓敷患處重者不過三服即安傳家祕方治腸風痔漏萆薢貫衆去土等分為末每服三錢溫酒空心服之四聖丹治痔漏如神蜂房一個淨全用去蟲將食鹽填於孔內陰陽瓦焙乾為末地龍去泥淨陰陽瓦焙乾為末五錢蜣螂取米頭者佳陰陽瓦火焙乾為末三錢廣木香末三錢象牙三錢乳香去油三錢爪兒血竭淨末五錢飛礬末三錢槐子炒黃為末三錢沒藥三錢提淨黃蠟八兩滾化入前藥和勻為丸每日清晨酒服三錢如不能飲清湯下狗腸丸治漏瘡神效黑狗腸一副煮爛加象牙末四兩細茶末四兩倍子末四兩連腸為丸如梧子每服淡鹽湯飢服三錢如不能丸少加煎蜜為丸一料必愈忌煎炒熱物尤忌房事狗腸乃直也象牙脫管也陰囊破裂漏水瘡胞漏瘡陰囊之外破裂漏水此非痔漏之漏也乃楊梅毒氣未散結於囊中也然而楊梅瘡生於身上既已全愈何外囊獨留毒乎蓋服敗毒之藥過多必傷元氣則膀胱之氣難化而毒尚存於囊中矣所以破裂漏水也治之法必須補氣以健膀胱益之分消之藥為妙斷不可更服祛毒之味重傷元氣也胞漏者囊中起窠子作癢乃搔抓破損而水遂外滴尚不至破裂而漏水此乃肝經濕熱非膀胱受毒也分消肝經之濕熱亦易奏功耳土茯苓散家傳內治陰囊破裂漏瘡土茯苓一兩白茯苓三錢薏仁五錢肉桂三分金銀花一兩人參二錢白朮二錢車前子二錢水煎服數劑外用炒黃柏一錢輕粉三分兒茶三錢冰片一分各為末摻之即愈逐濕湯治胞漏牽牛一錢大黃一錢木通一錢黃柏一錢芍藥五錢牛蒡子一錢茯苓三錢茵陳一錢水煎服二劑漸愈再用前末摻之即痊雌雄狐刺瘡狐刺瘡生於手上有雄有雌雄者單而雌者偶前人謂雄者止生一個雌者生有五七個誤也瘡內生有亂絲瘡外生有小刺雌雄無異正不必過分也大約生雌雄瘡者無不疼痛無非受竹木簽傷破皮破肉而成之也治法先用生甘草枸杞根等物煎湯洗之後用桑粉丹敷之即愈桑粉丹治雄雌狐刺瘡神效桑條燒灰存性三錢輕粉一錢雄黃一錢貝母一錢各為末先以甘草枸杞各三錢煎湯一碗洗瘡口淨多浸一會後以此四味研入米醋少許調稀入瘡口滿頻頻換之待刺去自生肌矣水流麻根瘡麻根瘡生於足後根之下色亦皮爛內有肉絲縷縷狀似麻根故以麻根名之足跟本屬足太陽之經多血少氣而人又好色者多節欲者少必至氣亦傷矣不止血之不足也況房事不節則精既耗散血不更損乎是氣血兩虧尤難醫療也治法必須用十全大補湯補其陰陽更用腎氣丸以填其精髓則氣血齊足而瘡毒易散然後用外治末藥敷之始得奏功更宜絶欲為妙否則毒不能去肌不能生亦可畏也十全大補湯載後腎氣丸輕粉三分生甘草五分黃柏一錢銅緑三分乳香五分冰片一分黃丹五分沒藥三分各研絶細末先用苧麻根一把苦參二錢煎湯一碗洗瘡臭腐後用此方藥末摻之而愈肥黏瘡肥黏瘡多生於小兒頭上俗名肥瘡頭上乃太陽經也身感風熱不散而毒乃浮於頭上遂生此瘡初生之時多黃膿暴出流黏髮根與禿瘡無異然禿瘡乃胎毒而肥黏非胎毒也以小兒好餐水果濕氣留中一遇風熱聚而外出或油手抓頭或剃刀傳染初生一二久則遍頭皆是蓋濕熱生蟲也治法先用槐條煎湯洗淨後用末藥外治不數日即愈也菊粉散巫真君傳治肥黏瘡黃菊花五錢燒灰煙膠二錢輕粉一錢枯礬一錢黃丹二錢各為末濕則干搽干則用豬油熬熟搽之神效千日瘡千日瘡生於人之手足上一名疣瘡一名瘊子一名悔氣瘡狀如魚鱗排集層疊不已不痛不癢生千日自落故又以千日瘡名之或用雞脛皮擦之自愈初生時艾灸第一個即落不再生或用蜘蛛絲採來纏於根下不數日亦落也齒垢散治疣子神效用人齒上垢不拘多少先用手將疣子抓損後以人齒上垢敷之日數次數日自落時毒暑癤身生癤毒乃夏天感暑熱之氣而又多飲涼水冷湯或好食生果寒物以致氣不流通血不疏泄乃生毒癤矣雖癰疽瘡癤多是相同而感生瘡癤則少輕也小兒多生此瘡然重者身必發寒發熱作膿而痛盡是陽瘡半發於頭上間發於身體手足不若癰疽之症有七惡之險內用清暑解火外用活血生肌膏藥末藥審而治之何難速效哉解暑敗毒飲香薷二錢蒲公英二錢青蒿二錢茯苓二錢甘草一錢歸尾一錢黃芩五分黃連五分大黃八分天花粉一錢五分水煎服十歲小兒如此大人增半小兒五歲者減半服後用膏藥可也齒踞齒踞者齒齦上長出如雞足踞長一二寸者有之初生之時微痛後則痛漸重矣往往有觸之而痛難忍者夫齒之上齦本屬足陽明胃經也胃經有毒故長齒齦也齒之下齦又手陽明大腸經也倘齦下長出屬大腸經矣總用芫花二錢煮絲線系之二日即落更用分經之藥以泄其毒則踞落不再長也白殼瘡白殼瘡生於兩手臂居多或有生於身上者亦頑癬之類也如風癬花癬牛皮癬楊梅癬皆因毛竅受風濕之邪而皮膚無氣血之潤毒乃附之而生癬矣此等之瘡非一二劑補氣補血可以速愈也故必須外治為妙更有一種小兒食母之濕乳流落唇吻積於兩頷間亦生癬瘡名曰濕奶癬與前瘡少異蓋風花牛皮楊梅癬多是風燥之瘡而奶濕瘡實濕症也惟瘡皆白殼無他異耳故皆以白殼名之大約白殼瘡俱用治頑癬方多效獨濕奶瘡用粉霜散而效速不必用頑癬之方耳頑癬方岐天師張真君傳方載後治白殼瘡癬粉霜散治濕奶白殼瘡羊蹄根三錢輕粉一錢白礬一錢天花粉二錢冰片一分兒茶一錢各為末醋調搽之一二次即效
