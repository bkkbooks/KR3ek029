body:
  text: 卷二瘡瘍死生論出生入死半是瘡瘍生死不知終難治療知其死而早為謝絶固失好生之心不知生而浪為醫治亦非起死之法所貴生死瞭然於胸中而後因症用藥即或功不能成命不可奪亦可告無罪於病人求免禍於上帝也然而瘡瘍生死最難分曉我舉其大概言之陰病見陽色腮顴紅獻者死兆也陽病見陰色指甲呈青者死兆也身熱脈細唇吻反青目珠直視者死兆也面如塗脂色若黃土油膩黑氣塗抹者死兆也唇舌焦乾鼻生煙煤眼神透露者死兆也形容憔悴精神昏短身形縮小者死兆也喘粗氣短鼻掀睛露語言譫妄者死兆也循衣摸床遺尿失禁撮空者死兆也頭低項軟眼視無神吸吸短氣者死兆也皮破無血肉綻斕斑麻木不知痛庠者死兆也齒黃色如煮豆唇白反理無紋耳黑焦枯不聽人中縮而坦平口張氣出無回閉鼻煽相隨呼吸行汗出如珠不散痰若膠而堅凝白血紅如肺色指甲彎而帶青神昏神浮神亂神離緇衣生滿面黑氣慘天庭以上皆死兆也死症外見斷無生理於必死之中而求其再生之法舍人參耆朮當熟金銀花附子別無仙丹也至於可生之症若何腫高勢大而易爛易腐此生之機也奇疼奇痛而有神氣此生之機也膿臭而能進食敗中而有紅肉此生之機也有生機者用補藥而漸能奏功無生機者用補藥而終難建績然亦有大用補氣補血之藥而益之化毒之品亦能奪命於須臾又不可委而棄之使瘡鬼泣於夜臺怨醫生之失救也又曰癰疽別死有數症其一在伏兔其二在腓腨即足肚也其三在五臟之俞穴其四在頂其五在腦其六在陰其七在耳之虛處其八在玉枕其九在舌本其十在垂膺即喉管也此十處最忌其餘或生或死未可必也瘡瘍嘔吐論凡治瘡瘍皆宜顧其胃氣蓋有胃氣則死症能生無胃氣則輕症變重重則與死為近矣可不急顧其胃氣乎惟是瘡瘍之生多傷胃氣其故何也蓋火毒侵犯之也夫火毒犯胃何以胃氣即傷以胃乃心與包絡之子也火毒外不得遽發往往內攻於心而包絡為心之相臣護衛甚力不許火毒之內侵未免號召五臟六腑同來救應胃乃心與包絡之子見君父有難奮不顧身首先勤王火毒甚熾其鋒難犯自然受創而敗而火毒乃舍包絡而直入於胃矣胃入火毒胃不自安乃上越而作嘔甚即大吐皆火毒祛之也夫同是火毒之相祛何以有嘔吐之別蓋嘔者有聲無物乃火毒之傷胃氣也吐者有物有聲乃火毒之傷胃血也雖嘔吐分氣血總之皆傷胃氣耳胃氣既傷自宜補胃矣然又不可純補胃也當觀其喜惡何如而佐之解毒之味則萬不失一也如嘔吐而大便閉結喜冷飲者宜降火清中喜熱飲而惡寒便利如常者宜養其胃如嘔而腸鳴腹痛作泄者宜托裡溫中如嘔吐後飲食頓進者宜大補氣血如瘡瘍未潰作嘔及噁心者乃毒氣內攻而胃氣素虛竟補胃而不必散邪如瘡瘍已潰而作嘔及噁心者或不食痞滿腸鳴腹痛大便利而作嘔及噦聲不絶不得安然宜托裡溫中是皆治嘔吐之樞機治瘡瘍者不可不細心而審問之也以上分別治法無非顧其胃氣也胃氣安寧服藥自然奏效何患變症之生哉彼陽變陰生變死者多是損傷胃氣耳夫火毒原能傷胃況加敗毒之藥一味呆攻禁已虛而重虛乎毋怪敗壞決裂竟至於不可救已也謂非醫殺之乎是可深痛也瘡瘍口渴論夫口渴之症未有不是火之作祟也而瘡瘍口渴尤是火毒無疑但火有陽火陰火陽火可以外水止之而陰火不可用外水也蓋愈飲外火其渴愈甚然而瘡瘍之症口渴甚多大約陽火居其七陰火居其三陽火之口渴必不甚以陽火之症內有陰水以濟之也若陰火口渴既無內水之滋惟有內火之爍故其渴更甚於陽火夫火非水不制何以飲外水而渴甚豈水不可以制火乎不知真水可以制邪火外水非真水也安得不加橫乎所以陽火宜用寒涼以少止其口渴陰火宜用溫補以止其口渴也而陰症陽症何以辨之大約陽症口渴者其脈必洪大而數實陰症口渴者其脈必細數即或洪大按之必無力然而不可拘也吾又辨其舌之燥滑也陽症舌必燥陰症舌必滑也燥用寒涼以瀉火滑用溫補以解毒又何疑乎然更須分已潰未潰而治之未潰而作渴者多是火毒之盛已潰而作渴者盡是氣血之虛故未潰之前可用瀉於補之中而已潰之後但可補而不可瀉也雖古人治法止論已潰未潰皆用加減八味丸治之大效然此乃治陰癰之法也倘是陽症其中有肉桂在內吾恐反濟其火矣雖六味丸多是補水之味水足自能制火然而星星之火能燒萬頃之山萬一火盛水不足以濟之未必不轉助其焰而動其禍也是加減八味丸以治癰疽之初發尚非法之善也蓋陰症可用熱劑而陽症斷不宜遽用熱劑又在人臨症以變通之耳瘡瘍祕結論瘡瘍之發發於火也火發必犯於心火即移其熱於大腸而閉結之病生矣夫心與小腸為表裡宜移其熱於小腸何故移熱於大腸乎不知大腸雖不與心為表裡而實與肺為表裡也心得火毒未有不轉移於肺者也刑肺即刑大腸矣況火毒最烈肺自難受自分其焰與大腸而大腸屬金最畏者火也且火又甚酷其爍金也必甚則乾燥可立而待矣或曰瘡瘍之火既分陰陽陽火宜刑大腸矣若陰火之瘡瘍宜無犯於大腸而何以偏多閉結耶夫陰火者虛火也虛火者半出腎肝肝腎之火乃雷火也雷火最能爍水試看濃陰大雨之時一聞雷震而云收雨止正爍水之明驗故雷火不動即已動則引心包之火而沸騰引陽明之火而震蕩火多則水涸水涸而大腸何能潤澤乎惟是瘡瘍之陰火乃邪火也何腎肝之雷火助之乎不知邪火出於肝腎則雷火與邪火相合竟不能分孰為邪火孰為雷火矣但火有陰陽之分而成閉結則一治法亦可相同乎而不可同也大約陽火閉結可用攻以通之陰火閉結可用補以潤之也陽火未潰之前於攻之中而顧其脫陽火已潰之後於補之內即防其通陰火未潰之前不妨化毒以潤腸陰火已潰之後切戒攻毒以傷胃蓋老幼之虛實不等少不謹慎便至死亡烏可妄用驅逐峻利之藥哉瘡瘍痛癢麻木論經云諸痛為實諸癢為虛實者邪實也虛者正虛也邪實多是陽症正虛多是陰疴凡瘡瘍之生腫而大痛者陽邪之大實也腫而微痛者陽邪之差實也小痛而大癢者陽中之陰大虛也大痛而微癢者陽中之陰少虛也大癢而不痛者陰大虛而無陽也微癢而不痛者陰微虛而無陽也更有麻木而不知痛癢為陰虛而不能通於陽陽虛而不能運於陰也論其輕重似乎痛重於癢與麻木也而孰知不然蓋瘡瘍最重者莫過於癢其次則在麻木凡陰癰初發多起於癢人見皮膚之癢手爬搔之為快往往癢變為痛遂至敗壞決裂而不可治蓋痛乃陽毒而癢乃陰毒也夫同是火毒胡為陰毒烈於陽毒大約陰癰之生半成於鬼祟之纏人祟憑人身未敢驟侵先以癢試之故初發之時每每作癢及至人自爬搔鬼無所畏乃大肆其侵凌故大癢而轉變為痛矣治之法宜於大癢之時即用大補之藥而佐之化毒之品重劑以治之則火毒隨手而散萬不可待其大痛而後治之也以陰癰之生雖成於鬼祟之纏身然必正氣大虛邪始得而入之也設正氣不虛邪將安入故救大癢之陰癰必須大補氣血為主蓋陽毒可用攻毒之劑而陰毒必須用補正之藥也或曰瘡瘍初起雖發大癢而所癢之部位不大未必皆鬼祟之纏身何必以補氣補血之大劑治之然古人云外大如豆內大如拳外大如拳內大如盤未必單言背癰也吾以為凡生瘡瘍而大癢者皆當作是想豈可以所癢之部位甚小而輕視之乎至於麻木則非大癢可比不妨緩緩治之然亦宜分已未潰也未潰之先而麻木者邪毒壅於經絡已潰之後而麻木者正氣耗於肌膚無難審量而用藥也瘡瘍寒熱論瘡瘍初起輕者不發寒熱重則未有不發寒熱者也但發熱於未潰之前者輕發熱於已潰之後者重惡寒於未潰之前者重惡寒於已潰之後者輕蓋火毒發越邪正交戰陰弱則生熱陽微則惡寒似乎未潰發熱乃陰血之衰其陽氣正旺也陽旺則火毒必熾而吾以為輕者以陽旺不至於變陰耳未潰惡寒乃陽氣之虛其陰血正勝也陰勝則瘡肉易生而吾以為重者以陰勝必至於耗陽耳已潰發熱或疑陰變陽也誰知乃陰虛而不能濟陽乎故病重已潰惡寒或疑陽變陰也誰知是陽虛而不能濟陰乎故病輕也既知寒熱之重輕見其寒而補其陽見其熱而補其陰何瘡瘍之難治乎然而寒熱無常有晝寒而夜熱有晝熱而夜寒有日夜惡寒而不發熱有日夜發熱而不惡寒又將何法以治之哉嗟乎惡寒者非寒也惡熱者非熱也見其寒峻補其陽氣而不必泄其陰見其熱峻補其陰血而不必泄其陽自然熱者不熱而寒者不寒也或曰瘡瘍之生皆火毒也不消火毒而但補其陰陽毋乃不可乎詎識正旺而邪自退也況補陽之味未嘗無消毒之味也補陰之品未嘗無散火之品也否則於補氣補血之中而寓之消毒散火之劑又未為不可耳惟是常症易治變症難治倘發熱而痛惡寒而躁又不可拘熱用補陰寒用補陽之法恐有寒盛格陽熱盛拒陰之症別當用從治之藥寒因熱用熱因寒用之為得也瘡瘍辨膿血論瘡瘍治法斷不可因循失治致養成膿往往火毒勢大爛成如盆之大而不可救療所貴於未成膿之先而急內消之也然既已成膿烏可無辨之法乎辨法奈何瘡有生熟膿有深淺多少按其瘡頭之痛與不痛軟與不軟而知之也微按之而輒痛者膿淺也大按之而痛者膿深也按之堅厚不甚熱痛者未成膿也按之軟薄而即起者有膿也不復起者無膿也有膿可針無膿不可針也膿深者可深刺膿淺者宜淺刺豈可一概刺乎近世外科醫工動謂火毒在內若不開刀侵潰好肉如肘膝樞紐關切之所筋骨敗壞必成廢人斷須外泄毋論可刺不可刺輕用刀針每有無膿之癰一開瘡口鮮血逆流立時厥去皆不審其膿之有無耳夫瘡癰有陰陽之異陽症可以刀刺陰症切戒輕易動刀蓋陽症之毒淺陰症之毒深毒淺一舉刀而毒易泄必走於外毒深一舉刀而毒難出反攻於內矣及至攻於內而爛筋壞肉則內外兩敗艱於收拾卒至死亡醫者病家皆嘆瘍癰之橫也詎知禍成於輕易之動針乎吾非禁人之用刺法也刺之當則死症可以變生刺之不當則輕病必至變重余親見數人皆因刺而危幾至不救後用參耆金銀花之類大劑煎次始得收功故引此為戒也鐸又曰辨膿之法既已盡知而辨血之法又不可不知也無膿而流血者皆五臟之氣不充也五臟之氣不充則陰虛而火動矣安得無血乎虛火動者瘡必流血當審其經以救之故肝虛而火動者血必妄行也心虛而火動者血必無主也脾虛而火動者血必難統也肺虛而火動者血必上行也腎虛而火動者血必浮遊也此臟氣之虛火如此若六腑虛火之動何獨不然然治其臟而腑亦安補其臟而俯亦戢然安腑不能安臟補臟必能補腑故補氣即是補血補血難以補氣蓋氣補即是血補氣安即是血安也瘡瘍險地論經言五臟不調致生疽六腑不和致生癰有二三日即殺人者有十餘日殺人者有一月殺人者有數月殺人者蓋火毒輕則殺人緩火毒重則殺人急也大約殺人之瘡瘍皆生於險地夫癰疽之生原無定位生於平地雖大而無危生於險地雖小而必死險地者一在腦戶一在舌本一在懸雍一在喉節一在胡脈一在五臟俞穴一在五臟系脈一在兩乳一在心鳩尾一在兩手魚一在腸屈之間一在小道之後一在九孔一在兩腨腸一在神主之舍一在伏兔一在兩鬢一在兩頤一在股胻一在兩脅一在於尻一在兩腋此皆至險之處也生此部位十人九死然初發之時急用補氣補血之味而佐之散火消毒之品亦可立時而愈轉禍為祥無如世人初發之時皆不以為急往往養成大患卒至於不可救也夫天下何人不以性命為重安於因循而失治者亦有其故蓋癰瘡發於險地者每小痛而不甚大痛每大癢而不甚小癢或發如米粒之泡或起如疥瘡之頭其狀似微小而不足介意詎知乃至凶至惡之兆乎古人云見有小異即須大驚正言險地之瘡瘍也吾願世人險地初生凶惡之兆忙急早治即服補氣補血瀉火敗毒之劑未必不救然亦須懺悔絶欲始能祟去身安否則正未可知也瘡瘍死肉論夫瘡瘍治法無非護其生肉不至於同死也然未死之肉可以護之不死未聞已死之肉可以養之重生豈特不可重生且當使之速去蓋死肉不存而後生肉可長也如癰疽各瘍如楊梅結毒臁瘡便毒疔腫潰爛等瘡其中多有死肉存蝕好肉苦痛難禁以致新肉不長徒用生肌之藥彼此兩停不勝臭腐之侵愈加敗爛毋論斷者不可復續譬毒如狼虎蛇蠍豈可共處一室自然畏避之而不敢祛況敢和合而復聚乎無怪其久而不生肉也必須用刀針割去死肉後以生肌之散敷之內助之以補氣補血之藥不必又用敗毒散火之湯自然死肉去而新肉易生外毒亡而內易補世人不知惟以敷貼膏藥為神奇全不曉存留敗腐為凶惡為可嘆息也更有瘡瘍潰後不加謹慎動生氣惱雖死肉已無而忽長胬肉亦宜用刀割去不可謂是新肉而戒用刀針也蓋胬肉脹滿礌高形突其狀難觀倘生於面目手足之間亦甚醜態故必須去之也或疑惱怒不戒何便至脹生胬肉蓋怒氣傷肝肝傷必至克脾脾主肌肉脾傷則瘡口肉脹倘畏用刀針瘡口平復必有高突之象或用烏梅燒灰少加輕粉一上即平且無痕迹又治法之巧者也
