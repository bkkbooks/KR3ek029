body:
  text: 卷十二走馬牙疳走馬牙疳小兒之病也小兒多食肥甘腸胃難化積而不散其火上炎且小兒又是純陽原多火也火多必須水解小兒食既不化何生水乎水既不生則胃火益熾齒牙又胃之部位也故火結而成疳矣牙已生疳而兒又索食所喜者必水果居多本欲得水果以解渴也誰知胃已有熱又加水濕則濕熱相合而疳病更重矣走馬牙疳者言其勢如走馬之急也火重則急火輕則緩若不早治則火爍津液牙齦蝕斷齒多脫落而死者有矣治之得法往在有響應者大約內服清胃之藥外用白綠丹無不神效也清胃消疳湯岐天師傳內治走馬牙疳石膏一錢人參三分蘆薈一錢黃柏五分茯苓一錢炙甘草三分生地一錢天花粉一錢水煎服數劑必輕白綠丹外治走馬牙疳人中白一錢煅銅綠三分麝香一分蚯蚓二條蔥白汁浸火炙為末各為細末敷之立愈口疳口生疳瘡皮破涎流重者每每血出甚而唇吻腮頰俱爛此乃胃中有熱又食生冷水果重添其濕濕熱相兼因其生疳而至爛內生細蟲以蝕皮蝕肉也夫胃中濕熱何上發於口蓋口乃脾之竅也胃本無竅而脾乃胃之妻也況脾胃為表裡脾之竅即胃之竅也而胃之經絡又左右而繞唇口且熱乃火也火性上炎濕借火而上沸故口上應之也治法內服瀉胃之熱導脾之濕外用欖核散搽之可計日而愈矣瀉導湯治口生疳瘡石膏一錢茯苓二錢滑石二錢澤瀉一錢五分甘草五分黃柏一錢貝母一錢水煎服小兒減半二劑即用搽藥欖核散外治口瘡橄欖干一錢兒茶一錢冰片五釐白薇三分生甘草三分百部三分各為細末日日搽之每日搽五次數日即愈鼻疳鼻內生瘡癢時難忍欲嚏而不能欲忍而不得言語糊塗聲音閉塞此鼻疳也夫鼻之竅乃肺之竅也肺病而氣難宣則鼻乃生瘡矣故鼻疳雖是鼻之病其實肺之病也夫肺病宜肺內生癰乃不生於肺中而生於鼻之內者以熱而兼濕也熱乃火也濕乃水也水能制火故火在肺而不致生癰火炎於鼻而水不能上升鼻之竅細小然不能散火也故成疳而不成癰矣雖不成癰而疳之毒亦不易化去其濕熱則水下行而火上散然後以外藥吹之則氣通而毒消矣化散湯岐天師傳內治鼻疳青黛二錢桔梗二錢白芷八分百部一錢茯苓三錢木通一錢黃芩二錢天冬三錢玄參二錢甘草一錢辛夷五分水煎服四劑通氣丹家傳外治鼻疳兒茶三錢蘇葉一錢雄黃一錢輕粉五分冰片一分鍋臍煙五分細辛三分各研為細末吹入鼻孔中日三次數日愈綠白散外治鼻疳且治腎疳頭瘡耳瘡俱效石綠一錢白芷一錢黃柏一錢為末先以甘草水洗瘡拭淨敷之一日即愈喉疳喉疳之瘡即雙蛾之症也有陰有陽陰乃少陰之君火陽乃少陽之相火也二症最急若不早治一二日間死生系之輕緩而重急也陰火症用八味地黃湯神效陽火症內服解火之劑外用吹藥亦效應如響總不可緩治之也八味地黃湯仲景張真君方治陰症喉疳熟地一兩山藥四錢山茱萸四錢茯苓二錢丹皮二錢澤瀉二錢附子一錢肉桂一錢水煎一碗探冷服一連數劑全愈牛黃至寶丹岐天師傳治陽火口疳牛黃一分膽礬二分皂角末一分麝香三釐冰片一分兒茶五分百草霜一錢共為末和勻吹入喉中五釐必大吐痰而愈後用煎劑救喉湯救急湯岐天師傳治陰陽二火喉疳青黛二錢山豆根二錢玄參五錢麥冬五錢甘草一錢天花粉三錢生地五錢水煎服數劑不再發月蝕疳月蝕疳者多生於耳邊或耳之下也此瘡小兒生居多然足陽明胃經無濕熱與足少陽膽經無鬱氣則不生此疳也然此乃小瘡耳不必內治倘其瘡大而蝕不止者必宜內治為佳內治之法瀉胃與小腸之濕熱而外用末藥調搽斷不久延也設或瘡蝕不大是濕熱不熾何必用內治之法哉龍化丹岐天師傳治月蝕疳黃丹一錢赤枯礬一錢蚯蚓糞三錢冰片一分輕粉三分煙膠一錢爐甘石一錢各為末研細用香油調搽數日即愈粉灰散岐天師傳治小兒耳爛生瘡輕粉一錢棗子燒灰一錢蚯蚓糞火焙乾五錢生甘草五分各研末油調搽即愈旋指疳疳瘡生於手足最不易治以十二經井穴多起於手足也井穴既有十二經之分則疳生於少商宜治肺生於少衝宜治心生於大敦宜治肝生於隱白宜治脾生於湧泉宜治腎矣生於中衝宜治心包絡生於商陽宜治大腸生於少澤宜治小腸生於竅陰宜治膽生於厲兌宜治胃生於至陰宜治膀胱生於關衝宜治三焦矣然而手足者四肢也四肢屬脾之部位故疳雖生於十二經之井邊而治法斷不可單治井經也蓋疳之生也本於脾臟之濕熱也濕熱善腐諸物長夏正濕熱盛之時也不見萬物之俱腐乎故治法必須治脾之濕熱為主治脾而胃亦不可置之也脾胃表裡治則同治耳或見疳生於井穴少分各井而佐之何經之藥尤治之神也加味五苓散祖傳治手足旋指疳白朮二錢蒼朮二錢金銀花五錢豬苓一錢五分澤瀉一錢五分肉桂二分龍膽草二錢茯苓三錢天花粉三錢水煎服四劑後以外治治之六星丹岐天師傳外治旋指疳神效兒茶五錢雄黃一錢冰片二分輕粉三分滑石二錢血竭五分各為絕細末先以炙甘草三錢苦參五錢煎湯洗之後搽之袖手疳袖手疳者生龜頭之頸上皮包乾內而外不顯也凡龜頭生疳瘡多是淫毒所感因嫖妓而得也然而因嫖而生者不止生於龜之頸今止生於龜頭而外又皮裹之乃腫於皮肉之內也非淫瘡實熱瘡也內用瀉火祛毒之藥數劑然後以外藥水浸之自必收功暗治飲治袖手疳黃柏三錢茯苓五錢蒲公英三錢柴胡一錢白芍五錢生甘草一錢龍膽草一錢豨薟草二錢水煎服服數劑外護丹豬膽二個取汁龍膽草三錢煎汁蚯蚓五條搗爛用二汁淋洗去蚯蚓加入冰片末三分入雞蛋殼內套在龜頭上浸之漸愈臊疳臊疳生於玉莖之上亦楊梅之先兆也然梅瘡甚毒多得之於妓女龍陽之子倘未交二種止於妻妾中得之此自己本有濕熱或加惱怒而強暴動淫亦能生瘡瘡名臊疳以肝性主臊故疳亦以臊名之也內用平肝之劑外用六星丹搽之無不痊也化淫消毒湯白芍一兩當歸五錢炒梔子三錢蒼朮三錢生甘草一錢金銀花一兩青黛三錢生地三錢土茯苓五錢水煎服四劑愈陰疳陰疳者生瘡於陰戶之內也時痛時癢往往有不可忍之狀其氣腥臊作臭無物可以解癢倘愈交接則愈痛矣最可憐之症也此瘡多因於欲火之動而又有濕感之火炎水流兩相牽制留而閉結乃化而生瘡久則生蟲也此蟲雖生於陰戶然實化於肝腎或思男子而不可得火以成之也或交男子而感其精毒以長之也總無濕不生蟲亦無濕不生瘡也當細察其由來治之內治之後仍以外治同施鮮不即痊矣加味逍遙散家傳方內治陰疳柴胡二錢白朮五錢茯苓三錢甘草一錢白芍五錢陳皮一錢當歸二錢炒梔子三錢荊芥一錢防風五分龍膽草二錢天花粉二錢玄參五錢水煎服八劑桃仁散岐天師方外治陰疳桃仁二十一粒研爛雄黃末二錢白薇末二錢炙甘草五分各研細末蘸雞肝內納陰戶中日三易之先用針刺雞肝無數孔納之妒精疳妒精疳乃生於玉莖亦臊疳袖手疳之類也人生最妒而精亦妒精妒症有二種一妒不潔之精一妒太潔之精也不潔之精必有毒氣太潔之精必有火氣故玉莖不交敗精之陰戶斷不生疳陰戶蓄精尚未流出一旦重接鮮不生瘡矣此等之疳其症尚輕外用五根湯洗之再用首經散搽抹則愈矣不必又用敗毒湯劑而內治之也首經散岐天師傳治妒精疳瘡並治諸疳室女首經抹布燒灰加輕粉二分冰片一分各研細末搽之立效無辜疳傷瘡無辜疳瘡乃鳥糞或羽毛從天下降於人身感而生疳瘡也蓋各鳥所食多是蛇蠍蜈蚣之類其糞最毒而羽毛亦未嘗不毒也小兒不知其故或逢落或見糞墮羽可珍手攜口銜其毒因之而入於臟腑久則發出於皮膚乃生瘡生疳矣或生於腦後或生於項邊結核如彈丸推之則動軟而不疼歲久失治羸瘦壯熱便膿便血頭骨縫開肢體生瘡而潰爛矣治法亦須消毒為主小兒得此尤宜早治消辜湯岐天師傳方治無辜疳瘡天花粉一錢貝母一錢薔薇根三錢杏仁十四粒桔梗一錢黃礬五分白蒺藜一錢烏梅一個檳榔五分烏桕根二錢白芍二錢人參五分水煎服十劑可消大人倍之湮尻瘡湮尻瘡生於新生之兒或在頤下項邊或在頰肢窩內或在兩腿丫中皆濕熱之氣湮爛而成瘡也夫小兒新生何遽多濕熱雖遺尿小便未易即干然下身或多潮氣不宜上身而亦沾染也蓋因乳母繃縛手足看顧不到適逢天氣炎熱蒸裹太甚因而湮爛身中本無濕熱何必又治濕熱之多事乎將伏龍肝一味不拘多少搗極細末佐之滑石末少許不可太多摻在患處用紙隔之即愈龍石散治湮尻瘡伏龍肝不拘多少為細末滑石少許各為極細末和勻摻在瘡上外用草紙隔之數日即愈落臍瘡落臍瘡乃小兒之症也小兒自落臍帶之後何便生瘡夫臍人之命根也此處生瘡多變風症風症一成命根將絕去生便遠可不亟治之乎不知臍落生瘡亦感染水濕而成之也必因乳母失於照管落臍之時臍汁未乾或加溺以傷之或洗浴而不加拭揩遂致濕以加濕而瘡口遂至於不合也治宜去濕為主而少加生肌之藥則臍復完固無濕而瘡自愈也去濕生肌散岐天師傳方治落臍後生瘡茯苓一錢貝母三分枯礬三分草紙灰五分雄黃二分三七三分共為末入在臍內用紙包之即愈臍漏瘡臍中生瘡時時流膿血名臍漏瘡皆不慎欲縱色或因氣惱而故借房幃以怡情消忿遂至生瘡成漏也若但治漏瘡而不絕欲戒氣斷有死亡之禍必須內治為佳縱色者用補中益氣加熟地山茱以治之動怒者亦用前方加白芍當歸丹皮熟地以治外更用艾灸臍上加生肌散填滿臍口一日一換始可奏功也加味補中益氣湯祖傳方內治臍漏瘡人參三錢黃耆五錢白朮一兩當歸三錢柴胡八分升麻四分生甘草一錢陳皮一錢金銀花一兩水煎服縱色者加熟地一兩山茱萸四錢動怒者加白芍藥一兩當歸二錢丹皮三錢熟地五錢生肌散外治臍漏瘡方載後卷金刃瘡附自刎金刃瘡乃刀傷之瘡也誤傷者心不動而失血其症輕自刎者心大動而失血其症重或自割其皮自切其肉倘無激怒而傷之其症猶在輕重之間惟涕泣而刎頸鬱怒而斷指其症皆重也蓋破傷血失則止有一線之氣相養使五臟平和尚可補氣以生血活血以生肌也苟或求死不得而傷心更甚補氣必至添嗔活血必至開裂安能服藥以收功乎必須勸其解怒以平肝消愁以養脾寬懷以安心然後用補氣補血之藥而佐之止痛生肌之味始可奏效否則瘡不能愈而命不可奪也加味補血湯祖傳治金刃自傷將死者俱可救若傷輕者減半救之生黃耆一兩至二三兩當歸五錢至一二兩三七末五錢沒藥末二錢白及三錢至一兩白芍五錢水煎服數劑斷無性命之憂完膚丹岐天師傳外治金刃傷血出最神效三七末一兩乳香末二錢陳年石灰一兩血竭三錢婦人褌襠末一錢人參二錢各為細末摻上即止血生肌如金瘡作痛先用牛膝搗敷立止梅師方也火燒瘡火燒瘡遍身燒如黑色者難救或燒輕而不至身黑者猶可療也然而皮焦肉卷疼痛難熬有百計千方用之而不驗者以火毒內攻而治之不得法也故治火燒之症必須內外同治則火毒易解也救焚湯岐天師傳內治火燒瘡當歸五錢丹皮三錢生地五錢甘草二錢苦參二錢生蘿蔔一大個搗汁槐花三錢黃連一錢同煎服服數劑外以末藥敷搽自愈六仙散岐天師傳外治火燒如神黃葵花一兩曬乾為末大黃一兩滑石一兩劉寄奴三錢井中苔五錢身佩為末絲瓜葉二十片曬乾為末以蜜調敷不痛且易生合又不爛也神效平日修合臨時恐不能成湯燙瘡湯燙瘡乃百沸湯滾熱油與滾粥等物忽然猝傷因而遭害遂至一時皮溻內爛成瘡也此等之瘡正所謂意外之變非氣血內損也輕則害在皮膚重則害在肌肉尤甚者害在臟腑害在臟腑者多至殺人然內治得法亦可救也內用托藥則火毒不愁內攻外以蚌津散汁數掃之即應驗如響如焮赤潰爛用歸蠟膏拔毒止痛尤易生肌祛火外消湯岐天師傳外治湯燙油燒等症神驗地榆五錢白及三錢柏葉三錢炒梔子二錢白芍五錢當歸五錢生甘草一錢水煎服二劑傷輕者藥減半蚌津散外治湯燙油泡等症方載後二黃散傳世方大黃炒黃柏炒各為細末以雞子清調之搽上最妙衛生寶鑑用苦參末香油調敷亦效毛粉散繆仲淳傳治湯火傷神效豬毛煅存性研細末加輕粉白硼砂少許麻油調和敷之立效無瘢痕歸蠟膏治湯火傷瘡焮赤潰爛用此生肌拔熱止痛當歸一兩黃蠟一兩麻油四兩以油煎當歸焦黃去滓納蠟攪成膏出火毒攤貼最效出和劑局方又方王不留行焙乾為末麻油調敷或絲瓜葉為末如前調亦妙含腮瘡含腮瘡生於兩頰之上大人小兒皆有之此瘡初生時如水痘大一小瘡也日久漸大蝕破腮頰故以含腮名之皆好食肥甘以至成毒而生瘡也必須早治之不可因循時日日久破透腮頰反難治療先以鹽湯時時漱口次用二金散敷搽即可愈也二金散世傳方外治含腮瘡最效雞內金一錢鬱金一錢各為末先用鹽湯漱淨次用藥上之數次即效皴裂瘡皴裂瘡皆營工手藝之輩赤手空拳犯風弄水而成者也不止行船推車打魚染匠始生此瘡皮破者痛猶輕紋裂者疼必甚論理亦可內治然而辛苦動勞之人氣血未有不旺者亦無藉於內治或帶疾病而勉強行工者即宜內治又恐無力買藥不若外治之便矣先用地骨皮白礬煎湯洗之至軟次用蠟羊油煉熟入輕粉一錢搽之為神八珍湯加減內治皴裂瘡當歸二錢芍藥三錢生甘草一錢茯苓二錢白朮一錢熟地三錢川芎八分薏仁三錢水煎服數劑可止皮礬散外治皴裂瘡地骨皮五錢白礬三錢煎湯洗之至軟後用蠟羊油熬熟一兩入輕粉一錢研為末調勻搽之即愈漆瘡漆瘡者聞生漆之氣而生瘡也蓋漆之氣本無大毒以漆能收濕人之肺經偶有微濕而漆氣侵之則肺氣斂藏不敢內潤於皮毛而漆之氣欺肺氣之怯反入於人身彼此相格而皮膚腫起發癢矣癢必至於抓搔抓搔重而發疼不啻如火之制膚而燥裂也倘用漆之時用蜀椒研末塗諸鼻孔雖近於漆器亦不生瘡無如世人之懶用也如一時聞漆之氣即用薄荷柳葉白礬煎湯飲之亦不生瘡即既已生瘡以此三味洗之三五遍亦愈矣若猶不愈以蟹黃搽之內服芝麻油一二碗無不安也千金方治漆瘡作癢芒硝五錢煎湯遍癢處塗之即止又方治漆瘡作癢貫眾研末油調塗即愈又方神效荷葉一片煎湯一二碗少溫洗之即愈凍瘡凍瘡犯寒風冷氣而生者也貧賤人多生於手足富貴人多犯於耳面先腫後痛痛久則破而成瘡北地嚴寒尤多此症更有冷極而得者手足十指尚有墮落者以犬糞經霜而白者燒灰芝麻油搽調最妙倘氣虛者必須補氣血虛者必須補血外用附子末楝樹子肉搗搽自愈倘用甘草黃柏松葉大黃之類俱不見十分全效矣至手足墮落者止可存其手足用補中益氣之劑救之十指不能不爛未必能重活之也狗糞散外治手足凍裂干狗糞為細末用白糞為炒燒灰存性以絕細為度麻油調敷數次即愈用西瓜皮柏油等藥俱不效此方特奇箭毒瘡箭毒瘡因箭頭鐵鏃用毒藥煮過而人身中傷必疼痛欲死也近人用箭未必皆用毒藥矣倘若中毒必須解毒為妙有箭頭在肉不出者若無毒不必用刀割之必用醃久豬腿骨頭以火炙一邊必有油髓流下以器盛之俟其流下取油搽其箭傷之處必然發癢再輕輕頻搽久則箭頭自外透出矣如有毒而沒入者必用刀割肉取出大約有毒者內外皮肉皆黑但紅黃不變黑者乃無毒之箭傷也凡毒箭傷而去其鏃頭者必須覓婦人月水洗之方解其毒耳山羊酒岐天師傳治箭頭不出並可治跌打損傷山羊血一錢三七三錢為末黑糖五錢童便一合酒一碗調勻飲之不必大醉久則傷氣必癢箭後漸出近皮一拔即出以三七末敷之
