body:
  text: 卷十三跌打損傷瘡附破傷風跌打損傷瘡皆瘀血在內而不散也血不活則瘀不能去瘀不去則折不能續初傷之時必須內服活血止痛之藥外用三七研末加酒調爛敷之痛即止血則散瘡上如沾三七末乾燥再不潰矣如不沾者頻用三七末摻之多用三七藥末調服尤妙倘不破損用前藥不效者此日久瘀血留中非草木之味所能獨散也必須加入水蛭三錢當歸大黃白芍治之連用三劑瘀血無不即散而痛亦止矣三劑之外斷不可多服仍單服三七未有不愈者矣如破傷風頭痛寒熱角弓反張如痓狀用蠶鱉散最妙散瘀至神湯岐天師傳方治跌打損傷至重者三七三錢當歸五錢白芍五錢大黃三錢丹皮三錢枳殼一錢桃仁十四粒生地五錢大小薊三錢紅花一錢水酒各半煎八分服如日久疼痛或皮肉不破而疼痛加水蛭切碎如米大烈火炒黑研碎煎前藥煎好加入水蛭末吞服三劑則不痛矣其水蛭必須炒黑萬不可半生則反害人矣蠶鱉散傳世方治破傷風瘡川芎一錢當歸一錢五分紅花四分羌活六分防風八分白殭蠶一錢二分土鱉蟲七個搗碎穿山甲三大片酒炙柴胡七分生甘草四分水酒各半煎八分服下部加牛膝一錢日曬瘡日曬瘡乃夏天酷烈之日曝而成者也必先疼後破乃外熱所傷非內熱所損也大約皆奔走勞役之人與耕田胼胝之農夫居多若安閒之客安得生此瘡乎故止須消暑熱之藥如青蒿一味飲之外用末藥敷之即安青蒿飲祖傳治日曬瘡青蒿一兩搗碎以冷水沖之取汁飲之將渣敷瘡上數日即愈如不愈另用柏黛散敷之柏黛散祖傳外治日曬瘡並治火瘢瘡黃柏二錢青黛二錢各研末以麻油調搽即愈虎噬瘡虎噬瘡乃遇虎咬傷之瘡也虎之捕人如貓之捕鼠有毒涎惡炁噴人之面人輒膽喪一時昏憒失神即自褫其衣以謝虎而虎不知其悔罪而吞噬矣故凡人遇虎不必自解其衣若不解衣者虎不敢食即有所傷必可救也以人非虎食耳然而人被虎傷者血必大出其傷處之口立時潰爛其疼不可當以虎之爪牙最毒一有傷損則毒侵肌膚未有不爛者矣急用豬油貼之無豬油則用豬肉亦可隨貼隨化隨化隨易則疼痛少緩急用榆根散摻之隨摻隨濕隨濕隨摻血必止矣一止血而命可奪也世有一遇虎損以香油灌一二碗以祛毒仍用香油以洗瘡亦佳然終不若吾法之奇也倘內服安神益氣之藥外用玉真散生肌等藥尤妙榆根散治虎噬載末卷又方地榆二兩煮汁飲併為末敷之亦可為末白湯調服一兩作三次飲忌飲酒犬咬瘡犬咬瘡多在人身兩足並腿上也間有咬傷兩手者急用生甘草煎湯洗之則毒散而不結黃用玉真散或搽或服皆可無恙也惟瘋犬傷人其毒最甚急打散頭髮頂內細看有紅髮如銅針者即拔去次以地骨皮一把約一兩煎湯洗去黃內亦服之又用地龍糞為末將咬傷處封好口出犬毛即無虞矣倘人已發狂如狗狀大小便俱閉外勢急痛腹脹甚者前方又不能解亟用活命仙丹解其熱毒斷不死亡也活命仙丹岐天師傳治瘋狗咬傷木鱉子三個切片陳土炒斑蝥七個去頭足米一撮炒大黃五錢劉寄奴五錢茯苓五錢麝香一分各研細和勻黃酒調服三錢一服而毒氣熱氣全解重者二服必愈咬七日內者皆能建功過七日外必須多服數劑無不可救千金方家傳治犬咬傷紫蘇葉三片薄荷葉十片嚼敷之自愈經驗方治犬咬舊屋瓦上刮下青苔屑按之即止鼠齧瘡鼠齧瘡或因捕鼠被傷而得者也鼠膽最怯豈敢咬人因人捉拿甚急不得已咬傷人皮肉以冀脫逃是奪命心急故咬傷亦重也夫鼠技有限何足害乎不知鼠齒細長齧肉必傷筋骨況鼠涎原有毒也筋肉既破必透入鼠涎故往往爛穿筋骨矣宜用貓尿搽其傷處其毒隨散後以末藥敷之數日即愈也禁鼠丹岐天師傳治鼠傷瘡貓糞一錢輕粉一分三七根五分各焙乾研細為末填滿瘡口即結靨而愈馬汗瘡馬汗瘡沾馬汗而爛者也馬汗沾無瘡之人何能生瘡惟原生瘡之人最忌馬汗入於瘡內蓋馬性最動瘡沾其汗欲收口者不收欲生肌者不生矣生者不生收者不收必有變動難愈之苦或焮腫或疼痛者有之治法以冬瓜皮絲瓜葉煎湯洗之另用末藥摻搽自愈靜寧散岐天師傳治馬汗瘡輕粉三分五倍子一錢炒古石灰絲瓜根灰一錢冰片一分殭蠶炒一錢摻之即愈如瘡干痛加生甘草五分以蜜搽之靈苑方治馬汗入瘡腫痛急療之遲則毒深生烏頭為末敷瘡口良久有黃水出即愈火瘢瘡火瘢瘡乃天氣嚴寒向火烘手炙傷皮膚因而成瘢變成痛瘡者也此瘡貧窮之人居半卑弱之人居半也氣血內虧火焰外逼當時不知炎威久則天溫有汗氣血回和因而作痛矣外用薄荷荊芥苦參各等分煎湯洗之如已破用柏黛散摻之無不速痊荷芥湯外治火瘢瘡薄荷二錢荊芥二錢苦參二錢煎湯一碗洗之即愈如破用柏黛散搽之灸火瘡灸火瘡用艾火灸穴治病而成者也灸穴不發不可然過發亦不可過發必至疼痛宜用太乙膏貼之如無太乙膏春月用柳絮夏月用竹膜秋月用新棉冬月用壁上錢貼之亦能止疼也如炙瘡血出不止者莫妙用黃芩為末酒調服二錢無不止者此李樓怪症奇方也然用之實驗甚濟生秘覽方治灸瘡不斂神效並可斂惡瘡瓦松陰乾為末先以槐枝蔥白湯洗後摻之立效汗漸瘡汗漸瘡乃肥人多汗久不洗浴淹漸肌膚因而成瘡者也亦有皮破血出而作痛者古人以真蛤粉滑石末摻之自愈實妙法也蛤粉散治汗漸成瘡真蛤粉五錢滑石末五錢二味摻瘡上即愈獨骨瘡獨骨瘡生於頤頦之下大人小兒皆有之而小兒居多乃口津下流積滯之故也如是大人乃任脈虧損宜用內治如小兒外治易愈不須用內消之藥但少食瓜果則得矣燥津丹岐天師傳治大人獨骨瘡茯苓三錢白朮三錢薏仁五錢山藥五錢白果十個甘草一錢黃柏二錢陳皮五分天花粉一錢五分水煎服以愈為止制津丹世傳治小兒獨骨瘡百合一兩黃柏一兩白及三分蓖麻子五十粒輕粉五分上為細末搽之如干者以朴硝水和餅貼之竹木簽破傷水生瘡傷水瘡者因誤被竹木簽破皮膚又生水洗之潰而疼痛或魚刺諸骨破傷久而不愈同用黃丹蛤粉文蛤等分同炒變色摻瘡口上漸次而愈如刺已入肉搗鼠腦同鹿角末同塗傷上即出如骨刺入肉用象牙刮末厚敷其刺自軟即出也梅師方治竹木針刺在肉中不出疼痛王不留行為末調熱水方寸匕以根敷即出蛇咬瘡蛇咬瘡最毒不止虺蛇也或在足上或在頭面或在身腹之間疼痛異常重者必至足腫如斗面腫如盤腹腫如箕五日不救毒氣內攻於心而人死矣蓋蛇乃陰毒陰毒以陽藥解之其毒益熾必須用陰分之藥順其性而解之為妙外治之法最神者取半邊蓮草搽而擦之頃刻即安隨用祛毒散飲之三劑即全愈外治之方如蜈蚣散亦神皆可用也若蛇誤入人孔竅之內即以針刺其尾則自出不過二三針也北直田野間一婦人小遺蛇入陰戶竟不知用針刺尾之法卒至暴亡可憫也余故特志之以傳世云祛毒散岐天師方內治蛇咬瘡毒白芷一兩生甘草五錢夏枯草二兩蒲公英一兩紫花地丁一兩白礬三錢水煎服三劑全愈蜈蚣散伯高太師傳外治蛇咬白芷一兩取白色者雄黃五錢蜈蚣三條樟腦三錢各為極細末以香油調搽腫處隨干隨掃蛇毒盡出而愈蜈蚣叮瘡蜈蚣叮人雖不成瘡然痛亦苦楚蜈蚣有二種一赤足一黃足黃足者叮人痛輕而不久赤足者叮人甚久而痛重以赤足之毒勝於黃足也倘為所咬以蝸牛之涎搽之其痛即止如北地無蝸牛用雞冠血塗之有雄黃末捻香油紙條點火熏其傷處立刻止痛或以山茱萸一粒口嚼敷之亦妙更有人誤食蜈蚣遊過之物腹痛者以紫金錠研碎薑湯調飲半錠嘔吐而愈蝸牛散治蜈蚣咬傷作疼雄黃末一錢蝸牛一條搗爛敷患處即平口嚼山茱萸一粒敷患處即止痛取蜒蚰塗上即止痛神驗蠍傷瘡蠍傷最毒以蠍得至陰之惡氣也凡一螫人痛至雞鳴乃止即以冷水漬指並手即不痛水微暖便痛即易涼水再漬以青布拓之實驗蠍有雄雌雄者痛在一處雌者痛牽諸處以山茱萸一粒嚼以封之立愈取人參嚼敷尤妙千金方治蠍蠆叮螫水調硇砂塗之立愈蜂叮瘡蜂之叮人有毒刺入肉內即須挑去以尿泥塗之即止痛肘後方青蒿嚼碎封之即安蝲蟲傷痛蝲蟲傷人其毒在毛而不在口如楊蝲瓦蝲之類凡有蟲而帶毛者皆需忌之勿使之刺人肌膚也若一犯之則皮膚腫痛如火之燎矣以淡豆豉搗敷之但有毛外出即不痛如毛未出仍痛再擦之須得毛出始安如無豆豉或醋或鹽滷芝麻油洗之皆效蠼螋尿瘡蠼螋尿瘡乃蜘蛛之尿溺於人身頭上而生瘡也瘡如粟粒累累似蝲蟲螫痛或發熱惡寒此重者也有生瘡而人不知疼痛者此毒不重而輕者也磨犀角塗之最效或以苧麻縛搓去瘡汁再加黃金散敷上即安或取燕窠中土和醶醋塗之大良直指方仁齋治蜘蛛咬毒縛定咬處勿使毒行以貝母末酒服五錢至醉良久酒化為水待瘡口出水盡仍塞瘡甚妙人咬傷瘡人咬成瘡皮破血流往往有潰爛者以人咬人何如是之重乎不知兩人廝打至以口咬人其忿怒之氣亦甚不平矣心既憤激口齒安得無毒哉此所以潰爛耳故身體一被咬傷血流之時即為施治則毒氣尚未深入自然易痊方用醋洗其傷破之口隨用敗龜板燒灰為末香油調搽無龜甲即用鱉甲亦妙萬勿聽其潰爛至於毒氣之深入反難速愈也砒霜累瘡人服砒霜其火熱大毒內攻臟腑而四肢身體必外生紫累之斑與生瘡無異此火熱之毒攻突內外也其勢最急古人急挖地一大坑以井水滿之令攪渾濁取水一碗與飲之少刻又與之待渾身紫累俱散一吐即蘇甚妙然單用地漿鐸猶以未善也鐸受異人傳方加入苦參二兩煎湯入於地漿中飲之更神別有數方無不神異服之皆可救因備載之苦參湯治服砒霜累瘡苦參二兩煎湯一碗同地漿飲之即大吐而愈救死丹治中砒毒累成瘡死亡頃刻生甘草二兩瓜蒂七個玄參二兩地榆五錢水煎服一下喉即吐再煎渣服又吐即毒解而愈瀉毒神丹治中砒毒發紫累用前藥不吐急用此方瀉之大黃二兩生甘草二錢白礬一兩當歸三兩水煎服數碗飲之立時大瀉即生否則死矣水漬手足丫爛瘡手足乃四末也屬脾而最惡濕以脾為濕土以濕投濕安得不助濕乎濕以加濕此濕瘡之所以生也況勞苦之人以其手足日浸漬於水漿之中烏能保皮膚之堅硬乎手足十指未免開裂而腐爛矣幸其氣血尚健不必內治但用外治而可愈外治用密陀僧煅赤置地上去火性碾細末先以礬水洗足拭乾然後以前藥敷之次日即能行動矣倘氣血衰憊用補中益氣湯多治當歸加之尤效也陀僧散世傳治腳丫濕爛密陀一兩輕粉一錢熟石膏二錢枯礬二錢為末濕則干敷干則桐油調搽一方用柏子油一兩明雄黃末五錢調搽亦效試驗方談野翁治腳縫出水好黃丹三錢花蕊石一錢研絕細末摻之即止水手足麻裂瘡麻裂瘡生於手足與皴裂瘡相同然皴裂瘡生於四季而麻裂瘡生於冬時也雖俱是貧寒主人不顧風雨以致手足之間開裂然亦天氣嚴寒過於血燥血不能潤膚遂至於開裂而成瘡也故治法略宜少異外以蘿蔔汁煎洗之次以臘月羊脂燃油滴入裂口即愈如無羊脂以白芨研細末熱水調稠滴入裂口亦效倘血不足者用四物湯加減飲之尤妙加味四物湯內治手足麻裂瘡熟地五錢川芎二錢當歸五錢白芍三錢荊芥炒二錢白芨末二錢水煎調服四劑眼丹胞眼胞為肉輪屬脾胃乃土之象也人肉輪上生胞紅腫而作膿名曰眼丹又名眼狐貍此胃火沸騰而上熾於目也宜用三黃湯加減治之外用水澄膏塗之可愈加減三黃湯祖傳內治眼丹胞石膏三錢黃芩一錢黃連一錢黃柏一錢炒梔子一錢五分柴胡一錢夏枯草五錢天花粉二錢赤芍三錢水煎服四劑漸消偷針眼眼角上生小瘡癤腫起乃心膽小腸之火也火重則生火衰則輕毋論大人小兒往往皆生此瘡凡生此瘡者必須胸背之上覓別有小瘡否如或有之瘡窠上累累者宜用針刺出其血眼角瘡自愈矣倘若未愈宜診其脈看何經火盛用藥微瀉之必愈
