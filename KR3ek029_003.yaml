body:
  text: 卷三瘡瘍生於富貴論瘡瘍之生無分富貴貧賤然而貧賤之人往往易治富貴之家每每難治其故何也蓋富貴之家所食者燔熬烹炙之物也居處安逸姬妾衆多未免逸則思樂樂則思淫淫則泄精必甚泄精既甚則腎水虧涸水去而火必動火動而水更衰必至陰陽兩虧臨壚不振於是服熱藥以助之又嫌藥力之微也復修合金石等藥以博其久戰之歡然而金石之藥止可助火而不能助氣夫助氣之藥舍人參無他味也惟是富貴之人貪歡者多而吝惜者正復不少用熱藥以助火非多加人參不足以駕馭其猛烈之威無奈人參價高方士勸多用人參富貴人必有難色乃遷就而改用他味未免力薄勢衰火旺無制而腎火沸騰矣火勝則外勢堅舉而不肯倒自必多入房以快欲愈戰愈酣火益熾而水益干水乾則難以伏火而熱乃化毒結於腸胃矣久之水涸火炎陽易舉而亦易泄心甚貪歡或有忍精強戰之時火毒乃變為膿血每於不可思慮之處而生癰生疽也故貧賤之人所生者半是陽毒而富貴之人所生者盡是陰瘡以其結毒在於陰處故所發亦在陰之部位陽毒易消陰毒難化又何疑乎雖然陰陽之毒總貴早治治若早皆可速愈但陽易清補以消毒陰宜溫補以化毒也疔瘡形症論疔瘡之症其形多端近人有分三十四種者亦象形而名之也其實分五色以配五臟庶足以包之不必多立名色也如疔生於心經其色赤其形生於心臟之俞募經井之端或手之小指身熱心煩睡臥不安口乾燥其痛應心小便短赤面紅紫舌上有裂紋或有珠子如疔生於肝經其色青其形生於肝臟之部位或在脅肋或在足之大趾之端其症寒熱頭項痛眼中發火光口苦脅痛小便難而清如疔生於脾經其色黃其形多生脾臟之部位其症不食多嘔吐如疔生於肺經其色白其形多生肺臟之部位經絡或生於手之大指其症發熱咳嗽如疔生於腎經其色黑其形多生於腎臟經絡部位足之小趾湧泉等穴其症寒熱面色䵟此五臟之疔也凡見色黑者即治其腎凡見色白者即治其肺凡見色黃者即治其脾凡見色青者則治其肝凡見色紅者即治其心而佐之解毒托裡之藥何疔之不盡愈乎況因其形色而察其經絡尤百不失一也此古人所以止言五疔而不多其名目者誠得其要也然吾更有兼治之法一見諸般疔毒除頭項之上開手即用艾火灸之痛者灸至不痛不痛者灸至痛而止隨用金銀花三兩紫花地丁一兩白礬三錢生甘草三錢當歸一兩水煎服之則各疔無不盡愈倘人畏灸即單以此方煎服二劑亦無不盡愈者也雖有緩急之分生死之異皆不必問惟色欲則斷斷宜忌犯之不可救療非吾方之不神也癰瘍疽疔但有陰陽內外虛實之分無大小之別外科精要之書乃謂二寸至五寸為癰五分至一寸為疽者謬以小者為疔尤謬之謬也灸法上頭項禁灸余疔無不可灸也但服前方實救死之法人宜知之瘡瘍陰陽真假論經曰諸瘍痛癢皆屬心火似乎瘡瘍癰疽無非陽火也誰知陽能變陰陰難濟陽無有一定之規乎夫陽火之旺乃陰水之虧也本是陽症亦宜補陰以濟之況原是陰症反用消耗之藥必至損陽而更涸其陰安得不變生偏勝之禍哉如瘡毒初起筋攣骨痛此寒氣之腫八風之變也非陰症似陽乎不用溫散而妄用寒涼或食生冷之物使瘡毒內陷遂至陰極似火甚而煩悶之症生苟不用溫暖之藥則陰不能退而陽不能回也如瘡毒初起色紫皮赤腫突作痛惡寒喜暖非陽症似陰乎不用寒散而妄用辛熱或食燔炙之味使瘡毒外腐遂至陽極似水甚而昏憒之禍作苟不用冷瀉之藥則陽不能制而陰不能生也然而陽似陰者易療陰似陽者難醫世有瘡瘍大爛洞見腑臟或見筋骨瘡口黑陷身不能臥口不能食人認為陽症之敗壞也詎知是陰虛而不能變陽乎夫潰爛而至於臟腑筋骨之皆見此從前不用補劑使毒過於沿燒將好皮肉盡化為瘀腐耳口不思食本不可救然用參耆歸熟佐之化毒之品亦往往有得生者倘日以解毒為事絶不去補氣血之陰則陰不能變陽又安能死變為生哉更世有瘡瘍將愈而不收口百藥敷之絶無一驗人以為餘毒之未淨也詎知是陰虛而不能濟陽乎夫獨陰不生而孤陽亦不長也瘡瘍致膿血已淨則陰必大虛止補其陽則陽旺陰虛陽雖有濟陰之心而陰實無濟陽之力所以愈補陽而陰愈虛陰愈虛而瘡口愈難合也倘錯疑毒之未淨用敗毒之劑則已虛益虛不特損陰而兼損陽矣助陽尚難補陰況攻毒又安能濟陽哉此皆不識陰陽之真假毋怪施治之誤也大約未潰之前多有陰症似陽之病若已潰之後雖陽症亦作陰症治之故俱宜用補而不可用散此實不傳之祕訣也妊娠瘡瘍論孕婦亦往往有生瘡瘍者不可與無孕婦人一概輕治之也蓋婦人懷孕宜護其胎一有損傷其胎立墮輕則殺子重則並其母而亦亡矣可不慎哉或曰孕婦既生瘡毒豈可以不治治之不知婦女既已懷孕其氣血半已蔭胎若再用敗毒之藥重傷氣血安得不墮胎乎雖有故無損略消化其毒亦正無害然亦宜於補氣補血之中而少佐之以瀉火敗毒之味則在腹之胎無損而在膚之瘡亦易散也至於已産之後毋論瀉火敗毒萬不可施即少少內托亦宜禁絶蓋産後亡血過多血室空虛止存遊氣一用消耗之藥輒有頭暈眼花之症況禁消耗之乎如奪命返魂諸丹其名則美其實則惡恐有砒硼硝黃巴麝等味在內其性暴悍安禁其攻擊乎每每有下喉而輒亡者治之法惟大補其氣血而不必兼治瘡瘍蓋産婦生瘡盡是陰瘍而非陽瘍也陰瘍在常人尚純用補劑産婦陰虛更無疑也不補其陰又將何補哉惟是産婦陰寒補陰恐不能濟陽也必須補陽以生陰而補陽之中更宜用溫暖之味使榮衛通行氣血流轉則毒氣不必攻而自散矣否則恐致虛損成瘵甚或瘡口不斂卒至敗壞而不可救也瘡瘍肥瘦人不同論古人云肥人多濕瘦人多火濕多則痰盛而氣虛火多則液干而血少倘生癰疽瘡毒亦可同治之乎論理氣虛者補氣以消火毒血虛者補血以消火毒似乎深得病機也然而氣非血以相養則氣虛不能遽旺也血非氣以相生則血虛不能驟盛也蓋肥瘦之人分火多濕多則可分氣虛血少則不可夫氣虛之人豈即血之旺乎血少之人豈即氣之盛乎愚意氣血必須兼補當略分輕重如肥人而生瘡瘍也補陽氣之虛消痰化毒而不可耗其血如瘦人而生瘡瘍也補陰血之虧消火敗毒而不可散其氣如是則血足以助氣氣旺而火毒易發自發於表而不至遁入於裡有陽或變陰之禍氣足以生血血旺而火毒易消既消於裡而不至留滯於表有陰難濟陽之憂倘肥人但攻其毒補陽而不補陰瘦人但攻火毒補陰而不補陽皆非治法之善也必氣虛者重補其氣而輕補其血血虛者重補其血而輕補其氣則陰陽兩平而肥人瘦人之瘡瘍無難速效也瘡瘍隨症用藥論瘡瘍之症有陰有陽大約痛者為陽癢者為陰也未潰之前多是陽症間有陰症未有不先癢者陽症初起其痛異常其形高突當用內疏之藥使陽火之毒外散而不遁入於裡也陽症已成其皮必紅其頭必軟當用內托之藥使陽火之毒內潰而盡出於表也陽症已潰其肉必腐其膿必多當用大補之藥使毒散而不留火泄而不陷長肉生肌而和活其表裡也若陰症則不然陰症初起便虛即當用大補之藥不比陽症因膿潰而始虛也故內疏亦必大補以疏之內托亦必大補以托之不必待其膿血已潰而後補之也然而陽症之變甚多而陰症尤甚既有變症豈可無變法以治之乎夫變症蜂起每在已潰之後而不在初起之時如潰後頭疼托裡方中不妨加川芎蔓荊子潰後驚悸必宜加人參茯神硃砂寒熱往來加柴胡地骨皮口渴不止加花粉玄參大便祕結加大黃麻仁小便不通加茯苓琥珀木通車前心虛煩悶加天冬遠志四肢厥冷加附子乾薑或嘔或吐加生薑半夏膿多者加川芎當歸血多者倍人參耆術口不收者加白蘞白及皮肉陷者加肉桂耆附風癢痛者加防風天麻肌肉死者加獨活官桂疼痛極者加沒藥乳香此皆治陽症之變法也若陰瘍變症惟有大用人參耆術多加金銀花肉桂附子之類庶可定變於非常萬不可執陽症治法以治陰變之瘍也瘡瘍開住論瘡瘍陽症其成膿之後必決竇而出或刀開其頭膿血迸流皆火一泄而即住必不走開沿爛無底止也有一等瘡不大突焮腫痛疼或重或輕輕者麻木而不知倘生於背上如山之重重者宛如刀割刺戳五七日後或一頭從上開發或兩頭開發或左右上下開發侵展不住雖內經謂不善調養乃七情之擾房勞之變穢氣所撞惡氣所襲也然而所言亦言其陽症而非兼指陰症也大約開發不住陰症居多非大補氣血之劑以托於內非至妙收斂之藥以敷於外則內必衝突而外多腐爛也肌肉腐爛則氣血倍傷將來收口自然艱難而目前膿血何以止遏勢必潰壞而不可救矣故瘡口不開則毒必留中恐有奔心入臟之懼然瘡口大開則毒又沿外恐有爛膚壞肉之虞夫奔心入臟與爛膚壞肉相較似乎少間誰知爛膚壞肉一發而不住者皆毒氣奔心之變也所以用大補以衛其臟腑兼用收斂以護其肌膚蓋兩相顧而兩相治也或曰專補其內則氣血流動何畏腐壞乎不知火毒正熾其沖決之勢甚橫而且烈所到之處生肉即變為瘀肉矣肉既變瘀安能不開發而外出乎故必須內補而外敷則生肉有保守之資可恃無恐而火毒內難存留自然盡發於外並作一竅而出斷不至再為開發也瘡瘍火灸論近人治瘡瘍動尚艾灸誰知瘡瘍亦有宜灸不宜灸之分乎大約陽瘡之癰疽不宜灸而陰症之癰疽必宜灸也蓋陽症之癰疽發於外也若用灸法則毒入於內而不出反多變症之生陰症之癰疽陷於內也若不用灸法則毒難發外而居中自多喪亡之禍而灸法若何先用白紙一張口含水噀濕鋪於瘡面之上看其何處先白即瘡癰之總口也以墨筆點定其穴用大蒜切片如一分之厚貼於穴上隔蒜灸之世有用附子片者有用生薑片者皆可用總不若蒜片之更勝初灸即痛必灸至不痛始止初灸不痛必灸至痛始止自一痏至數十痏或至數百痏不可半途即撤也若初灸麻癢者亦必灸至痛而止蓋毒隨火化自然內之火毒隨外之艾火而宣散也實至奇至神之法不可視為尋常而輕忽之然而陰症之癰疽亦有不可灸者又宜知之陰症癰疽在頸以下者無不可灸而生在頸以上者即是陰症斷斷忌灸蓋頸之上頭面也六陽之首而頂通於腦一用火攻則火毒無內藏之處必遁入於泥丸而不能出轉成不可救之症矣世人誤認灸法神奇毋論可灸不可灸一概用艾火灸之灸之不效歸咎於瘡瘍之拙也而不知是誤灸之故也更有腎俞一穴在兩腰脊旁系內腎命根此處亦斷不可灸蓋因水虧火動故爾發瘡若再加火灸愈添火熾其水益涸必致瘡口黑陷昏悶而死可不戒歟大約陰虛之人毋論生疽在首在腰俱不可灸往往有因灸而犯虛虛之禁世人競尚灸法余特著此篇與瘡家共商之云瘡瘍刀針論瘡瘍之發發於臟腑非發於肌肉皮膚也善治者五日之內原可內消因內消蹉跎以致發越於外五日內急用內治尚可消化於無形也不意仍復因循八九日遂成高突之勢疼痛作膿不得不用刀針去其膿而瀉其火敗其毒而全其肉也若危惡之症發於致命之所禍在反掌不得不刺故砭石鑱針刀鐮之類皆古人所制為決瘡毒之器也古人豈好為忍心誠有所不得已耳然則刀針之類古人不得已而用之今人不論可刺不可刺動用針以去膿動用刀以割肉往往有無膿而迸血割肉以損肌瘡瘍不愈而變症蜂起歸咎於刀針豈不冤哉我今商一用刀針之法見有膿急用針而不可緩否則寧少遲也見瘀肉急用刀而不宜徐否則寧少延也何至於誤用乎或人畏用刀針而瘡口已軟膿血已多急宜割刺又有代針代刀之藥服之頃刻皮破而膿潰敷之須臾肉化而肌生亦仁心神術也願醫工留意而亟施之也萬勿歸咎於不肯刺割而不可救遂坐以待斃也變通之法原在乎人救療之方豈止一術亦貴臨證者善用耳或曰瘡瘍既可內消何必又尚刀針不知遲用內消之藥則火毒內攻暗爍肌肉外口雖小其內之窟正寬廣也譬如賊居深山之中無官兵攻散巢居穴處將闢土自王而外邊關隘過作細小彼惟恐人知聊以掩飾耳倘不破其關隘則其勢日張延蔓無已罔聽顧忌呼朋引黨勢必民化為盜而好肉變為腐肉矣故必須用刀針刺其外邊瘡口之皮決其內中彌瞞之勢則內無隱藏毒可星散然後外用膏藥末藥呼其膿而護肌內復用湯劑散其毒而還元此剿撫並施之妙法也倘專尚刀針而略去膏末湯劑亦未為十全耳又曰人有畏用刀針有用蜞針者亦變法也法用筆一個入螞蜞一條以管口對瘡頭使螞蜞吮瘡之膿血其毒即散如瘡大須換三四條若吮正穴蜞必死矣纍效之法也但可施於血實毒淺之症而不可施於陰症毒重之人徒竭其血於外而內實無益也又曰人身有太乙人神在各穴中最宜忌之如逐年尻神逐日人神之類查曆本書之頗詳偶一犯忌禁其瘡瘍難愈
