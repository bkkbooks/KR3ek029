body:
  text: 卷十鼻瘜鼻痔鼻瘜者生於鼻孔之內其形塞滿竅門而艱於取息故名曰鼻瘜也鼻痔者亦生鼻內略小於鼻瘜狀如櫻桃枸杞皆肺經受毒氣不能消濕熱壅滯而生此二病也內治必須清肺為主而佐之除濕降火之味外用藥點搽亦易愈也分消湯內治鼻瘜鼻痔黃芩一錢炙甘草一錢青黛二錢桔梗三錢天花粉二錢麥冬二錢天冬二錢連翹三錢苦丁香五分水煎服四劑磠砂散外治鼻瘜鼻痔磠砂一錢輕粉二分冰片五釐雄黃三分共為細末用桔梗咬毛蘸勤點瘜痔上日五六次自然漸化為水然必須戒色欲始愈千金方治鼻中瘜肉明礬一兩萆麻仁七個鹽梅肉五個麝香一字杵丸綿裹塞之化水自下也聖濟總録用青蒿灰石灰各等分淋汁熬膏點之亦效嵌指嵌指者雖生腳趾甲上此蓋因踢感傷損或靴鞋短窄屈其甲而不得伸以致蜷局不安致甲長乾肉內內無可容破而流水未免步履更堅已傷益傷而作痛甚至於不可忍也百治不痊者誤認趾疳妄用敗毒之藥反耗氣血而不能愈耳須令修腳人輕輕修去肉內之甲然後以生肌散敷之未有不愈者矣肘後方治足趾甲入肉作瘡不可履靴礬石燒灰細細割去甲角用礬石末敷之蝕惡肉生好肉旬日即愈神效二黃礬香散醫方摘要治婦人趾甲生瘡惡肉突出久不愈皂礬日曬夜露每以一兩煎湯浸洗仍以礬末一兩加雄黃二錢硫黃一錢乳香沒藥各一錢研勻搽之鵝掌風鵝掌風生於手掌之上古書云人生楊梅瘡時貪食鵝肉因生鵝掌之風然亦有不慎房事泄精之後或手洗涼水或足犯雨露皆能感生此瘡不獨犯於手掌而兼能患於足面白屑堆起皮破血出或疼或癢者有之乃心腎二經乘虛而受毒也內治用六味地黃湯加柴胡麥冬白芍菖蒲之類治其心腎最神外用熊脂膏塗而烘之不一二次即愈加味地黃湯祖傳內治鵝掌風足癬熟地八兩山茱萸四兩山藥四兩丹皮三兩澤瀉三兩柴胡一兩麥冬三兩當歸三兩白芍三兩肉桂一兩菖蒲五錢茯苓三兩各為末蜜為丸每日早晚空腹滾水送下各五錢一料即愈熊脂膏治數十年鵝掌風熊油一兩瓦松三錢輕粉一錢樟腦一錢各為末先以甘草三錢桂枝二錢煎湯洗之烘乾以熊油調各末搽而烘之一日三次一連三日即愈疥瘡附膿窠瘡疥與膿窠瘡多生於兩手兩足然亦有遍身俱生者膿窠瘡癢多於痛若疥瘡但癢而不痛者也故疥之病輕而膿窠之病重大約疥瘡風熱也膿窠血熱也風熱者濕少血熱者濕多二症俱有濕故皆有蟲也使氣血兩旺斷不生蟲故治此等之瘡必須補氣補血佐之去風去濕則蟲且自亡安能作祟乎正不必妄用熏洗之藥也洗法尚無大害倘氣血大衰之人輕用熏藥必傷肺矣外瘡雖愈而火毒內攻往往有生肺癰者不可不慎也加減八珍湯治疥瘡膿窠人參一錢當歸三錢白芍二錢生甘草一錢茯苓三錢白朮五錢黃耆三錢熟地五錢生地五錢柴胡一錢川芎八分天花粉二錢水煎服先用六劑去柴胡加北五味子十粒再服六劑無不盡愈如有火者加黃芩二錢輕桃丸岐天師傳治疥瘡輕粉一錢白薇二錢防風一錢蘇葉一錢各為細末用油胡桃肉三錢搗碎研絶細同豬板油再搗成圓彈子大擦瘡處一二日即愈坐板瘡坐板瘡生於兩臀之上臀乃脾經之所屬也脾屬至陰而臀又至陰之地脾經血少血少則易生熱矣血少而熱又加濕氣侵之則濕熱兩停郁久不宣臀乃生瘡矣此瘡最癢而兼痛治宜健脾以生氣使氣旺則血易生氣血漸生則濕自下行從膀胱而分散水濕既利而熱又何存毒又何在乎外用藥治之奏效更速倘氣血不甚虛者不須內治惟外治可也加味五苓散內治坐板瘡白朮五錢茯苓三錢澤瀉二錢豬苓一錢肉桂二分黃柏一錢水煎服濕熱兩治散外治坐板瘡蘿蔔種一兩火煅存性為末敷於新瓦上煨微熱坐於其上數次自愈或以灰莧燒為末摻於瘡上數天即愈松黃散治坐板瘡松香五錢研細雄黃一錢研細濕癢加蒼朮三錢各為末綿紙捻成條蠟豬油浸透燒取油搽上立愈喉閉蛾瘡此生於咽之上也其瘡有二一雙蛾一單蛾也雙蛾單蛾之症亦有二一陰症一陽症也二症雖異而火則一也然而火有陽火陰火之分陽火者實火也陰火者虛火也咽喉乃至命之關此處生蛾瘡俱是危症然陽火勢若重而實輕陰火勢少輕而反重蓋實火可以寒散而虛火必須溫散也倘治之得其道效應如響破嗌湯治陽症雙蛾單蛾喉痹等症如神桔梗三錢甘草三錢柴胡一錢白芍五錢玄參三錢麻黃一錢天花粉三錢山豆根一錢水煎服一劑咽喉寬再劑盡消引火湯治陰症雙蛾單蛾喉痹等症熟地三兩巴戟天一兩茯苓五錢麥冬一兩北五味子二錢水煎服一劑火下歸二劑全愈二方已破未破俱可用不必用針吹藥點治之也兩地湯伯高太師真君傳治喉腫大作吐痰如湧口渴求水雙蛾纏喉風瘡熟地一兩生地一兩玄參一兩肉桂三分黃連三錢天花粉三錢水煎服下喉即愈再生丹治雙蛾單蛾初起久患以及喉痹等症桔梗一分硼砂一分山豆根一分生甘草一分牛黃一分荊芥一分研絶細末用鵝翎插藥五釐吹入蛾處日六次痰涎出淨即愈神方也治單蛾雙蛾雄黃明礬各等分研絶細末吹入喉中俟痰涎流淨不必吹藥矣大麻風大麻風感受火毒殺物之風氣而結成之者也初生之時頭面身體先見紅點後變紅斑漸漸皮破汁流而成瘡矣鬚眉盡落手足指脫眼瞎鼻崩毛豎身紫遍體腐爛流膿流血臭穢難聞最可憐之病也此病南粵最多以地近炎荒蛇蟲蟠結濕熱之毒一犯則裹結於皮膚濕蒸之氣一侵則藏遏於肌骨終年不散內外交迫遂生麻風之瘡然而此瘡亦有不在南粵而生者別感火邪酒濕之毒氣而又房事不慎則毛竅盡開易於侵犯治之不得法皆與麻風症相同可見麻風之病南北俱有必以解毒為先然而近人元氣虛者甚衆止瀉其毒而不兼補氣血則毒敗而真精隨耗何能全活乎倘惟事補正而不急敗其毒又恐引邪入內致崩臟腑亦可畏也故當補正散邪兼而治之始易奏功掃癘丹岐天師傳治頭面身體先見紅點斑紋流水成瘡發眉墮落遍身腐爛臭穢蒼朮三錢熟地一兩玄參一兩蒼耳子三錢車前子二錢金銀花二兩薏仁五錢水煎服二十劑必愈黃金湯伯高太師傳治初起大麻風大黃五錢金銀花半斤水煎汁三碗分作三次一日服完必然大瀉惡糞後單用金銀花三兩連服十日全愈解癧仙丹治酒濕感毒而生大麻風神效茯苓三錢白朮五錢薏仁五錢黃連一錢玄參一兩金銀花三兩柞木枝三錢水煎服連服二十劑已爛未爛俱愈漆甲散穿山甲一副全明雄黃四兩為末真生漆和勻刷在甲上微炙微刷以盡為度將穿甲分記上中下左右共作六塊各另研細末用四年陳醋冬米飯為丸每服五錢白滾湯送下患左用左患右用右上服上中服中下服下須記分白如在通身一起制服神效蛇窠瘡蛇窠瘡生於身體臍腹之上下左右本無定處其形象宛如蛇也重者爛深輕者腐淺亦有皮肉蠕蠕暗動欲行而不可得也此瘡或穿著衣服棄於地上為蛇所遊或飲食之中蛇涎沾染其毒未散因人氣血尚壯不傷臟腑乃發於皮膚耳重者毒重而痛甚輕者痛猶可受治法不必問其重輕總以解毒為神也前人用松針刺其初起之瘡頭尚非治之善者大約以蜈蚣浸油頻搽以雄黃白芷佐治實得法也蜈蚣油巫彭真君傳治蛇窠瘡兼治蛇咬傷成瘡俱神蜈蚣十條為末不可經火白芷三錢為末白者佳雄黃三錢為末生甘草末三錢香油二兩將三味浸之三日或隨浸調搽皆能建功也蜘蛛瘡蜘蛛瘡生於皮膚之上如水窠倣佛其色淡紅微痛三三兩兩或群攢聚宛似蜘蛛故以蜘蛛名之此瘡雖輕然生於皮膚終年不愈亦可憎之瘡也或謂沾濡蜘蛛之尿而生者其説非是大約皆皮膚之血少而偶沾毒氣濕氣遂生此瘡耳方用苧麻在瘡上搽搓使其瘡破水出後用藥搽之自易愈也解蛛丹治蜘蛛瘡苧麻根灰三錢冰片二分輕粉五分抱出雞蛋殼燒灰一錢燈草灰二分白明礬三分共研細摻瘡上即痊然必須用苧麻揉搽皮破摻藥效之神也陰陽濕痰破瘡附脫腳陰陽濕痰瘡皆傷寒失汗寒熱鬱而生痰痰不能驟消於臟腑留而不散久之結於肌肉遂成痰塊塊久則腫腫久則痛痛久則潰潰則成瘡矣但其瘡有陰陽之分陽瘡多生於兩手陰瘡多生於兩足陽瘡則熱陰瘡則寒熱者病在陽腑寒者病在陰臟也故治手上之瘡者宜治其陽之熱經而佐之去濕化痰之品治足上之瘡者治其陰之寒經而佐之去濕化痰之味無不收功也前人專用艾火灸之尚非正治耳通陽消毒湯巫彭真君傳治陽濕痰破瘡在手者茯苓三錢神麯一錢硝砂一錢甘草一錢麻黃五分白朮三錢黃柏一錢天花粉三錢黃耆五錢蒲公英三錢水煎服如已潰者用沖和膏貼瘡口自愈治陰化濕湯巫彭真君傳治陰濕痰破瘡在足者白朮五錢茯苓五錢肉桂二錢附子一錢黃耆一兩半夏三錢水煎服如已潰破者用玉龍膏外敷之內外兼治則易愈也傷寒有大渴之症貧家無力買藥或富家誤用藥餌惟以飲水止渴為事雖火為水折胸膈之炎熱少除而水多難化未免留滯下焦停積成瘀而兩足之氣不通濕熱生瘡久則破爛筋弛肉腐而兩足墮落矣此等之瘡非尋常藥味些小分兩可以保全者全活湯巫彭真君傳治傷寒愈後兩足生瘡流水流膿神效白朮三兩蒼朮二兩肉桂一錢薏仁二兩車前子五錢人參一兩如貧家用黃耆二兩水煎服一連服十日不特兩足之爛可除而餘生亦可全活楊梅疳瘡楊梅疳瘡生於龜頭之上者多生於穀道玉莖上者少生於鼻內者更少皆熱毒之氣也風流子弟何忽生此瘡平日所食者肥甘所衣者輕暖何傷此熱毒乎蓋得之於嫖妓與有毒之女兩相酣戰而中毒也妓女何毒重如此亦遇毒感毒耳泄精之時自覺馬口之間如針刺痛此毒氣來犯矣重則生魚口輕則生疳瘡疳瘡乃楊梅先兆也當酣戰之時本難中毒然而鼓勇而鬥內火沸騰乃至泄精元氣虧損毒氣即乘虛而入內火與毒氣之火兩相和合而不化故生疳瘡不補虛而惟事敗毒則已虛益虛無異下石未有不滿身生瘡者矣治法內用二生湯外用保身散治之即愈苟或不然變出非常非玉莖爛落即鼻柱塌陷破壞面目可畏哉二生湯岐天師傳治初生疳瘡生黃耆三兩土茯苓三兩生甘草三錢水煎服外用藥敷之保身散巫彭真君傳外治疳瘡輕粉一錢黃柏五錢乳香一錢水粉三分孩兒茶三錢百草霜一錢冰片三分各為末豬膽調搽楊梅圈瘡楊梅圈瘡此楊梅瘡發已久將要結痂而復犯房事以致作痛生圈此等治法必須大補氣血氣血足而精生精生則臟腑還元而瘡自結痂矣不可誤認毒之未淨而仍用敗毒之劑也一用敗毒更傷損氣血終無奏功之日矣惟內用大補之藥外用調搽之末便易收斂且慶安全也加味十全大補湯祖傳方內治楊梅圈瘡人參二錢當歸三錢白朮三錢茯苓二錢生甘草二錢黃耆三錢肉桂三分川芎一錢熟地五錢柴胡五分土茯苓五錢水煎服十劑虛甚者多服為妙粉霜神丹外治楊梅圈瘡粉霜一錢人參一錢生甘草一錢冰片三分輕粉一錢丹砂一錢石膏二錢槐米一錢各研細末豬膽調搽愈楊梅結毒楊梅之瘡多生於嫖妓聞人毒氣而生者其毒即發不生於玉莖馬口之間也惟嫖妓而得之必從玉莖始以毒自此入則瘡亦自此興倘初生下疳即用遍德湯大劑吞服不特疳瘡頓愈而楊梅之瘡亦必不生即生亦輕少斷無結毒之禍無奈世醫不知此方之妙妄用藥餌惟識敗毒不雜用補氣補血之味以致難於收功而風流子弟厭惡生瘡且歸咎醫生亟請收斂醫生貪圖厚謝不補氣以祛邪不補血以化毒竟用輕粉之類以收斂之毒入骨髓不取外發一時瘡淨亦為可喜子弟甘謝而無怨言醫生樂酬而生德色苟仍補其氣血而加之暗消之品終年纍月而服之則元精既足元氣自旺毒難內存猶能外泄無如子弟既苦於服藥而醫生亦倦於防危彼此相忘竟置之不論不議之天誰知收斂之後不知保守縱欲如故而毒難久留或半年或二三年乘何臟腑之虛乃突而外攻矣大約毒結臟腑之虛俱是難救之瘡而結於鼻與玉莖者尤為難救遍德湯伯高太師傳治下疳楊梅當歸二兩白朮二兩生甘草五錢土茯苓一兩金銀花四兩天花粉三錢水煎服連服十劑而遍身之瘡如掃矣寒水再造丹伯高太師傳治結毒至鼻爛莖爛者皆效麥冬三兩生甘草一兩桔梗三錢黃芩三錢連翹三錢貝母三錢土茯苓二兩寒水石研細末三錢夏枯草二兩水煎汁二碗調寒水石末服倘鼻尚未落一劑不爛落也如已爛落一劑不再爛也二劑全愈倘結毒生於他處減半多服無不奏效翻花楊梅瘡此瘡亦感淫毒之氣也視其瘡勢若重其毒反輕蓋毒欲盡情出外也古人云是濕熱表虛表虛則有之不可全歸於濕熱也總皆毒氣外發因表虛而反熾誰知因熾而補其表則表實而毒難藏轉易收功也惟是表虛不可再貪色欲不獨傳其毒而害人且虛其虛而自害故必須節飲食戒惱怒而斷房帷斷無意外之虞外用點藥敷之自奏功如神矣黃耆外托散家傳治翻花楊梅瘡黃耆一兩當歸三錢人參三錢茯苓五錢土茯苓二兩白芍五錢生甘草三錢白礬二錢水煎服四劑重者十劑外用藥調搽即愈地龍粉霜丹祖傳方外治翻花楊梅瘡粉霜二錢蚯蚓糞一兩火焙乾百草霜三錢輕粉二錢黃丹三錢飛過生甘草二錢冰片二錢黃柏炒二錢胡粉二錢各為細末點搽自愈陰陽楊梅瘡楊梅瘡有陰陽之分古人以陽屬氣虛而感毒陰屬血虛而感毒實為有見非無稽之語也陽必高突陰必低陷陽必痛陰必癢而其色皆紅也故陽宜用補氣之藥而佐之化毒之味陰宜用補血之藥而輔之消毒之品然後外以末藥調搽豈難速愈乎六君加味湯治陽楊梅色紅作痛而高突者神效人參五錢白朮五錢半夏一錢生甘草三錢茯苓三錢陳皮五分土茯苓一兩金銀花一兩水煎服十劑愈加味四物湯治陰楊梅色紅不起不破作癢者神效熟地五錢川芎二錢當歸五錢白芍一錢白茯苓二錢生甘草二錢金銀花一兩天花粉二錢土茯苓一兩水煎服二十劑愈丹砂斂毒丹外治陰陽楊梅瘡兼治疳瘡丹砂一錢雄黃二錢粉霜一錢孩兒茶三錢露蜂房燒灰五分冰片三分生甘草一錢輕粉一錢各為細末豬膽調搽自愈楊梅癬瘡此乃女子感染男子餘毒而生者也或前已生瘡用藥既痊偶食牛肉或洗浴當風抓癢或行房事以虛其皮膚毒結不散乃生癬矣或血乾而起白屑或肉碎而流紅水以致淋漓臭穢者有之用蝸牛柏霜散原易奏功然內不服藥以補虛則氣血雙虧外難即愈必須內外兼治否則日久不痊必生蟲蝕反難速瘥也雙補化毒湯岐天師傳內治楊梅癬天花粉二錢當歸五錢黃耆五錢柴胡一錢生地三錢麥冬三錢天冬三錢荊芥一錢五分威靈仙二錢白鮮皮一錢胡麻二錢槐角二錢乳香末一錢生甘草二錢水煎十劑外用末藥搽之必愈蝸牛柏霜草岐天師傳外治楊梅癬黃柏二錢沒藥一錢輕粉一錢粉霜一錢雄黃二錢冰片三分丹砂五分孩兒茶三錢枯礬一錢蝸牛十個各為末豬膽調搽日數次搽三日漸愈神效楊梅痘子其瘡細小亦是淫毒與大者相較其毒尚輕蓋其人氣體壯實感毒不重故瘡亦不惡也急用內托之藥十數劑則毒易散而痘亦易回倘恃強而仍然漁色則氣血雙耗必至輕變為重矣輕既可以變重安在重而不可以變危乎總之楊梅之瘡毋論輕重必須速治加之絶欲則病去如掃無如世人好色甚多服藥甚倦遂至變生不測也鐸有神方因載於後聽世採取耳早奪湯岐天師傳治初出楊梅瘡痘神效人參一兩生黃耆一兩茯苓一兩當歸一兩遠志三錢生甘草三錢金銀花一兩大黃一兩石膏一兩柴胡二錢白朮一兩天花粉三錢水煎服一劑大瀉惡物臭穢不堪再服二劑毒盡去矣去大黃石膏加土茯苓二兩同前藥再服四劑必有瘡影發於滿身在皮之內而出於皮之外也再服二劑全愈外表湯治楊梅痘子黃耆一兩當歸五錢麥冬五錢金銀花一兩天花粉三錢木通一兩澤瀉二錢柴胡二錢黃芩二錢生甘草二錢水煎服齒窟瘡齒窟瘡因傷損齒牙其齒墮落而成者也蓋人齒最深其窟甚大氣血盛而易於長滿氣血虛而艱於生合其症高年老人尤多夫齒雖有臟腑之分而根實出於腎也高年老人腎精耗竭無不虛者所用飲食止可生氣生血不能生精精少則腎氣不生而腎血又何易生乎此齒窟之更難填實也況兼貪叨或用硬物碴破少合而重傷略滿而再損疼痛切骨連心者往往然也內用加味地黃丸以填其精外用填齒散修之自然精不涸而氣血相助則齒窟不至空缺也即不生齒而生肉必速矣加味地黃丸內治齒傷成窟熟地五錢山藥三錢山茱萸二錢茯苓二錢骨碎補二錢補骨脂二錢丹皮二錢當歸五錢麥冬三錢澤瀉一錢五分氣虛甚者加人參五錢水煎服以齒滿為期填齒散外治齒窟人參一錢骨碎補一錢三七末一錢同川蒺藜二錢乳香一錢鼠脊骨末一錢各為末用黃蠟化開團成丸如齒窟大填入隙數日即愈如蠟化頻填自愈胎溻皮瘡胎溻皮瘡初生嬰兒所長之瘡也有肉無皮視之可痛蓋母食五辛之味或餐燔熬炙煿等物或父母有瘡而坐孕往往生無皮之子然而傷熱而生之者其病輕受毒而生之者其病重重者母子必須同服化毒之藥則皮生而兒無死亡之禍否則無不夭者若因食熱物而生者雖半體頭面皆無皮不必母子同服解毒之藥但用白芨雄黃散敷之自安也全蠍生皮散岐天師傳治父母生瘡因産胎溻皮瘡之子者此方主之全蠍一兩生黃耆四兩金銀花八兩生甘草一兩麥冬四兩各為末蜜為丸每日服五錢子服三丸一料全愈白芨雄黃散岐天師傳治食五辛熱物子生溻皮瘡神效白芨一兩雄黃末三錢各為末摻之自然生皮且又不痛最神
