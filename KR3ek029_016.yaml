body:
  text: 卷十六奇方下雄黃燈治坐板瘡用舊青布一條如二指闊以雄黃末一錢油調入布內為拈子燈上點著吹滅以火頭熱觸於瘡頭癢處不過一二次即愈莧蘿散治坐板瘡甚驗馬齒莧一把即灰莧蘿種一枝各為末摻患處立愈並治諸瘡出水敷之俱妙又方用磚一塊燒熱硫黃末一錢鋪於磚上以好醋沃之以布一方墊之令坐於瘡上烙之更妙世傳治坐板瘡方輕粉二錢石膏飛過六錢共為細末燈油調上一二次即愈張真君方治大麻風蒼朮一斤蒼耳子三兩各為末米飯為丸如梧子大日三服每服二錢服一月即全愈無忌止忌房事三月犯則不可救矣白鹿洞方治大麻風眉毛脫落手是拳攣皮肉潰爛唇翻眼綻口歪身麻肉不痛癢面生紅紫之斑並治如神大風子肉四兩明天麻四兩酒浸川防風去蘆四兩漢防己四兩大何首烏四兩忌鐵好苦參淨四兩川當歸淨六兩酒浸赤芍藥六兩白菊花四兩香白芷四兩酒浸大川芎二兩獨活二兩山梔仁二兩炒連翹淨二兩白蘇二兩蘇薄荷二兩金頭蜈蚣炙去頭足二兩全蠍三兩洗去鹽足殭蠶炙去足六兩蟬蛻去足六兩穿山甲二兩燒蘄蛇八兩酒浸焙狗脊四兩去毛酒浸共為末酒糊為丸桐子大每服七八十丸空心好酒送下臨臥再一服忌氣怒房事油膩煎炒雞魚蝦蟹芋頭山藥糟魚肉鵝生冷春酸食冬冷物然冬月亦不可烘火止宜綿暖淨室坐定保守性命節飲食斷妄想如服藥時宜仰臥令藥力遍行有功如不守禁忌徒勞心力亦無效也服此藥止宜食鴨鯽牛肉俱當淡食祕傳漆黃蟾酥丹治大麻風瘡鮮螃蟹四斤真生漆一斤真蟾酥二兩真雄黃二兩先將瓷壇裝蟹次入漆封口埋在土中二七日足方取開看二物俱化成水去滓淨將水入鍋慢慢火煮乾焙為細末方入雄黃蟾酥二味末攪勻瓷罐收之每日空心臨臥各一服好酒送下一二錢不過一月其瘡全好除根妙不可言治大風如手取之妙況所費不多莫輕忽修合亦勿妄傳非人祕之洗大風方用蒼耳草煎湯少加朴硝浴之更妙生眉散治大風生眉毛皂角針焙乾新鹿角燒存性各等分為細末薑汁調塗一日搽一二次不數日眉即生矣片根散治喉閉乳蛾冰片二分雄黃一錢山豆根一錢兒茶一錢青硼五分枯礬五分共為細末吹之如神太倉公蜂房散治喉痹腫痛露蜂房燒灰一分冰片二釐白殭蠶一條乳香二分為細末吹喉即安倉公壁錢散治喉生乳蛾壁錢七個白礬三分冰片一分兒茶三分各為末包礬燒灰為細末竹管吹入喉立愈救喉湯岐伯天師傳治雙蛾喉大作痛口渴求水下喉少快已而又熱呼水此乃纏喉風也乃陰陽二火併熾上衝作祟射干一錢山豆根二錢玄參一兩麥冬五錢甘草一錢天花粉三錢水煎服倘服之而藥不能下喉者刺少商穴尚缺親切用刀直刺其喉腫之處一分則喉腫必少消急用吹藥開之吹藥方名啓關散啓關散膽礬一分牛黃一分皂角燒灰末一分麝香三釐冰片一分為絶細末和勻吹入喉中必大吐痰而快可用湯藥矣化癬神丹治喉生癬瘡先癢後痛久不愈者玄參一兩麥冬一兩五味子一錢白薇一錢甘草一錢鼠黏子一錢百部三錢紫菀二錢白芥子二錢水煎服先服六劑再服潤喉湯全愈倉公治喉癬方百部一兩款冬花一兩麥冬二兩桔梗三錢各為細末蜜煉為丸如芡實大銜化日三丸一月蟲死癬愈潤喉湯熟地一兩山萸四錢麥冬一兩生地三錢桑白皮三錢甘草一錢貝母一錢薏仁五錢水煎多服數十劑必愈久則加肉桂一錢更為善後妙法伯高太師傳方治指上生天蛇頭瘡蜈蚣一條麝香半分白芷三錢共為末燒煙燻之即愈雄黃解毒散治天蛇毒疔初起紅腫發熱疼痛至心雄黃二錢蟾酥二分微焙冰片一分輕粉五分為末新汲水調塗紙蓋日用三次極效解蛇油治蛇窠瘡生於皮毛作痛並治諸惡瘡川蜈蚣不拘多少入真香油瓷瓶收貯搽之不二次即愈治蜘蛛瘡先用苧麻絲搓瘡上令水出次以雄黃枯礬等分末乾摻之妙秦公傳方治楊梅風毒土茯苓三斤生黃耆一斤當歸八兩先用水三十碗將土茯苓煎湯三碗取黃耆當歸拌勻微炒干磨為末蜜為丸每日白滾水送下三錢一料即全愈新病二料全愈不再發劉氏經驗方綱目治楊梅毒瘡膽礬白礬水銀研不見星為度等分入香油津唾各少許和勻坐帳內取藥塗兩足心以兩手心對足心摩擦良久再塗再擦盡即臥汗出或大使去垢出穢涎為驗每一次強者用四錢弱者二錢連用三日外敷疏風散並澡洗世傳治楊梅瘡皂角刺七根杏仁去皮尖七個肥皂子去殼取肉七個殭蠶真的七個蟬蛻七個去爪翅紅花五錢當歸尾一兩土茯苓八兩瓷瓦刮去皮土木器捶碎以上共一處用砂鍋一個井河水各三碗煎至三碗早中晚各服二碗服二十劑全愈永無後患忌茶葉酸鹼全陽方治前陰爛落金銀花半斤黃柏一兩肉桂二錢當歸三兩熟地二兩山茱萸三錢北五味一錢土茯苓四兩水五大碗同浸干為末每日滾水調服一兩服完前陽不爛如爛去半截者重生土茯苓湯治楊梅結毒林中丞傳土茯苓二斤竹刀去皮雄豬油四兩銅刀切碎沒藥二錢初次水七碗煮四碗二次水四碗煮二碗三次水二碗煮一碗共七碗去渣並油將湯共盛瓷鉢內露一宿次日作三次溫服忌茶酒油鹽醬醋雞魚鵝鴨海味等物只吃大米飯蒸糕滾水下余物一切不可用三七日全愈末藥方防風五錢荊芥五錢何首烏五錢苦參五錢花粉五錢肥皂子白肉二兩五錢炒上為細末用煎開土茯苓豬油加末藥二錢同煎鬼真君傳方治楊梅瘡黃耆五兩生甘草一兩土茯苓四兩茯苓五兩白朮五兩當歸五兩大黃八錢石膏五錢水十碗煎二碗分作二次服二劑毒自從大便出倘疳瘡已出而楊梅未生急加入大柴胡三錢同上藥煎服二劑亦愈蓋瘡因虛而得自當治其虛而加之去毒之品自然奏功如神奈世人以敗毒劫之而忘其補法所以夭人性命也風藤散治結毒人參當歸赤芍角刺木瓜木通甘草白芷生地皂子花粉金銀花白鮮皮薏苡仁青風藤各等分每劑五錢加巴蕉根四兩土茯苓四兩水四碗煎至三碗一日二次服之重者只三劑而愈如神不拘新舊俱妙張真君方治結毒鼻柱將落立可全之人參一兩麥冬三兩金銀花三兩蘇葉五錢桔梗一兩生甘草一兩水五碗煎一碗一劑即聞香臭而不落矣蓋楊梅之毒雖是毒氣結成然亦因虛極致之故用人參麥冬諸補氣血之藥於散邪解毒之內所以奏功如神也不疼點藥真輕粉一錢杏仁皮一錢松花一錢冰片三分共為末鵝膽汁調搽即愈治楊梅疳瘡方真輕粉三分冰片二分兒茶五分黃柏末二錢上口鼻用川椒湯漱洗搽之在下用五根湯洗熏畢搽之如神萸床散準繩治腎臟風癢不可當吳茱萸蛇床子等分煎湯洗之神效五根湯蔥根一兩韭菜根一兩槐根一兩地骨一兩土茯苓一兩煎水先熏後洗畢點前藥效張真君方治疳瘡兒茶珍珠鏡鏽各二錢輕粉五分牛黃三分血竭三分冰片三分各為細末先水洗淨後摻藥神效秦真人方治疳瘡兒茶一錢黃柏炒一錢水銀半分輕粉一分生梔子五分冰片三釐各為細末以不見水銀為度敷在患處數次即愈再用後藥金銀花一兩當歸五錢蒲公英五錢生甘草二錢水煎空心服內外合治尤易愈也伯高祖師方傳治玉莖瘡爛絲瓜連子搗汁和五倍子末蚯蚓糞焙乾香油調搽之神驗勝金散準繩治下疳潰爛疼痛黃連五分黃柏五分輕粉五分銀硃五分兒茶五分冰片一分為細末香油調搽齒窟瘡方齒時有傷成瘡作痛用生肌散將舊棉花托一二分入窟內過夜即愈或搗飯內塞之亦妙生肌方載在前玉粉散治胎毒溻皮瘡滑石桂府粉包一兩水飛過甘草三錢冰片二分共為細末摻之瘡上即愈雜興湯鄧筆峰傳治楊梅毒瘡冷飯糰二兩五加皮三錢皂角子三錢苦參三錢金銀花一兩世錯用一錢今改正好酒煎日一服一月全愈忌鐵器劉寄奴散準繩治便毒劉寄奴王不留行大黃金銀花木鱉子上等分酒水煎露宿一夜五更服又方治便毒初起射干二寸生薑如指大搗細上取順流水煎微沸服之以瀉為度消毒散準繩治便毒初發三四日可消皂角針金銀花防風當歸大黃甘草節瓜蔞仁各等分上㕮咀水酒各半煎食前服頻提掣頂中發立效化魚湯仲景真人傳治結成便毒魚口大黃一兩金銀花五兩蒲公英五錢歸尾一兩荊芥三錢水二碗煎一碗服二劑即消化毒救生丹張真人傳治頭面無故生瘡第一日頭面重如山二日即青紫三日身亦青紫服春藥而毒發於陽者第一日即用此方可救生甘草五錢金銀花八兩玄參三兩蒲公英三兩天花粉三錢水十餘碗煎四碗日三次服可救否則一身盡青而死蝸膏水仲景夫子傳治頭上生瘡作癩或胎毒成癩頭蝸牛十條生甘草三錢為末冰片三分白礬一錢盛在瓷碗內露一宿蝸牛化為水鵝翎掃頭上三日愈黃水瘡方仲景夫子傳方更妙蘄艾一兩燒灰存性為末癢加枯礬五分摻上即愈又方雄黃末二錢砂罐內熬水洗之即愈神效柏葉散治三焦火盛致生火丹作癢或作痛延及遍身側柏葉炒黃為末五錢蚯蚓糞五錢黃柏五錢大黃五錢赤豆三錢輕粉三錢共為細末新汲水調搽枯瘤方治瘤初起成形未破者及根蒂小而不散者白砒一錢硇砂一錢黃丹一錢輕粉一錢雄黃一錢乳香一錢沒藥一錢硼砂一錢斑蝥二十個田螺大者去殼三枚曬乾切片共研極細糯米粥調按捏作小棋子樣曬乾先灸瘤頂三炷以藥餅貼之上用黃柏末水調蓋敷藥餅候十日外其瘤自然枯落次用斂口藥祕傳斂瘤膏血竭一錢輕粉一錢龍骨一錢海螵蛸一錢象皮一錢乳香一錢雞蛋十五枚煮熟用黃熬油一小鐘以上各為細末共再研和入雞蛋油內攪勻每日早晚甘草湯洗淨患上然後雞翎蘸塗膏藥蓋貼陰戶疳方治陰戶作癢作痛生疳生蟲豬肝一具切長條雄黃二錢枯礬五分輕粉一錢將肝條水滾一二滾取出蘸藥均入陰戶內一二時再換不三五次蟲出即愈護陰丹治陰外中生瘡桃仁三兩搗爛蛇床子為末一兩絹綾做一長袋如勢大泡濕將藥裝入袋中納入陰戶內神效止癢殺蟲湯仲景夫子傳婦人陰中生瘡長蟲痛癢難受蛇床子一兩苦參一兩甘草五錢白薇五錢水五碗煎二碗將陰戶內外洗之另用綾一尺縫如勢一條將藥渣貯於中乘濕納於陰之內三時辰蟲盡死矣內用小柴胡湯加梔子三錢苦楝根三錢茯苓五錢煎服不服亦得完體續命湯岐天師傳救殺傷而氣未絶或皮破而血大流或肉綻而腸已出或箭頭入膚或刀斷臂指死生頃刻生地三兩當歸三兩麥冬三兩玄參三兩人參二兩生甘草三錢三七根末五錢續斷五錢地榆一兩乳香末三錢沒藥末三錢劉寄奴三錢花蕊石末二錢白朮五錢水煎調末服一劑口渴止二劑瘡口閉三劑縫生四劑全愈矣真神奇之至補血救亡湯伯高太師傳救殺傷危亡諸症玄參二兩生地四兩黃耆四兩當歸二兩地榆四錢荊芥炒黑五錢木耳二兩敗龜版二個水二十碗煎汁五六碗恣其酣飲蓋刀刃之傷必大流血無不渴者飲水有立刻亡者若飲此湯則渴止而瘡口亦閉又無性命之憂真神方也及膏散濟急方治刀斧傷損白及一兩石膏煅一兩為細末摻之亦可收口治刀傷損骨止有皮連者生明礬一錢生老松香一錢研極細放於布包止以藥裹即止痛生肌錢又選傳勿令水風犯之金刀傷方用小豬揪出來腸子一條陳石灰二兩苧葉一兩龍骨三錢共搗爛作餅干為末搽之即止血合口又方端午日採百草搗爛取汁拌古石灰內藏之干則研為細末摻傷處即止血止痛生肌且無瘢痕岐伯天師傳方治金瘡陳年石灰四兩三七根二兩各為末敷上即止血生肌又傳方治金瘡出血又可治腳縫出水花蕊石研末三七根末硫黃末各等分和勻再研敷上即合仍不作膿又止痛止血如神永類鈐方治金瘡出血不止紫蘇葉桑葉同搗貼之自止火燒瘡方黃蜀葵花不拘多少去蒂心淨不用手取恐手汗汙之真香油浸之令勻雖數年更妙逐年油少添油花少添花搽上立止痛生肌冰涼自在任他結痂不可揭動就火藥燒壞亦可救內服泄火毒藥更效亦治湯燙如神蚌津散治湯泡火燒甚效取水中大蚌置大碗中任其口開用冰片二三分當門麝二三分研末挑入蚌口內即漿水流入碗內再加冰麝少許用雞翎掃傷處先外而內遍掃隨干隨掃涼入心脾便不痛而愈如所掃之處不肯幹必潰爛將蚌殼燒灰存性為末入冰麝少許摻之妙太倉公方治湯火神效井中青苔研爛敷湯火傷灼瘡上立止痛而愈秦真人方治湯火傷大黃一斤古石灰八兩滑石四兩各為細末麻油調敷患處即止痛生肌且無瘢記凍瘡方治凍瘡破爛不拘手足面上凍瘡成瘡癢痛不一者如神用麻雀腦子塗之立瘥豬腦子加熱酒洗更妙又方干狗糞白者燒灰存性為絶細末麻油調敷數次即愈箭鏃瘡方治毒箭及箭鏃入骨不能得出即不可拔動恐其骨傷用巴豆一粒炮去皮殼勿焦活蜣螂一個同研爛塗在傷處須臾痛定微癢極難忍之時方可拔動取出鏃立瘥又方取數年陳醃臘豬腿肉骨頭火炙取骨內之油雞翎將骨油掃在箭傷之處必癢不可當少頃其箭頭必透出張真君六神散治折傷最驗當歸五錢續斷五錢骨碎補五錢牛膝五錢桃仁五錢金銀花五錢黃酒二碗煎一碗空心服不拘輕重服數劑永無後患倉公方治骨傷折痛用蔥一斤搗爛入乳香一兩同搗勻厚封傷處立止痛太倉公傳方治跌撲經月瘀血作痛水蛭炒黑研碎二錢當歸一兩桃仁十四粒赤芍五錢水煎服一劑即止痛定痛散治跌打損傷骨折疼痛等症麻黃燒存性一兩頭髮灰一兩乳香五錢共為細末每三錢溫酒調服立瘥葛真君傳方稚川治跌傷神效灼過敗龜一個大黃一錢生地五錢桃仁二十個紅花一錢歸尾三錢一服即止痛岐天師全體神膏治接骨神效當歸二兩生地二兩紅花二兩續斷一兩牛膝一兩地榆一兩茜草一兩小薊一兩木瓜一兩人參一兩川芎一兩劉寄奴一兩白朮一兩黃耆一兩甘草五錢杏仁三錢柴胡三錢荊芥三錢皂角二錢麻油三斤熬數沸瀝去渣再煎滴水成珠加入飛過黃丹末一斤四兩收為膏不可太老再用乳香三錢沒藥三錢自然銅醋焠燒七次三錢花蕊石三錢血竭五錢白蠟一兩海螵蛸三兩為細末乘膏藥未冷投入收勻盛之攤膏須重一兩再用勝金丹麝香三錢血竭三兩古石灰二兩海螵蛸一兩自然銅末如前制一錢乳香一兩沒藥一兩樟腦一兩人參一兩兒茶一兩三七一兩木耳灰一兩花蕊石三錢象皮三錢冰片一錢地蝨一錢土鱉一錢琥珀一錢紫石英二兩土狗十個生甘草末五錢和勻以瓦罐盛之每膏一個用末三錢摻在上貼之重者二個輕者一個即痊更奇絶止血散刀瘡口破裂血出不止用此擪之血即止血竭二錢五分沒藥五錢龍骨五花者二錢俱另研燈芯一把蘇木二錢桔梗五分降真香四錢同蘇另研當歸三錢雞一隻連毛尿醋煮熟爛搗作團外以黃泥固濟以文武火煅干為末入後藥紅花要馬頭者二錢焙為末共為細末每用干擪瘡口以止其血候乾少將熟油瘡上效逐瘀至神丹岐伯天師傳治跌僕斷傷受困當歸五錢大黃二錢生地三錢再加三錢尤妙赤芍藥三錢桃仁一錢紅花一錢丹皮一錢敗龜版一錢水一碗酒一碗煎服一劑即可去病倘手足斷折以杉板夾住手足扶正湊合妥當再用接骨至神丹為妙方中再加枳殼一二錢尤佳接骨至神丹岐伯天師傳治接骨如神羊躑躅三錢炒黃大黃三錢當歸三錢芍藥三錢丹皮二錢生地五錢土狗十個捶碎土蝨三十個搗爛紅花三錢自然銅末先將前藥酒煎然後入自然銅末調服一錢連湯吞之一夜生合神奇之至不必再服二劑止服二煎可也必骨中瑟瑟有聲蓋彼此合縫實有神輸鬼運之巧治破傷風方用糞堆內蠐螬蟲一個將手捏住脊背待他口中吐出水來塗在瘡口上即覺渾身麻木汗出即活此神方也倉公治破傷風方蜈蚣研末二分麝香半分擦牙吐去口涎即瘥榆根散雷公真君方治虎咬傷血大出潰爛疼痛地榆一斤為細末三七根末三兩苦參末四兩和勻凡虎咬傷急用豬肉貼之隨貼隨化連地榆等三味末摻之隨濕隨摻血即止而痛即定奏功實神斑蝥散治瘋犬咬傷效如神斑蝥炒去足翅同米熟雄黃各等分共為細末溫酒調送神效去紅髮說在前青苔散伯高真君傳犬咬地上青苔以手抓之按於犬咬處即止痛治鼠咬瘡方用貓尿洗之瘥取貓尿以生薑搗爛一撮敷在貓鼻子上即出麝香錠子治蜈蚣二十七般毒蟲咬瘡腫痛不已神效麝香二錢雄黃二錢乳香二錢硇砂二錢土蜂窩一個露蜂窩一個燒灰存性上為細末米醋糊為錠子如遇此等傷瘡磨塗之即瘥如有惡瘡疼痛不已亦以此塗之更妙治毛蟲咬以蒲公英根莖白汁敷之立瘥中蜘蛛毒蛇咬瘡方用大藍汁麝香雄黃和之隨愈人一身生蛛絲不知人事者以艾煙燻之以羊乳灌之立瘥誤吞麥芒鯁喉瘡方先以亂絲或絨扎於如意骨上如無則以柳條刮淨以火逼彎如意樣以絲絨扎上入喉中上下攪之待取出芒為妙後以青黛吹之效誤吞針鉤有線方即以汗衫竹節子穿在線上推的竹節只抵鉤子根以線硬倒往裡推其鉤即出為妙治面上惡瘡五色方藥性論用鹽湯浸綿拓瘡上五六度即瘥治蚯蚓毒經驗方形如大風眉鬢皆落或身如蚯鳴蚓濃煎鹽湯浸身數遍即愈治諸瘡胬肉如蛇出數寸聖惠硫黃一兩同土薄之即縮治纏腳生瘡摘玄方荊芥燒灰蔥汁調敷先以甘草湯洗之普濟方治一切疥瘡荊芥一兩生地黃半斤煎汁熬膏和丸桐子大每服三十五丸茶酒任下一料服完自愈談野翁試驗方治婦人面生粉花瘡定粉五錢菜子油調泥碗內用艾一二團燒煙燻之候煙盡覆地上一夜取出調搽永無瘢痕亦易生肉孫真人方治馬咬成瘡益丹草切細和醋炒塗之千金方治毒攻手足腫痛欲斷蒼耳葉搗汁漬之以渣敷之立效春用心夏用葉秋冬用子聖惠方治頭風白屑王不留行香白芷等分為末乾摻一夜篦去肘後方治惡瘡痂後癢痛扁竹即萹蓄搗封痂落即瘥掃癩丹千金方治惡瘡似癩十年不愈者莨菪子三錢燒研細末敷之即愈摘玄方治唇裂生瘡瓦花生薑入鹽少許搗塗鵝掌油準繩治腳縫爛瘡鵝掌皮燒灰存性為末敷之以桐油塗亦妙魚脂膏準繩治白駁用鰻鱺魚脂擦駁上微痛以魚脂塗之一上即愈又方用蛇蛻燒末醋調敷上神效豆根散治癬瘡用山豆根末臘月豬脂調塗之半夏散俱準繩治一切癬上以半夏三兩搗到末以陳醬汁調和如糊塗之兩三度即瘥云用生半夏更妙緑雲散準繩治灸瘡止痛柏葉芙蓉葉端午午時採不拘多少陰乾上為細末每遇灸瘡作疼水調紙上貼之養膿止疼去苦散準繩治蛇傷解蟲毒神效五靈脂一兩雄黃五錢為末塗患處良久後灌二錢神效輕粉散仲景公傳治豚瘡痛癢流水流血輕粉三分蘿蔔子一錢桃仁十四個去皮尖研為末擦瘡上即愈勸醫六則人生斯世無病即是神仙故人能節欲寡過使身心泰然俯仰之間無非樂境覺洞天丹丘無以故也無如見色忘命見財忘家營營逐逐墮於深淵沉於苦海憂愁怨恨之心生嗔怒鬥爭之事起耗精損氣而疾病隨之矣苟或知非悔悟服藥於將病之時覓醫於已病之日則隨病隨痊又何慮焉乃求人之過甚明求已之過甚拙而且諱病忌醫因循等待及至病成始嘆從前之失醫也已無及矣鐸勸世人幸先醫治人病難痊宜多服藥蓋病之成原非一日則病之愈豈是一朝無如求速效於目前必至隳成功於旦夕更有射利之徒止圖酬謝之重忘顧僥幸之危或用輕粉劫藥取快須臾未幾毒發病生往往不救何若攻補兼施損益並用既能去邪復能反正雖時日少遲而終身受惠無窮鐸勸世人毋求速效病關生死醫能奏效厥功實宏世有危急之時懸金以許病痊而報之甚薄逮至再病醫生望門而不肯入是誰之咎歟等性命於鴻毛視金錢如膏血亦何輕身而重物乎鐸勸世人毋惜酬功病痊忘報俗子負心病痊索報亦醫生之慚德蓋治病有其功已報而功小治病忘其功不報而功大要當存一救人實意不當惟利是圖勿以病家富遂生覬覦心勿以病家貧因有懶散志養癰貽患恐嚇取錢皆入惡道鐸勸行醫幸無索報人不窮理不可以學醫醫不窮理不可以用藥理明斯知陰陽識經絡臟腑悟寒熱虛實之不同攻補滑澀之各異自然守經達權變通於指下也否則徒讀脈訣空覽本草動手即錯開口皆非本欲積功反致損德鐸勸學醫幸務窮理醫道講而愈明集衆人之討論始可佐一人識見倘必人非我是堅持不移則我見不化又何能受益於宏深乎邇來醫術紛紜求同心之助杳不可多得然而天下之大豈少奇人博採廣詢裒獲非淺鐸勸學醫幸尚虛懷
