body:
  text: 卷七骨癰癰生之後其口不收腐爛之中忽長一骨疼痛難熬俗以為多骨癰也誰知乃濕熱之毒所化乎夫多骨之癰隨處能生不止長強之穴也其先起於過飧水果生冷之物其終成於因循失治使濕壅而添熱熱盛而化骨往往有一二年而不愈常落骨一片或一細骨或有蛀蝕之眼或三五月落骨一片以鐵鋏取出而口仍不生肉已而又生骨終朝呼號望其痊可杳無期也此其故何歟蓋徒知外治而不知內治也外治難化而內治易化者以多骨之癰疽無形之所化也非肉中真有骨在乃似骨而非骨耳真骨非內治可化似骨而非骨內治又何難化乎內用五神湯或九轉神丹利其濕熱而又不耗其氣血不必化骨而骨自化倘必欲奏功甚速外用飛過密陀僧桐油調膏攤貼亦相得益彰而取效尤捷也五神湯統治多骨癰茯苓一兩車前子一兩金銀花三兩牛膝五錢紫花地丁一兩水煎服六劑骨消再服十劑愈九轉神丹治多骨癰白礬二錢茯苓一兩車前子五錢黃柏三錢紫花地丁五錢連翹三錢牛蒡子三錢穿山甲一片萆薢五錢水煎服四劑骨消再用加味四君子湯調理加味四君子湯人參五錢茯苓一兩生甘草二錢金銀花一兩牛膝五錢炒白朮一兩水煎服以瘡口生滿日為度腰癰腰癰者發於軟肋下近腰帶脈乃玉樞維道之穴也屬足少陽之經初長之時疼痛呼號似乎陽症然而腰腎乃至陰之地未可作陽症治之此症本生於過忍其精欲泄不泄以釀成火毒似乎純陰之症也但火發毒成則陰中有陽矣未可以純陰法治之法宜陰陽並治為佳倘不補陰而單治火毒則腎氣愈傷而火毒難化即補陰而不補陽則陰無陽不生火毒且深藏於腎宮而不得外泄矣惟合補陰陽庶免偏勝之虞而有解紛之妙也兩治湯治腰眼生疽疼痛呼號毋論陽症陰症俱神效白朮一兩杜仲一兩當歸一兩金銀花三兩防己一錢豨蘞草三錢水煎服九靈湯治腰癰熟地二兩山茱萸一兩白朮二兩防己一錢紫花地丁一兩荊芥炒黑三錢生地五錢丹皮五錢生甘草三錢水煎服一劑輕四劑全愈臂癰兩臂生癰乃肩貞臑俞之穴也其經屬手太陽小腸似非陰之部位較頸對口背上少輕然治之不得法亦能殺人故亦宜辨其陰陽也痛而高突者陽也癢而平頗者陰也陽用三星湯陰用消癰還陽湯不可謂手足非腹心之疾但有陽症而無陰症也手主動動處而生陰疽則動變為靜矣動變為靜即陽趨於陰矣陽趨於陰非生近於死乎雖內經云汗之則瘡止手臂生癰似可發汗使毒從汗出而散也然陽癰可以汗散而陰癰必須補散也故吾特表而出之消癰還陽丹治兩臂生癰變成陰疽人參三錢白朮一兩甘草三錢天花粉三錢生黃耆一兩金銀花二兩肉桂一錢當歸五錢乳香末一錢水煎調服一劑癢變痛二劑痛如失三劑全消轉功湯治臂癰黃耆二兩當歸一兩生甘草三錢肉桂二錢白朮一兩遠志五錢紫花地丁五錢貝母三錢水煎服一劑而瘡口反痛二劑而痛輕三劑長肉又用二劑全愈膝癰膝之上不能生癰膝癰者生於膝之內外也膝之內外經穴各別膝外生癰者乃陽關陽陵泉之穴也是足少陽膽經之部位名曰托疽膝內生癰者乃血海陰陵泉之穴也是足太陰脾經之部位也二經雖分而多氣少血則彼此同之總以補血為主而佐之補氣以敗毒則血旺而毒易散也倘一味瀉火反傷氣血何能建功收口乎蓋膝乃至動之處又骨節之樞紐也氣血旺而後能行動可置氣血於不治乎吾所以殷殷致戒也大約腫焮作痛半月有膿黃白者可治不痛或出鮮血者死出膿青黑及長出頭漸多者或無定處者不治全生散治膝癰不論內外神效生黃耆四錢當歸一兩金銀花一兩茯苓三錢薏仁五錢牛膝三錢地榆一錢白朮三錢萆薢三錢天南星一錢生地黃五錢水數碗煎一碗空腹服之不論已潰未潰俱效倘是陰症本方加肉桂一錢去地榆多加熟地腋癰附馬刀挾纓腋癰者發於腋下天池之穴也天池屬手厥陰心包絡是經多血少氣此處發生癰疽令人寒熱大痛掌熱臂急面赤俗名挾癰以手臂挾癰毒而稱之也靈樞謂堅赤者名曰米疽可淺刺之使火毒之外泄也以其火毒之氣不深在於皮膚之間故可外刺之而瘥也若因循養癰其勢日大恐火毒入臟必至難治入臟者入於肝脾之二經也肝經血滯脾經氣凝非補氣血而佐之內疏外托之味未易奏功耳若堅而不潰者為馬刀挾纓亦須急治則毒能消化否則年深日久一發而不可療也金錢鼠黏湯巫彭真君傳治腋癰挾癰效甚黍黏子一錢黃連二錢當歸一兩生甘草三錢天花粉三錢柴胡一錢五分連翹二錢紅花一錢玄參三錢白芍三錢金銀花一兩水煎服初起之時二劑全消無令其日久潰敗也若已潰敗此方不可服當看陰陽治之消堅湯巫彭真君傳治馬刀挾纓瘡當歸五錢白芍五錢金銀花五錢蒲公英五錢柴胡二錢天花粉三錢炙甘草一錢全蠍三個研末桔梗一錢五分鼠黏子一錢五分水煎汁一碗調全蠍末服十劑全消如尚未破四服可消如日久未破本方加附子三分連服數劑亦消乳癰乳腫最大者名曰乳發腫而差小者名曰乳癰初發之時即有瘡頭名曰乳疽以上三症皆令人憎寒壯熱噁心作嘔者也受孕未産而腫痛者名曰乳吹已産兒而乳腫痛者名曰奶吹三症皆宜急散遲則必至出膿轉難愈也老婦鬱結乳中有核不消天陰作痛名曰乳核因循失治破而內潰膿水淋漓日久不愈名曰乳漏婦人無子愛養螟蛉強將雙乳與兒吮咂久則成瘡腐爛乳頭狀似蓮蓬名曰乳疳無故雙乳堅硬如石數月不潰時常疼痛名曰乳岩乳上赤腫圍圓無頭名曰乳癤以上乳症約有十種大抵皆陽症也不比他癰有陰有陽不必別分陰陽以定治法但當別先後為虛實耳蓋乳癰初起多邪實久經潰爛為正虛然補中散邪實乃萬全之道也按乳房屬足陽明胃經乳頭屬足厥陰肝經況生乳癰則陽明之經未必能多氣多血厥陰之經未必不少氣血也不補二經之氣血乳癰斷不能痊不可謂是陽而非陰一味止消火毒致肌不能生筋不能續耳和乳湯治乳上生癰初起發寒熱先痛後腫貝母三錢天花粉三錢蒲公英一兩當歸一兩生甘草二錢穿山甲一片為末煎服一劑即消消化湯治乳房作痛生癰金銀花二兩紫背天葵五錢天花粉三錢當歸一兩生甘草三錢通草一錢水煎服一劑即消化岩湯治乳癰已愈因不慎房事復行潰爛變成乳岩現成無數小瘡口似管非管如漏非漏狀若蜂窠肉向外生等症人參一兩白朮二兩黃耆一兩當歸一兩忍冬藤一兩茜根二錢白芥子二錢茯苓三錢水煎服四劑肉生膿盡十劑全愈箕門癰箕門癰生在大腿股內衝門穴之下血海穴之上也此處屬足太陰脾經乃濕熱之毒所生是經多氣少血宜內托黃耆柴胡湯加蒼朮防己等味治之外宜敷貼隨症施治無難奏功若不慎疾一犯房勞則變為陰毒便宜溫補法療之耳若生於箕門穴之上乃衝門穴也名曰勇疽赤腫作硬八日得潰可刺如膿黃白色者乃陽疽也可治其瘡孔如雞子大者俗稱魚口有單有雙年久不收口是陽變陰矣非大補不可蒲柴飲巫真君傳治箕門癰勇疽神效柴胡二錢丹皮三錢蒼朮二錢茯苓三錢白朮五錢白芍藥五錢蒲公英五錢天花粉三錢遠志一錢黃芩一錢水煎服三劑即消若已潰者去黃芩加黃耆五錢當歸五錢治之亦神效眉疽眉疽生於眉間在陽白二穴之分從眉至額赤腫焮高陽白本屬膽經然膽與肝為表裡膽病而肝亦病未有膽藏火毒而不遺害於肝者也膽經多氣少血肝經多血少氣二經有火毒必爍干氣血故宜氣血兼治也堅硬如石者可刺刺之無膿黃水自出痛甚悶亂吐逆者陽毒兼陰也治之漸減者生甚者死女子七日即死男子二十四日死又曰眉疽或生於兩眉左右或生於眉心即攻入眼或下入太陽屬足太陽膀胱之經然專屬肝膽為是最忌無膿吐逆也肝膽兩攄湯巫彭真君傳治眉疽神效龍膽草二錢柴胡一錢當歸五錢金銀花一兩炙甘草二錢甘菊二錢半夏一錢五分白芍五錢丹皮三錢黃葵花一錢五分白蒺藜二錢水煎服一生眉疽速治數劑即消久則無效矣蠹疽蠹疽者疽生於缺盆之穴也缺盆屬足陽明胃經也胃乃多血多氣之腑缺盆生疽陽症居多苟不慎疾不戒惱怒不斷房勞必變陰症不可信為陽症而妄用消火敗毒之藥也俗名歷發疽十日可刺刺之有膿者陽疽也刺之無膿者陰疽也俗稱之曰石疽言其如石之堅刺之不應也更有一頭未已再生四五頭子母大小不等又名歷瘡其勢雖輕其毒更重生至心者死倘有白膿赤腫瘡不黑陷飲食知味者生治法總不外補以化毒也消蠹湯巫彭真君傳治蠹疽金銀花一兩蒲公英五錢人參一錢生甘草三錢玄參五錢青蒿五錢天花粉三錢葛根一錢生地三錢水煎一碗服初起者二劑即消斷宜斷欲戒怒否則禍生不測手足指瘡附脫疽手足指生瘡有生於指尖之旁也名曰敦疽有生於手足指上丫者名曰伏鼠疽大約高腫而痛乃陽症平腫而癢乃陰症也陽症必有膿陰症必無膿也有膿者刺之而愈無膿者刺之而轉重也無膿而色紅者生無膿而色黑者死正不必黑過節也有一種黑過節者生在手足之指上名曰脫疽言必須去其指也此症多得之膏粱之客而又用丹石房術之藥或噙舌下或納臍中或塗陰戶或擦陽器淫火猖狂爍干骨髓日積月纍乃發為此疽夫腳乃四餘之末宜毒之所不至誰知毒所不到之處而毒聚不散出於指甲之間其毒更凶較尋常之處尤甚十倍也然則治之法必以割去其指為上乎而亦不盡然也人身氣血周流於上下則毒氣斷不聚結於一處火毒聚於一處者亦乘氣血之虧也脫疽之生正四餘之末氣血不能周到也非虛而何大補氣血益之瀉毒之品往往奏功如響何必割指始能存活乎諸方既無痛楚之傷而又獲生全之妙願人信心用之耳消濕散火湯巫彭真君傳治敦疽鼠伏疽陽症神效生甘草二錢地榆二錢茯苓三錢藍汁二錢如無汁用青黛二錢代之馬齒莧三錢紅花二錢蒲公英五錢白朮三錢天花粉三錢車前子三錢薏仁五錢水煎汁一碗服即消陰疽陽疽俱可治顧步湯岐天師傳治脫疽腳趾頭忽先發癢已而作痛趾甲現黑第二三日連腳俱青黑者黑至腳上過脛即死急服此方可救牛膝一兩金叉石斛一兩金銀花三兩人參三錢黃耆一兩當歸一兩水數碗煎服一劑而黑色解二劑而疼痛止三劑全愈若已潰爛多服數劑亦可救六丁飲伯高太師真君傳治腳趾生疽紫花地丁一兩甘菊花一兩生甘草五錢牛膝一兩天花粉三錢水煎服二劑全愈若已破爛多服為妙筋疽癆疽齧疽筋疽生於兩足後跟乃崑崙之穴也癆疽生於足小趾後乃京骨金門之穴也生於崑崙之後又名足疽皆屬足太陽膀胱之經是經多血少氣癆疽五六日得潰有膿黃白色不多者安如黑色癢甚者難治以其變陰也筋疽初起三五日如蟲蝕過久則生蟲經年不瘥一名曲疽又名冷疽皆陰瘡也用大補氣血之藥益之去濕化毒之品亦有生者然不能責其近功也足疽又名齧疽如初起赤腫有頭可刺乃陽症也刺之有膿黃白者易瘥如初起便破黑爛即是陰症最重久則足墮落急宜治之否則不能生也二紫蒲公湯巫彭真君傳治筋疽癆疽足疽之陽症者神效茯苓三錢薏仁一兩紫花地丁五錢牛膝三錢蒲公英五錢貝母二錢紫背天葵三錢當歸五錢生甘草二錢水煎服初起者三劑即愈蘞薢金銀散巫彭真君傳治筋疽癆疽足疽之陰症黑爛者黃耆五錢當歸五錢金銀花一兩豨蘞草三錢萆薢五錢茯苓三錢肉桂一錢水煎急服之亦能生中庭疽井疽中庭疽生於乳之中央在膻中之下也井疽生於鳩尾之穴又在中庭之下也二穴皆屬任脈之經任脈乃奇經八脈之一也任脈發於會陰而二穴又逼近心與包絡此心與包絡之火炎燒而腎水不足以濟之故久而生疽也狀如大豆亟宜內托三四日間若不早治十日必死外發出者易痊內發入者傷膜主死薜荔散巫彭真君傳治中庭疽井疽神效人參二錢茯苓四錢白果十個蒲公英五錢薜荔藤一兩天花粉三錢山藥四錢黑芝麻三錢生甘草二錢連翹二錢水數碗煎一碗服二疽必須急服則易散毒輕者二劑即散重者四劑始散也合陽疽合陽疽生於腨內委中之下承筋之上乃合陽之穴也合陽屬足太陽膀胱之經因感濕熱蘊結成毒久而生疽也初宜托裡除濕清熱以發其汗使毒從汗出也若已成形發汗又非所宜當排膿止痛以生新肉也二金瀉熱湯巫彭真君傳治腨上生疽金叉石斛三錢茯苓五錢澤瀉二錢白朮二錢車前子二錢牛膝一錢金銀花二兩黃柏二錢生甘草二錢貝母二錢防己五分水數碗煎一碗空腹服數劑愈
