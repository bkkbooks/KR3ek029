於大瓷碗底內勻開次用蘄艾一兩於炭火上燒煙熏於碗內粉待艾盡為度覆地上出火毒逐早搽面即愈裙邊瘡即臁瘡也仲景夫子傳白蠟三錢松香五錢輕粉三分黃丹五錢銅緑五分豬板油生者一兩冰片一分各為細末同豬油搗千下為膏先用油紙如瘡口大針刺眼孔數百攤紙上將無藥一邊貼瘡口上以箬包之一日一換未貼前蔥一條煎湯洗之連用五個即愈虛用八珍湯大風膏治裙邊瘡一名褲口風瘡大風子一百個枯礬五分川椒末一錢輕粉一錢用真柏油調搽即愈痔漏驗方治痔漏多年不愈及痔漏腸風下血者皆驗龜版四兩麻油炙黃鱉甲四兩酥油炙脆穿山甲一兩土炒刺蝟皮一個炙黃白茯苓一兩地榆皮一兩金銀花一兩歸尾一兩酒洗槐花一兩黃牛角䚡骨一兩削筋酥酒炙酥牡蠣一兩馬兜鈴一兩五倍子一兩五錢炒黑象牙末五錢白朮五錢炙甘草三錢犍豬前蹄嫩肉炙一兩枳實一兩火炒推車郎七個炙去羽毛黃連一兩酒炒黑各為細末用饅二條重一斤煮爛去骨加白麵少許同搗為丸每日早中晚服三四錢忌房事椒蒜一切發物重者一料全愈世傳方治痔漏冰片一分五釐麝香五釐蝸牛一個連殼搗碎入前藥加熊膽一分用井水化開三味入水內用雞翎拂痔上救次即止疼忌生冷魚腥煎炒陰漏不治護漏湯林天檠傳用屎蜣螂一個焙脆為末以飯黏展成條先將豬棕探管之淺深然後將此藥條條入管內其管即退生肌矣神驗補漏丹長桑公仙人傳治痔漏大龜一個茯苓八兩羊後蹄爪殼一對鱉甲一兩醋炙槐米二兩薏仁三兩瓦蔥大者一二條白朮土炒三兩神麯三兩先將各藥為末將龜用綿紙同各末包好一日則龜必死矣如未死又將藥末同包好以死為度取出火炙為末同藥末為丸每日臨時白滾水送下三錢不必半料全愈水濕去而毒氣自散漏瘡自愈何用刀針挂線哉青苔散仲景夫子傳治濕熱成痔作漏青苔三錢羊後爪殼三付人參一兩白朮三兩茯苓三兩白芷二兩槐米一兩米飯為丸每日服一錢二月即消管全生丸祖傳治多年痔漏如神白芷四兩槐子四兩穿山甲陳壁土炒二兩殭蠶炒四兩蜈蚣二條炙全蠍去足勾炒淨二兩黃陳米煮飯搗為丸每日服三錢白滾水下服完漏管自消不用刀針挂線之多事真神奇也忌房欲鵝肉茄地上終身不可行走太倉公方治痔皮硝三錢瓦蔥三條青苔一錢煎湯洗之一連洗七日全愈陰囊濕與腿濕俱以此方洗之神效無花湯洗痔效無花果葉煎湯熏洗止痛甚效乳香膏專貼痔漏如神茱萸二錢白芨二錢白蘞二錢黃連二錢黃柏二錢當歸二錢黃丹二錢乳香一錢輕粉三分冰片少許香油四兩用柳枝煎枯入藥煎枯濾淨再數沸入黃丹次乳香輕粉攪勻次入冰片用瓷罐收貯用薄油紙甘草煮之揉攘攤貼先洗次貼生肌長肉止痛甚妙南陽張真人方治痔漏人指甲瓦上炒八錢槐花炒黃八錢人腳趾甲瓦上炒二兩牛腳跲一付用前蹄蟬退炒乾一兩壁虎三條瓦對合炒兩頭封固火逼干穿山甲一兩土炒蜈蚣七條地榆六錢防風一錢枳殼一兩炒黃柏四錢鹽酒炒甘草四錢俱為細末每早三錢午刻二錢夜二錢五分俱用生酒送下忌椒薑牛雞鵝肝腸酒糟燒酒尤忌房事護痔散護痔外好肉白芨大黃黃柏苦參寒水石緑豆粉各等分為細末熟調塗好肉上妙槐角丸治痔漏下血槐角二兩當歸一兩防風一兩枳殼一兩炒黃芩一兩酒浸炒地榆五錢上為末酒糊丸桐子大每服五六十丸空心酒或白湯送下效槐萼散治腸風痔漏下血有驗槐萼炒六分生地黃酒拌蒸六分青皮六分白朮六分炒荊芥六分川芎四分升麻一錢當歸酒浸一錢各為末每服三錢空心米飲送下煎服亦妙水沉膏治時毒暑癤白及不拘多少為細末用水沉底去水將藥敷在瘡周圍紙蓋如干再水潤之藥線方治齒踞如神用芫花皮作線系根一二日自落如未落以刀去之以銀熱烙之其血即止最妙張真君傳異方治頑癬蝦蟆一個口內入雄黃一錢外用苧麻扎住火燒死存性研末麝香一分冰片三分輕粉一錢好茶葉三錢再研為細末油調搽上覺少痛即腫起無懼三日平復如故而頑癬脫落矣遍身不可一時並搽愈了一處可也頑癬方治白殼瘡即頑癬羊蹄根枯白礬搗汁入米醋少許調搽之一二次效岐天師傳方治牛皮癬杜大黃根鮮者一兩搗碎日日擦之擦至十日之後用冰片三分麝香三分楝樹根一錢蝸牛十八個白礬二錢生甘草一錢蚯蚓糞五錢各為細末搗蝸牛內敷之月即全愈至神之至陀僧散治汗斑如神密陀僧細末三錢白砒一錢枯礬五分硫黃二分羊蹄根汁對半調搽一次即黑二次即愈丁香散治鼻瘜神驗苦丁香七個桔礬五分輕粉五分將鼻中瘜肉針破用此藥末點搽即愈化瘜丹治鼻瘜鼻痔雄黃五分桔礬五分苦丁香三錢鮮的取汁上末調稀搽在患處妙一方加輕粉細辛犬膽調粉香生肌散治嵌指甲傷輕粉一錢乳香一錢沒藥一錢黃丹二錢微炒赤石脂五錢寒水石三錢煅各為末濕則干搽干則油調最妙槐花湯治鵝掌風槐枝花熬煎湯以手熏之及熱後將瓦松擦之過一會以水洗之又熏又擦每日三五次不過三二日全愈神速瓦松無有用瓦草亦效又方朴硝末三錢桐油調勻塗入患處火烘之不二次妙硫糕丸疥瘡多年治不效一家數口俱害多致瘦弱不必搽藥止服此藥甚效硫黃精明的一兩為細末用米糕為丸桐子大共三兩重上體疥多食後荊芥湯送下五六十丸下體疥多食前下一人要服硫至一兩必效伯高太師方治疥瘡茵陳蒿一兩苦參一兩煎水一鍋略冷洗之立瘥歸防湯世傳治表消疥瘡煎藥神效當歸二錢防風一錢蒼朮一錢川芎一錢生地一錢五分荊芥一錢苦參一錢甘草三分赤芍一錢連翹一錢白芷八分清水煎十服為度黃水瘡治小兒黃水瘡濕熱結於皮上也仲景公傳石膏一兩雄黃一兩各研細末砂鍋煎湯候冷洗之一日即愈神方也以五苓散內治亦佳
