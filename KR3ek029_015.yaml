body:
  text: 卷十五奇方中瘡瘍刀針法鐵刀鋒長一寸闊三分兩邊鋒利厚半分柄長二寸刀式鐵針頭細長一寸五分鋒尾長一寸五分粗而圓針式用刀時手執堅牢眼看明白心中注定一刀橫畫一刀直畫不可太深約入半寸人必發厥少頃即安不必憂危驚懼膿血出後即用膏藥貼瘡口內服湯劑調理若用針止刺入而不必用橫直之法也亦須內外兼治賽針散啓玄治癰疽有頭不破及疔腫時毒或生四肢其勢微緩畏針者先以醋調藥塗在瘡頂上內服托裡等藥巴豆五分輕粉一錢五分硇砂一錢五分白丁香一錢五分共為細末醋調塗之余近用醋塗入厚白綿紙上臨用剪塊子貼瘡上自然腐破代針散啓玄一名透膿散一名射膿散不拘癰疽石毒不破者及畏針不開恐遲則毒氣侵蝕好肉內罨只此一服不移時自透出膿甚驗蠶繭子一個出了蛾厚的加附子一片燒灰為末熱酒調服即透切不可用三個恐頭多口亦多也忌之替針丸準繩治癰疽已潰未破或破後膿出不快者白丁香硇砂沒藥乳香各等分石灰餅內種糯米十四粒其法用灰炭五升爐炭三升以水五升淋取清汁入大鍋內熬汁至二升瓦器盛之用時以小青盞盛取半盞濃汁用皮紙貼盞中濃汁面上安定然後取糯米十四粒種於其上一宿即是上為細末糯米飯丸如麥粒大每用一粒未破用藥貼瘡頭薄處即破膿滯不快用一粒納瘡口內使膿易出好肉易生針頭散治一切頑瘡內有瘀肉癧核不化瘡口不合此藥腐之赤石脂五錢乳香三錢白丁香三錢信石一錢黃丹一錢輕粉五分麝香五分蜈蚣一條炙乾各為末搽瘀肉上其肉自腐若瘡口小或痔瘡用糊和作條子陰乾紝之凡瘡久不合者內有膿管用此腐內服托裡之劑碧落神膏治各瘍癰疽疔瘡腫毒神效吸鐵石一兩金銀花一斤生甘草三兩蒲公英八兩當歸四兩炙黃耆八兩香油五斤熬至滴水成珠去渣入黃丹二斤再熬軟硬得中即成膏矣再加細藥末摻於膏上輕粉三錢麝香一錢冰片三錢赤石脂一兩兒茶五錢黃柏三錢乳香三錢沒藥三錢各研細末臨時酌瘡之輕重用之大約初起不必用細藥出毒後必須加之吸毒仙膏岐天師傳治諸般癰疽已破貼之最效吸鐵石五錢忍冬藤八兩當歸三兩天花粉一兩夏枯草八兩香油五斤熬成膏加黃丹二斤收之瘡口一破即用此膏貼之既能呼毒又能吸膿兼易生肌神效神膏方仙傳專貼發背諸瘡瘍金銀花八兩蒲公英八兩木蓮藤八兩真麻油三斤煎至黑濾去渣入黃丹十二兩乳香三錢沒藥三錢松香三兩去火毒攤貼神效此膏不論陰陽癰毒皆可貼之再加後細末藥方妙陽疽末藥方冰片一錢麝香二分黃柏三錢白芷三錢五靈脂二錢三七根五錢洋參三錢各為末摻入膏藥貼之陰疽末藥方肉桂三錢冰片三分人參一錢丹砂三錢紫石英三錢兒茶三錢五靈脂二錢各為末摻於膏內定痛淨膿生肌膏仙傳專治各瘡疽癰毒當歸一兩黃耆一兩生甘草五錢熟地一兩玄參一兩銀花四兩錦地羅二兩麥冬一兩人參一兩蒲公英三兩白芷三錢白芍五錢花粉五錢黃柏五錢白蘞二錢生地三錢牛膝二錢連翹三錢丹皮三錢沙參三錢柴胡三錢防己一錢蒼耳子四錢黃連一錢葛根三錢蒼朮五錢大黃三錢紅花五錢桃仁二錢地榆三錢夏枯草五錢白朮五錢麻油六斤熬數沸去渣再熬滴水成珠入黃丹二斤收之另加細末藥麝香一錢冰片二錢人參五錢雄黃三錢輕粉二錢兒茶三錢象皮三錢海螵蛸三錢乳香三錢沒藥三錢血竭三錢三七根五錢龍骨三錢赤石脂五錢各為絶細末摻膏內貼之奇效陰陽至聖膏石室仙傳治陰陽癰疽用刀去其口邊腐肉即以此膏貼之即止痛敗膿盡出金銀花一斤生地八兩當歸三兩川芎二兩黃耆三兩生甘草一兩牛膝一兩丹皮一兩荊芥一兩防風五錢茜根五錢人參五錢玄參五兩麻油五斤熬至藥黑去渣再熬至滴水成珠入黃丹二斤廣木香一兩沒藥一兩乳香一兩血竭一兩象皮五錢麝香一錢各為細末入油中少煎好藏瓷罐內每膏一個約重一兩再加後末藥末藥方人參三錢冰片一錢乳香三錢血竭五錢三七末一兩兒茶一兩川倍子一兩滕黃三錢貝母二錢輕粉一錢各為極細末此膏與末藥共用神奇無比生肌散準繩治諸瘡生肌寒水石一兩碎滑石一兩烏賊骨一兩龍骨一兩定粉五錢密陀僧五錢枯礬五錢干胭脂五錢各為細末乾摻之生肌散真輕粉一兩鉛粉一兩炒黃冰片二分辰砂四分水飛珍珠一錢共為末瓷瓶收貯補爛丹枯礬二錢乳香五分沒藥五分輕粉三分珍珠三分黃丹五分共為細末摻濕處如干用豬油調敷生肌散治瘡口不合木香二錢黃丹五錢枯礬五錢輕粉二錢共為末豬膽汁拌勻曬乾再研細敷患處薛立齋云按此方乃解毒搜膿去腐之劑非竟自生肌藥也蓋毒盡則肉自生常見患者往往用龍骨血竭之類以求生肌殊不知餘毒未盡肌肉何以得生反增潰爛耳若此方誠有見也亦有氣血俱虛不能生肌者當服托裡之劑若頑瘡瘀肉須用針頭散腐之仙方救命湯治疔瘡走了黃打滾將死眼見火光危症大黃一錢梔子二錢牡蠣一錢金銀花一兩連翹一錢木香一錢乳香一錢五分牛蒡子一錢沒藥一錢五分瓜蔞二錢角刺五分地骨皮二錢水酒各半煎服一劑而愈紫菊湯廣華記治疔疳腫毒生甘菊連根一兩地丁三錢牛蒡子一錢五分銀花五錢花粉二錢貝母三錢白芷一錢五分生地三錢白芨三錢連翹二錢五分茜草五錢先用夏枯草六兩河水六碗煎三碗去渣不拘時服加鹽水炒黃耆五錢麥冬五錢五味子一錢花丁散準繩治疔瘡毒氣地丁一兩蟬蛻一兩貫衆一兩丁香二錢乳香二錢各為末每服二錢空心酒下神效桔梗湯家傳治咳而胸膈隱痛兩胠腫痛咽乾口燥煩悶多渴肺癰時出濁唾腥臭桔梗二錢貝母一錢六分桑白皮一錢六分當歸一錢六分炒瓜蔞一錢六分百合一錢六分杏仁一錢地骨皮一錢枳殼一錢五分玄參一錢五分青黛一錢五分紫菀一錢五分麥門冬一錢五分甘草六分水二鍾薑皮五分煎七分不拘時食後服如喘加蘇子萊蔔子肺虛咳加人參阿膠熱燥加黃芩梔子有膿血加合歡皮茅根便閉加酒煮大黃心煩咳痛加硃砂咳引咽嗌倍加桔梗扶桑清肺丹伯高太師真君傳治貪酒生肺癰已成桑葉五錢紫菀二錢犀角屑五分生甘草二錢人參三錢款冬花一錢百合三錢杏仁七粒阿膠三錢貝母三錢金銀花一兩熟地一兩水煎調犀角末服數劑奏功如響起痿延生丹伯高太師傳治肺痿損傷焦瘦氣促麥冬五錢百部五分款冬花五分白薇五分生甘草一錢天門冬一錢生地一錢天花粉一錢桔梗一錢玄參三錢山豆根三分水煎服漸輕則生否則不救千金煮肺湯啓玄治肺痿咳吐膿血或自汗嘔吐消渴大小便不利等症豬肺一具不用吹的洗淨血臊入藥扎定青黛即福建靛花末二錢川芎三錢紅棗九枚共入肺內扎定下鍋煮熟患者自己食之二三次以盡為度至重不過一二具肺痿自安犀歸湯祖傳治腸癰腹濡內隱隱朽痛大小便祕澀犀角真的鎊末一錢煎好後入大黃酒炒一錢二分牡丹皮二錢梅仁去皮尖二錢冬瓜仁二錢薏苡仁五錢芒硝七分金銀花一兩當歸五錢上咀一劑水煎空心服兩間湯岐天師傳治大腸癰薏仁二兩生甘草一兩當歸二兩錦地羅一兩紫花地丁五錢槐米三錢天花粉三錢水煎服一劑足可伸二劑全愈王公湯伯高太師傳治小腸癰王不留行一兩生甘草五錢蒲公英一兩車前子三錢水煎服一劑即愈龍蔥散治乳吹韭菜地中蚯蚓糞二錢蔥子一錢共研細末醋調敷上干即易之三次即愈救乳化毒湯治乳癰乳吹初起神效金銀花五錢蒲公英五錢當歸一兩水煎服二劑即愈乳吹亦可用且尤易效加酒更妙英藤湯治乳癰初起蒲公英一兩忍冬藤二兩生甘草二錢水二鍾煎一鍾食前服二劑全消參耆瓜蔞散治乳癰乳疽已成者化膿為水未成者即消散如瘰癧更效瓜蔞一個甘草二錢當歸五錢沒藥一錢乳香一錢另研大力子五分人參三錢黃耆五錢水酒各半煎服二劑即消伯高太師方治乳癰初起白芷二錢貝母二錢蒲公英三錢連翹一錢金銀花一兩水煎服一劑即消永類方治乳癰初腫射干即扁竹根如殭蠶者同萱草根為末蜜調敷之神效葛真君湯治瘰癧白芍五兩白芥子五兩香附五兩茯苓五兩陳皮一兩附子三分桔梗五兩甘草一兩各為末水打成丸酒送下五錢一料全愈夏枯草膏薛己治瘰癧馬刀不問已潰未潰或日久成漏夏枯草六兩水二鍾煎七分食遠溫服虛甚者則煎汁熬膏服並塗患處兼以十全大補湯加香附貝母遠志尤善此物生血乃治瘰癧之聖藥也其草易得其功甚多昆花湯章云樵傳治項下腫核乃痰氣不清鬱結而成日久破壞以致氣血虧短卒難收口且連串不已又名癧串此症最難斷根害人非淺此方萬試萬應戒慎忌口常服必驗南夏枯草三錢浙貝母二錢山慈姑一錢玄參一錢連翹一錢牛蒡子一錢橘紅一錢金銀花一錢海藻一錢川芎一錢當歸一錢香附一錢白芷一錢甘草五分昆布三錢水三碗煎一碗空心服如破爛日久不收口者加黃耆白朮各一錢茯苓八分升麻柴胡各五分文武膏岐天師傳治瘰癧神效用桑椹黑者二斗以布袋絞取汁夏枯草十斤取汁二味石器中熬成膏子白湯化下二匙日三服一月即愈忌酒色鵝肉蝸牛散三因治瘰癧潰與未潰蝸牛不拘多少以竹籤穿瓦上曬乾燒存性為末入輕粉少許豬膏髓調用紙花量瘡大小貼之夏枯草湯治瘰癧馬刀不問已潰未潰或已潰成漏形瘦飲食不甘寒熱如瘧漸成勞瘵並效夏枯草二錢當歸三錢白朮三分茯苓三分桔梗三分陳皮三分生地三分柴胡三分甘草三分貝母三分香附三分白芍三分白芷三分紅花三分先煎夏枯草取汁三碗後煎藥七分臥時入酒半小鐘和服準繩云單用夏枯草六兩水二鍾煎至七分去渣食遠服一月即愈後服十全大補湯加香附貝母遠志尤善瘰癧神膏祖傳治各種瘰癧大當歸五兩大穿山甲五兩陳皮三兩肉桂一兩木鱉子肉一兩大蜈蚣十條象皮一兩黃柏五兩黃芩五兩川連一兩白花蛇一兩蘄艾一兩金銀花四兩香油三斤浸半月夏五日春秋十日火熬至黑色去渣再熬滴水成珠加飛過黃丹十兩攪勻再熬又下乳香沒藥兒茶血竭密陀僧俱為末各一兩攪勻候溫入麝香一錢再攪入水中一日去火氣攤貼甚效忌一切發物並房事神祕湯治瘰癧橘皮一錢紫蘇一錢人參二錢桔梗三錢桑皮一錢五分生薑五分五味子三分水煎服木通湯治瘰癧木通一錢車前子二錢豬苓二錢澤瀉二錢連翹一錢花粉二錢金銀花一兩瓜蔞子二錢水二鍾竹葉燈芯煎服忌醋豬頭肉腸肝驢馬羊肉及房事氣怒敗毒散瘰湯治四種瘰串人參一錢當歸二錢厚朴一錢桔梗二錢白芷二錢肉桂五分防風五分黃耆三錢粉草一錢水酒各半煎服膏藥方治瘰癧不破者沉香麝香輕粉銀硃荔枝肉各等分入熟魚膠搗成膏貼之專治硬核不消不破甚效通治瘰癧方不分新久表裡虛實及諸痰結核甚效陳皮一錢白朮一錢柴胡一錢桔梗一錢川芎一錢當歸一錢連翹一錢茯苓一錢香附一錢夏枯草一錢黃芩一錢藿香五分半夏五分白芷五分甘草五分薑三片水二鍾煎八分入酒一小杯臨睡時服瘰癧酒藥方治年久瘰癧結核串生滿頭頑硬不穿者甚效鶴蝨草八兩忍冬藤六兩野蓬蒿四兩野菊花四兩五爪龍三兩馬鞭草一兩五錢用老酒十五斤袋貯藥懸於酒內封口煮三炷香為度取起水頓一伏時初服盡醉出汗為效後隨便飲一料病愈不發抬頭草膏治瘰癧已破者五