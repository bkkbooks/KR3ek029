body:
  text: 卷五背發諸癰瘍發於背者無非危症不可謂背屬陽信是陽症而輕視之也然背之穴道甚多苟不分言之則經絡舛錯未必能直中病情也如生於大椎陶道身柱之穴是發於脊之上也生於神道靈臺至陽之穴者是發於脊之正中也生於脊中之穴者是發於脊之中下也皆屬督脈之經絡生於肺俞厥陰俞心俞膈俞肝俞之穴者是發乾背中之兩旁也生於膈關陽綱胞肓秩邊之穴者乃發於背後之兩旁也皆屬足太陽膀胱之經絡夫既是膀胱之經絡似與督脈無甚相干然而背脊乃河車之正路正路之氣不通則邊旁歧路盡行祕塞勢必至水火無既濟之歡臟腑有各顧之苦則周身前後筋脈拘急其害有不可勝言者故治太陽之經必須兼治督脈以督脈之氣可順而不可逆也凡氣皆自上而下行惟任督之氣自下而上自下而上者為順自上而下者為逆矣且督脈陽脈之海也足太陽之經原為督脈之所統領通足太陽之氣正通督脈之氣也然而督脈氣通而足太陽之氣亦通矣故治之必須兼也以上諸瘍有頭向上者有頭向下者有上下各有頭而開發者或如蓮子或如蜂窠蓮子言其頭少不過一二十也蜂窠言其頭多不止五六十也此等癰瘍陽症少而陰症多總貴擁護心君不可使火毒內攻無奈背近於心最易腐肉穿膜及至穿膜百不救一必須於五日之前急早治之以大劑酣飲庶可奪命於垂危返魂於將死也凡瘡頭開展止遏不住不論向上向下向左向右亟宜用收毒等藥敷而圍之自不衝突也如此救療胃氣大開斷不至死急消湯岐天師傳治背心之間先發細瘰後漸漸紅腫高突大痛忍冬藤二兩茜草三錢紫花地丁一兩貝母三錢甘菊花三錢黃柏一錢天花粉三錢桔梗三錢水煎服一劑輕二劑又輕三劑全消神散陽癰湯伯高太師傳治背疽陽癰初起天花粉五錢生甘草五錢茯苓五錢車前子五錢貫仲五錢羌活二錢黃芩三錢紫菀三錢生地一兩柴胡一錢水煎服一劑即消大半二劑全消若已潰後不可用矣變陽湯岐天師傳治背心初發小泡癢甚已而背重如山隱隱發紅暈如盤之火譫語胡言斷陰疽陰癰也以此方救之人參二兩黃耆二兩金銀花半斤附子一錢荊芥炒黑三錢柴胡二錢白芍一兩天花粉五錢生甘草五錢水十餘碗煎汁二碗先服一碗後再服一碗服後陰必變陽而作痛再用一劑而痛亦消再服數劑全愈錦庇湯伯高太師傳治陰癰初起黃耆三兩肉桂三錢生甘草一兩荊芥炒三錢天花粉三錢貝母二錢錦地羅五錢茯苓一兩水煎服一劑即散大半三劑全消轉敗湯岐天師傳治背癰潰爛洞見肺腑瘡口不收百藥敷之絶無一驗此方治之神效麥冬一兩熟地二兩山茱肉一兩人參五錢肉桂一錢當歸一兩忍冬藤一兩白朮五錢水煎服五劑全愈收肌飲伯高太師傳治同前熟地二兩白朮二兩山茱萸一兩人參一兩當歸一兩生甘草三錢甘菊花三錢肉桂三錢天花粉二錢水煎服一連四劑瘡口自合必須節守房事一月否則無功定變回生湯岐天師傳治背疽長肉瘡口已平偶犯色欲惱怒開裂流水色變紫黑肉變敗壞人參四兩黃耆三兩當歸二兩北五味子二錢麥冬二兩肉桂三錢白朮二兩山茱萸五錢忍冬藤二兩茯苓一兩水煎服四劑平復或疑藥料太重然變出非常不如此多用補劑萬難救死也倘愈後再犯色欲萬無生機補縫飲伯高太師傳治背癰愈後開裂人參二兩白芍五錢當歸一兩白朮炒二兩麥冬一兩肉桂二錢附子一錢熟地二兩北五味三錢山藥五錢水煎服十劑可安助陽消毒湯岐天師傳治夏生背癰瘡口不起脈大無力發熱作渴自汗盜汗用參耆補劑益加手足逆冷大便不實喘促嘔吐陰症似陽此方主之人參半斤黃耆一斤當歸四兩白朮四兩陳皮一兩附子五錢水煎膏作二服連服數劑乃愈此舍癰從症之法蓋症出非常不可以平常細小之藥從癰也起陷神丹伯高太師傳治症同前人參二兩白芍五錢當歸一兩麥冬一兩白朮二兩肉桂二錢附子一錢熟地二兩北五味三錢山藥五錢水煎服十劑可安歸花湯秦真人傳治癰疽發背初起金銀花半斤水十碗煎二碗入當歸二兩同煎一碗一氣服之一日即散絶神方也世人亦有用此者不能多耳不拘陰陽之毒飲之立愈但過四五日則減半效然亦無性命之憂對口與無名腫毒亦可用或略小其劑可也泥丸發泥丸宮在頭頂之上癰瘡發於此外九死一生其狀如火燎漿泡大如錢形色似葡萄之紫其瘡口不一或如碎粟倘四圍堅硬瘡頂色紅赤不黑尚可醫療乃陽癰而非陰也倘色紫而黑黯無光神情悶亂不知人事者乃陰癰而必死也蓋泥丸宮屬足太陽膀胱之經近於玉枕乃督脈之路也腎經之氣由督脈而上透玉枕入於泥丸而化精乃從額而下降於玉樓若腎精不足而泥丸內涸無精以養乃化為火毒此無陰水以制陰火也腦既無陰又加生癰髓海煎熬其精愈竭又何以救乎故往往有更變形容改換聲音煩躁口乾隨飲隨渴甚至腦骨俱腐片片脫下而亡人生此癰得於房術者居多興陽澀精盡是丹石燥烈之品或洗或嚼或噙於舌或封於臍霸阻精道久戰博歡真精枯竭髓盡火發遂發於頂而不可救為可痛也必須於五日之前以大劑煎飲尚有生機倘五日後救之則生死未可定也五聖湯岐天師傳治腦癰生於頭頂之上者若對口偏口俱非腦癰也急以此方救之金銀花八兩玄參三兩黃耆四兩麥冬三兩人參二兩先用水十大碗將金銀花煎湯六碗再煎前藥至二碗一日服二次連服四日用四劑其癰漸愈改用十全大補湯重四兩與之又服四劑又改用八味地黃湯恣其酣飲可獲全意此等治法乃九死一生之法也然舍此法惟蔓花湯乎蔓花湯伯高太師傳治腦疽初發川芎一兩玄參二兩金銀花二兩山茱萸一兩麥冬一兩貝母三錢蔓荊子二錢水三大碗煎服之即消如尚未消者二劑全愈萬勿候其潰敗而始救之也蓋潰敗之時則不可救矣腦後發腦後乃玉枕風府之穴道也玉枕為督脈之關蓋督脈有三關玉枕其一也督脈由命門而上至玉枕乃河車之路也透過玉枕始達泥丸若玉枕風府生癰如何能達腎氣至泥丸而化精乎雖泥丸為髓海內原有髓在也然腎氣無一日不上通泥丸者也腎氣因生癰而不能上達則泥丸之髓源斷矣何能化精以分布於各臟腑乎此處生癰雖少輕於頂然是陰非陽則與頂發無殊故治療亦可通用如五聖散蔓花湯大劑吞服無不可救不比頂發於泥丸者十死而一生也或曰玉枕風府系足太陽膀胱之經且陽維之脈所繞未必不是陽症誰知膀胱火毒發動由於腎火之先動也況陽維之脈隨督脈而上行是陰非陽又何疑哉故可以治頂發者同治之也三星湯岐天師傳治陽症對口其形高突紅腫服之即消金銀花二兩蒲公英一兩生甘草三錢水三碗煎八分服二服即消陽症已破者必三服膿盡肉生聖神湯岐天師傳治陰症對口或生於偏旁無數小瘡先癢後痛隨至潰爛腫不甚高突色必黑黯身體沉重困倦欲臥呻吟無力此方救之人參一兩生黃耆一兩當歸一兩金銀花二兩白芥子三錢肉桂一錢白朮炒一兩水煎服一劑血止二劑肉生三劑口小四劑皮合又二劑全愈三花湯伯高太師傳治對口初起神效當歸二兩川芎一兩生甘草五錢天花粉三錢紫花地丁一兩甘菊花五錢水煎服二劑全消耳後耳下發耳後發者發於左右耳畔乃角孫顱息二穴之上下也發則耳聾嗌腫項痛手之小指肩肘俱因之而疼蓋手少陽三焦經之火毒也三焦經多氣少血是經生瘡最難奏效況又生於耳後未免耳屬腎經單治三焦而不兼補夫腎則水不足以濟火其火毒未必不更熾也雖消風抑火內疏內托隨症施治俱是良法而不大補其血與重填其精恐未易遽愈也又有發於耳下者乃翳風瘛脈之穴也名曰首疽亦系三焦之經實系致命之所尤宜早治然早治而不大補氣立徒用化毒敗火之劑少少輕療治陽症尚有變陰之害況原是陰虛火發之症又何以濟哉凡生此疽多憎寒壯熱七八日可刺膿水黃白色可治以其屬陽也如黑色稀水乃陰症也大惡若發渴者即死以上數症皆起於積想在心謀慮不決鬱怒不已致火旺蘊結日久乃發也故形多堅硬頭多隱伏未潰先黑未膿先腐不得外發內攻而死也護耳散毒湯巫真君傳治左右耳後陰陽疽癰金銀花二兩當歸一兩麥冬一兩蒲公英三錢甘草三錢桔梗二錢半夏二錢川芎五錢水煎服二劑輕六劑全愈未潰者三劑全散如是陰虛色紫黑者加人參五錢生黃耆二兩一劑即散已潰者十劑全愈耳前發耳前發者發於兩耳之前乃懸釐客主人之穴也雖曰耳發實生於耳之外非生於耳之中按二穴屬足少陽膽經是經多氣少血且二穴又在面之旁尤少血之處故生癰最難愈且穴雖屬少陽而地近於耳豈有耳不連及之理況耳為腎之竅懸釐客主人乃膽之經而膽乃腎之子也子為火毒所燒腎母寧忍坐視必求相援而膽子畏火毒之逼必遁入母經絡以避其害未必不遺禍於母家也故治之法瀉膽之火毒尤宜補腎之精水倘瘡口高突乃陽火陽毒盡發於外也不必憂慮設五六日後漸長漸大形如蜂窩皮紫疤黑痛如火灸十日內刺之有膿者尚可望生或刺之無膿惟有純血流而不已本少血而又傷其血則木必剋土脾胃大壞不思飲食或食而不知其味此入陰之兆也二十四日之後恐不能保其生也此症或發於左或發於右其危險同之能於初發時急救之皆可慶生也顧耳湯巫彭真君傳治耳前初發惡疽柴胡二錢白芍二兩金銀花二兩熟地二兩當歸一兩天花粉五錢生甘草三錢水數碗煎一碗半飢服一連二劑全散若十日之後此方救之亦可生然脾胃一壞恐難救矣鬢髮鬢髮者發於左右之兩鬢乃頭維下關之穴也鬢疽屬手少陽三焦相火薛新甫云是肝膽之火或風熱也不可為訓但忌用灸尤忌見膿查頭維下關之穴本屬足陽明胃經之穴初起之時大如癤子次後漸大四圍高突頭面眼鼻俱浮此陽症也且兩鬢又近於太陽乃陽之位也似宜作陽症治之但雖是陽症往往有變為陰症者所以治陽又宜加入陰分之藥以預防其變若已潰破爛更須陰藥倍多於陽藥則陰之正旺自然陽之邪難變也倘睡中恍惚或吐逆不止此陽症變陰亦死症耳不可謂胃經是多氣多血之腑而輕用散劑也理鬢湯岐天師傳治兩鬢生疽無論已未潰爛皆可治之金銀花三兩白芷二錢川芎一兩當歸一兩夏枯草三錢水煎服未潰者二劑即消已潰者四劑全愈蒿草飲伯高太師傳治鬢疽青蒿一兩玄參一兩生地一兩川芎一兩夏枯草一兩細辛一錢蔓荊子一錢水煎服一劑輕二劑愈臉發臉發者發於面上左右四白巨髎之穴也有生於鼻柱上者雖屬於肺亦風熱也按四白巨髎在淚堂之下鼻之兩旁此二穴雖屬足陽明之部位然陽明之經最易動火使無陰相濟則其火一發多有不能止遏之時往往變生不測故此二穴生癰亦大可畏倘初起之時色似葡萄其形漸大或生子母之瘡八九日即有亡者可見此瘡亦宜急治補陰以濟陽內托而兼化毒實善治之法也護顏湯巫彭真君傳治臉旁鼻外生疽玄參一兩當歸一兩金銀花二兩瓜蔞半個生地一兩石膏三錢白芷二錢半夏二錢黃芩二錢水六碗煎一碗服五日內即散對口發對口發者發於風府啞門之穴也正對於前唇口故以對口名之乃督脈之火毒也夫督脈何以有火毒乎蓋督脈起於尻骨過命門夾脊而上透於玉枕玉枕之穴近於泥丸泥丸之穴最惡腎火之燒最喜腎水之潤也玉枕之穴與泥丸性正相同乃唇齒之穴也玉枕知泥丸喜水而不喜火遇水則引而上升遇火則閉而不納腎火至玉枕而不納勢必停留於玉枕之外而風府啞門正其穴也故久留而不散遂結成火毒而生癰矣此症之生本是凶症然而生於對口者猶輕生於偏旁髮際天柱穴間者為更重初發之時急宜救之蓋天柱屬足太陽膀胱之經雖多血少氣然其地上近於腦不可作陽癰治之況此處生癰多現無數小瘡口以惑世人不知從何處覓頭急宜消之若少遲恐毒入於腦邪熱上攻不可救矣夫陰陽二毒俱可內消何可遷延等待令其皮破腫潰而後治之乎逮於瘡口赤腫或變為紫黑發寒發熱毒勢大橫動刀而無膿用針而流血通喉落首追悔不亦遲乎故吾願人於二三日前而早用大劑於補血補氣之中益之散毒散火之藥以急治之也加味三星湯巫彭真君加治陽疽金銀花二兩蒲公英一兩生甘草三錢玄參一兩水數碗煎八分服二服即消陽症已破者三服膿盡生肉加減聖神湯巫真君加治陰疽人參一兩生黃耆一兩當歸五錢金銀花三兩白芥子三錢附子一錢一二劑止血生肉六劑全愈加味三花湯巫真君加治對口初起當歸二兩川芎一兩天花粉三錢紫花地丁一兩甘菊花五錢水煎服二劑全消或用生甜菜一把搗加酒釀少許同敷瘡口干即易之亦頗效然可治陽症也若陰症難痊吾以為甜菜非四時之物不若前三方可頻得也世有奇方非余所知目鋭眥下發目鋭眥下發者發於瞳子髎左右之穴也童子髎屬足少陽膽經下循聽會上關上抵於頭角乃膽經之盡穴也膽經氣多血少生癰本難速愈況逼近於鋭眥未有毒火不上熾於目者況目乃肝之竅也膽與肝為表裡膽病則肝亦病肝病則目有不病者乎目病則肝益病矣膽肝兩病非陰陽皆病乎倘是陽非陰則瘡口必赤腫有膿而痛倘不痛而作癢口中大渴心中悶亂瘡口雖破有血無膿顏色青黑瘡作蛀孔狀血出不止此陰疽也陽主生而陰主死然早治之亦可救也二甘散巫真君傳治瞳子髎穴生陽疽黃連二錢龍膽三錢葳蕤二錢白芍五錢天麻二錢荊芥二錢甘菊花三錢甘草三錢忍冬一兩水煎服食後服二劑急治可散葳蕤金銀散巫真君傳治目鋭眥下生陰疽葳蕤二兩芍藥二兩當歸一兩金銀花二兩人參五錢肉桂一錢玄參五錢麥冬五錢車前子三錢熟地一兩水數碗煎一碗急服早治則危可變為生頤發頤發者發於頰車大迎之穴也或發於右邊或發於左邊或左右兩邊同發單發似輕雙發似重然而雙發而軟者雖重而反輕單發而硬者雖輕而反重蓋軟則尚可飲食硬則牙關緊閉食物難進也論頰車大迎之穴乃足陽明胃經之穴也人生以胃氣為本凡病有胃氣者俱可望生況原是胃經之病而胃可自病乎胃不自病則頰車大迎之間斷不生癰因其胃中之火過盛而毒不自安於下乃上騰於面而生瘡及至生癰生瘡而腑內之火少息則胃氣有生髮之機尚不至殞滅也否則火不息而毒益熾見食則惡或得食則嘔皆死兆也倘腫破無膿牙關硬如石艱於進食瘡口狀似蜂窠涓涓惟流黃水則十無一生以其胃氣之絶也連翹野菊散巫真君傳治頤生癰初起連翹五錢野菊三錢瓜蔞二錢石膏三錢地榆三錢當歸五錢甘草二錢玄參一兩金銀花二兩水煎服唇發唇發者唇上生瘡毒也或生於口角之旁或生於上下唇之際不必問其大小總皆脾胃之火毒也治宜急而不宜緩治之早則易散治之遲則難痊以毒久熾炎兩唇腫大艱於進食往往有腐爛而亡故治之必須急也然急瀉火毒而不附之健脾益胃之藥則脾胃損傷雖散毒而毒轉不散也此護吻湯之神以其散毒消火而仍不損傷脾胃之氣故建功特奇至於繭唇治法少輕其形似繭然亦脾之病也經云脾氣開於口脾之榮在唇乾燥開裂白皮皺揭宛如蠶繭始起小瘤如豆大隨消隨生漸漸腫大合而為一原有寸許或如楊梅或如芝菌雖本於七情六氣總因腎火枯而脾火熾也用歸脾養榮治於內以金銀烙於外亦易愈也此症婦人多生之用四物湯逍遙散合治為佳外先以莧茶散搽之後以生肌散摻之自瘥甑汗方準繩治唇瘡以甑上滴下汗敷之纍效如神又方以白荷花瓣貼之神效如開裂出血者即止護吻散治唇吻生瘡毒紫花地丁一兩麥冬一兩玄參一兩夏枯草一兩生甘草三錢水煎服一劑輕二劑愈歸脾養榮湯世傳治繭唇當歸川芎白芍生地茯苓陳皮柴胡甘草麥冬升麻山梔子桔梗黃耆白朮防風牡丹皮黃柏知母婦女加澤蘭香附玄胡索水煎服莧茶散外治唇繭先用烙鐵艾火內燃燒通紅燙患處五六次後敷此藥莧菜陰乾燒灰三錢銅青二錢枯礬二錢輕粉一錢雄黃一錢雞內金二錢麝香二分孩兒茶二錢為細末麻油調搽明日再用甘草煎湯洗淨再烙以平為度後用生肌散用烙鐵時要擇吉日不犯尻神燙畢隨藥搽之不再生除根矣生肌散花蕊石醋煅二錢孩兒茶二錢雞金二錢飛丹煅水飛一錢乳香二錢血竭二錢紅絨灰一錢黃連一錢為細末加冰片一分干即摻之肩臑發肩臑發者發於肺俞魄戶之間靈樞曰疵疽俗名之搭肩也此處屬手足太陽之經有瘡無串者易治有串者難治蓋發於左者多串發於右亦有無串而左右同發者與發於背之正中者不相上下也當觀善惡以定吉凶與發背治法相同亦須分陰陽而用托裡疏下之法倘是陰症以治陰之法治之不可誤也要在臨症之時辨別之明而用藥之斷也紅消散巫彭真君傳治肩臑生陽癰紅內消三錢秦艽二錢蒼耳子三錢紫花地丁五錢石韋二錢天花粉三錢天門冬三錢羌活二錢炙甘草三錢當歸一兩水煎服初發者二劑即消已潰者不可服治陰散毒湯巫公傳治肩臑生癰已潰陰症生黃耆一兩當歸一兩熟地二兩金銀花三兩生甘草三錢附子一錢水煎服連用數劑倘口健思食夜臥能安即生否則死也腎俞發腎俞發者發於腰之上命門之旁乃膀胱之經穴也然其穴逼近腎堂雖膀胱之部位實即腎之部位也此處斷不可生癰而癰之生者無不由於多服金石熱藥及膏粱厚味又不忍輕易泄精遂忍耐而戰及至精欲下走之時或提氣縮龜不使其遽泄腎精不得出於精管欲仍回舊宮而腎不受乃壅於皮膚變為毒而成癰也凡癰俱不可輕用攻劑況腎有補而無泄更宜用補蓋腎得補而氣旺氣旺則火毒難留而易散也設於補之中而益之託里解表之味誰謂腎癰即不可治哉惟因色而成癰覆成癰而犯色未有不死者矣至於氣惱亦須同忌以肝為腎之子肝有怒氣必耗腎水腎虛復耗瘡必難痊然終不及犯色欲之凶為更烈也補腎祛毒散巫真君傳治腎俞生癰忍冬藤四兩熟地三兩豨蘞三錢天花粉二錢草烏頭二錢肉桂二錢水煎汁一碗空腹服未破者二服即消已潰者即去黑爛十服乃愈腰下發腰下發者發於兩腰之下乃膀胱中膂之腧穴也初起時發熱焮痛百節疼痛昏沉不知人蓋膀胱與腎有別毒發於膀胱與毒發於腎經其輕重必異然膀胱之氣一遵腎之氣而行膀胱中膂之腧穴生癰必腎中先自有火毒也火之有餘必水之不足邪之甚旺必正之大虧水不能濟火正不能祛邪恐有倒陷之禍倘有膿無血此正足以敵邪水足以濟火也無難治療如無膿出血水流而不收口者此無陰之兆也必大補其精而內托之始有生機否則難治九靈湯伯高太師傳治腰眼生疽疼痛熟地二兩山茱萸一兩白朮二兩防己一錢紫花地丁一兩荊芥炒黑三錢生地五錢丹皮五錢生甘草三錢水數碗煎一碗服一劑輕四劑全愈兩治散岐伯天師傳治腰下發癰昏沉疼痛白朮一兩杜仲一兩當歸一兩金銀花三兩防己一錢豨蘞草三錢水數碗煎服一劑輕二劑痛止五六劑全愈若已潰甚者多服自愈
