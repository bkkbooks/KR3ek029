body:
  text: 跋曾祖遠公自少習舉業以數奇屢試輒蹶已而出遊京師復不得志遂究心於醫學焉一日夜深獨坐忽有二老者扣扉而進衣冠整肅所與談皆青囊之術情意真切指示詳明盤桓兩月餘臨別時謂公曰子可出而救世矣言訖不見公始識其為仙子也由是閉戶著書闡發醫理二十餘種所者素靈本草傷寒六氣外經微言石室祕録辨證録臟腑精鑑脈訣闡微辨證玉函等書付梓行世已歷有年所矣第前所刊者俱系內科而外科不與焉不知瘡瘍之症其險更甚於內科嘗見世上患瘡瘍而不救者何可勝數要其所以不救之故皆由於證候不明治之不得其法耳今本集所載其辨證也備而晰其用法也妙而神毋論奇名怪症處萬死一生之候按法治之無不可轉死為生屢試屢驗誠為有濟於民生有功於後世矣故特付諸剞劂以公海內庶二仙祕術得以不朽而先大人著書苦心亦不虛歟時乾隆庚戌花朝曾孫鳳輝謹跋
