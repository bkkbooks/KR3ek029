body:
  text: 卷十四奇方上瘡瘍腫潰諸方救命舟仙傳治癰疽各瘡陰症陽症無不神效穿山甲三大片同蛤粉炒熟不用粉甘草節二錢乳香一錢天花粉二錢赤芍三錢皂角刺五分去針貝母二錢沒藥五分當歸一兩陳皮一錢金銀花一兩防風七分白芷一錢白礬一錢生地三錢酒水各數碗煎八分瘡在上食後服瘡在下食前服能飲酒者外再多飲數杯忌酸酒鐵器服畢宜側臥少暖有汗覺痛減大半有起死回生之功效難盡述一癰疽發背在頭及腦後背脊加羌活一錢角刺倍之此太陽經藥也一在脅胸少陽經部位者加柴胡一錢瓜蔞仁二錢一在腹臍太陰者加陳皮五分赤芍三錢白芷一錢一生在手臂膊加桂枝三分一生在腿膝加牛膝二錢防己五分黃柏一錢歸尾三錢如腫硬加連翹二錢木鱉仁五分倘是疔瘡方中加紫河車三錢蒼耳子三錢如人虛弱不潰不起加人參三錢甘草一錢如人壯實加大黃二錢麻黃一錢連根節用金銀補益湯家傳治瘡瘍元氣虛倦口乾發熱金銀花二兩生黃耆三錢甘草一錢人參三錢白朮二錢陳皮一錢升麻五分柴胡一錢當歸三錢上水煎服人參敗毒散世傳治諸瘡瘍焮痛發熱拘急頭痛脈數而有力者人參羌活前胡獨活川芎甘草柴胡桔梗枳殼茯苓各等分上水煎服如嘔吐加生薑陳皮半夏如脈細而無力加大力子半分極驗溶膠湯世傳治諸癰疽惡毒大患保全有大功活人最多不可輕忽穿山甲四片如瘡在背即用背上甲在手用前足上山甲五分如在足用後腿上甲五分炙酥為末真牛皮膠四兩炒成珠水酒各一碗調勻前二味煎數沸服之以醉為度加味十宣散家傳治瘡瘍因外感風寒內因氣血虛損經云百病乘虛而入是宜服此人參一錢當歸二錢黃耆三錢甘草一錢白芷一錢川芎一錢桔梗一錢厚朴薑製五分防風三分肉桂三分忍冬藤五錢水煎服如脈緩澀而微加黃耆人參白朮如脈弦身倦加當歸白芍麥冬如脈緊細加桂枝生地防風如脈洪大而虛加黃耆黃連花藤薜荔湯岐天師傳治發背諸瘡癰初起薜荔二兩金銀花三兩生黃耆一兩生甘草二錢水數碗煎一碗渣再煎一劑即消消散湯長桑公傳治瘡瘍初起立時消散金銀花三兩生甘草三錢蒲公英三錢天花粉三錢當歸一兩酒水各一碗煎服此方散邪解毒全不損傷正氣而奏效獨捷若遇陰症瘡瘍加人參五錢附子一錢尤炒若陽症瘡瘍萬不可加柞木飲子精要治癰疽未成自消已潰自干輕小證候可以倚伏干柞葉四兩乾荷葉蒂干萱花根甘草節地榆各一兩共為末每服五錢水二碗煎一碗作二次早晚分服回瘡金銀花散準繩治瘡瘍痛甚色變紫黑金銀花二兩黃耆四兩甘草一兩上用酒一升同入茶瓶內閉口重湯煮三時辰取出去滓頓服之神效托裡散家傳治癰疽腫毒發背腸癰乳癰時毒憎寒壯熱不論老幼虛實俱效黃耆五錢金銀花一兩當歸五錢生粉草三錢水酒各一鍾煎服渣搗敷患處或俱為末酒調服之更效神散湯世傳治癰疽初起金銀花八兩水十碗煎二碗再入當歸二兩同煎一氣服之不拘陰陽癰疽初起者散毒尤速如已四五日者財減之半效然斷無性命之憂金銀花酒世傳治一切惡瘡癰疽不問發在何處或肺癰腸癰初起便服之奇效金銀花五兩甘草一兩水二碗煎一碗再入酒一碗略煎分三服一日一夜服盡重者日二劑服至大小腸通利則藥力到外以鮮者搗爛酒調敷患處彌佳黃金飲家傳治瘡生腿外側或因寒濕得附骨癰於足少陽經分微侵足陽明經堅硬漫腫行步作痛或不能行並皆治之柴胡一錢五分金銀花一兩大力子一錢肉桂一錢黃耆五錢歸尾三錢黃柏七分炙甘草五分水酒各半煎食前服金銀五香湯家傳治諸瘡一二日發寒熱厥逆咽喉閉金銀花一兩乳香二錢木通二錢大黃二錢連翹一錢沉香一錢木香一錢丁香一錢茴香一錢獨活一錢射干一錢升麻一錢甘草一錢桑寄生一錢上咀水二鍾姜三片煎服不拘時莢花湯世傳治癰疽未潰金銀花一斤蒲公英八兩綿黃耆六兩生甘草一兩川貝母三錢水煎作三次服完全愈金銀解毒湯祖傳治積熱瘡瘍焮腫作痛煩躁飲冷脈洪數大實口舌生瘡疫毒發狂黃芩一錢黃柏一錢黃連一錢炒梔子一錢金銀花一兩水煎熱服金銀六君湯祖傳治瘡瘍作嘔不思飲食面黃臌脹四肢倦怠大便溏利人參一錢白朮土炒一錢茯苓一錢半夏薑製一錢陳皮一錢炙甘草五分金銀花二兩姜三片棗二枚水煎服如過食冷物致傷脾胃本方加藿香砂仁消毒神聖丹仙傳治背癰或胸腹頭面手足之疽五日內服之即散金銀花四兩蒲公英二兩生甘草二兩當歸二兩天花粉五錢水煎服一劑即消二劑全愈散寒救陰至聖丹仙傳治癰疽瘡色黑暗痛亦不甚但覺沉沉身重瘡口不突起現無數小瘡口以欺世人此方服之甚效附子三錢人參三兩生黃耆三兩當歸一兩金銀花三兩白芥子二錢水煎服外貼至聖膏生肌末藥五錢貼之一日兩換始可蓋陰症瘡瘍多生於富貴膏粱之客功名失志之人心腎不交陰陽俱耗又加憂愁怫鬱嗔怒呼號其氣不散乃結成大毒毋論在背在頭在腹在脅在手在足俱是危症若用此方又用至聖膏藥無不全生蓋陽症可以涼解而陰症必須溫散也立消湯仙傳治癰疽發背或生頭項或生手足臂腿腰臍之間前陰糞門之際毋論陰毒陽毒未潰即消已潰即斂蒲公英一兩金銀花四兩當歸二兩玄參一兩水煎飢服此方既善攻散諸毒又不耗損真氣可多服久服俱無礙也即治肺癰大小腸癰無不神效通氣散啟玄治一切癰疽發背流注折傷能救敗壞瘡症活死肌彌患於未萌之前拔根於既愈之後此劑之功妙不可言生首烏五錢當歸三錢赤芍二錢白芷二錢茴香一錢烏藥炒一錢枳殼炒一錢木通一錢甘草二錢忍冬藤一兩水酒煎服一腦疽對口去木通加羌活藁本如虛弱加人參黃耆內疏黃連湯易水治嘔吐心逆發熱而煩脈沉而實腫硬瘡瘍黃連一兩赤芍一兩當歸一兩檳榔一兩木香一兩黃芩一兩梔子一兩薄荷一兩桔梗一兩甘草一兩連翹二兩上共為末每服一兩大便秘澀加大黃一錢內外復煎散易水治腫焮於外根盤不深形症在表地骨皮二兩黃耆二兩防風二兩赤芍一兩黃芩一兩白朮一兩茯苓一兩人參一兩甘草一兩防己一兩當歸一兩桂枝五錢先用蒼朮一斤煎至三升去蒼朮入前藥再煎作三四次終日服之此除濕熱之劑也如或未已仍服當歸黃耆湯易水治瘡瘍臟腑已行而痛不可忍者當歸一錢五分黃耆一錢五分生地一錢五分地骨皮一錢五分赤芍一錢五分水煎服如發熱加黃芩如煩躁加梔子如嘔乃濕氣侵胃倍加白朮此準繩首載三方也八仙散毒湯祖傳治一切惡瘡初覺時連進三服如失當歸五錢熟地五錢甘草二錢黃耆一兩白芍二錢天花粉三錢金銀花一兩生地二錢水二碗煎八分半飢服中和湯準繩治瘡瘍屬半陽半陰似潰非潰似腫非腫此因元氣虛弱失於補托所致人參一錢五分陳皮一錢五分黃耆一錢五分白朮一錢五分當歸一錢五分白芷一錢五分茯苓一錢川芎一錢皂角刺一錢乳香去油一錢沒藥去油一錢金銀花一錢甘草節一錢水酒各半煎服托裡散世傳治一切惡瘡發背疔瘡便毒始發脈弦數洪實腫甚欲作膿者此實熱堅滿之症故可下之金銀花一兩當歸一兩大黃三錢朴硝三錢天花粉三錢連翹三錢牡蠣三錢皂角刺三錢赤芍一錢五分黃芩一錢五分水酒煎服回毒金銀花湯世傳治瘡瘍色變紫黑金銀花二兩甘草一兩黃耆四兩酒一升重湯煮服護膜礬臘丸仲仁傳護膜防毒內攻未破即消已破即合一日之中服至百粒始有效驗服過半斤必萬全也白礬二兩黃蠟一兩暖化少冷即入礬末攪勻以蜜丸如梧子大硃砂為衣每服二三十丸酒吞服托裡黃耆湯世傳治瘡瘍潰後膿多內虛黃耆人參桂心遠志麥冬五味等分每服五錢食遠服托裡溫中湯世傳治瘡瘍寒變內陷膿出清稀皮膚涼心下痞滿腸鳴腹痛大便微溏食則嘔逆氣短呃逆不得安臥時發昏憒附子制四錢炮姜三錢羌活三錢木香一錢五分茴香一錢丁香一錢沉香一錢益智仁一錢陳皮一錢炙甘草一錢生薑五片水煎服托裡神奇散家傳治諸瘡發背疔瘡黃耆五錢厚朴一錢防風一錢桔梗二錢連翹二錢木香五分沒藥去油一錢乳香去油一錢當歸五錢川芎八分白芷一錢金銀花一兩芍藥一錢官桂五分人參二錢甘草三錢水酒煎服黃耆六一湯世傳治癰疽潰後作渴及人無故作渴或肺脈洪數必發癰疽服此除之綿黃耆六兩蜜水炒一半鹽水炒一半甘草一兩半生半炙每服一兩水煎食遠服參花湯家傳治潰瘍氣血俱虛發熱惡寒失血等症金銀花一二兩人參一二兩薑棗煎服獨參湯世傳治瘡瘍潰後氣血虛極令人發熱惡寒失血之症人參一二兩棗十枚姜十片水煎徐徐服之加減八味丸世傳治瘡瘍將痊未痊作渴甚則舌上生黃乃腎水虧極不能上潤令心火炎炎不能既濟故心煩躁渴小便頻數白濁陰痿飲食少肌膚損腿腫腳弱此方滋陰降火則無口舌瘡患矣山藥四兩桂心一兩山茱萸酒浸四兩白茯苓三兩澤瀉三兩五味子一兩牡丹皮三兩熟地八兩酒蒸上為末蜜丸如桐子大每服六七十丸空心送下加味聖愈湯世傳治瘡瘍膿水出多或金刀瘡血出多不安不得眠五心煩熱熟地五錢生地五錢川芎五錢人參五錢金銀花一兩當歸三錢黃耆三錢水煎食遠服十味托裡散世傳治發背癰疽癤毒乳癰腳痛未成即散已成即潰敗膿自出惡毒自消痛疼頓減非常之驗人參二錢當歸五錢官桂一錢川芎八分防風一錢白芷一錢桔梗二錢黃耆五錢甘草一錢厚朴一錢水煎服內托散準繩治各瘡腫毒大黃五錢牡蠣五錢瓜蔞二枚甘草三錢上銼末每服三錢水煎溫服止痛當歸湯世傳治背疽腦疽穿潰疼痛當歸生地芍藥黃耆人參甘草官桂各等分水煎服補中益氣湯世傳治瘡瘍倦怠口乾發熱飲食無味或不食勞倦脈洪大無力或頭身痛惡寒自汗氣高而喘虛煩炙黃耆一錢五分炙甘草一錢人參一錢炒白朮一錢升麻三分柴胡三分當歸一錢金銀花一兩薑棗水煎空心午前服十全大補湯世傳人參二錢桂枝二錢熟地二錢川芎二錢茯苓二錢白朮二錢白芍二錢黃耆二錢當歸二錢甘草一錢薑棗水煎服如虛弱極加熟附子三分如未成膿者加枳殼香附連翹木鱉仁數分如氣虛倍參耆如血虛倍芎歸加薑炭八珍湯世傳治瘡瘍脾胃傷損惡寒發熱煩躁作渴或潰後氣血虧損膿水清稀久不能愈人參二錢白朮炒三錢茯苓一錢甘草一錢當歸三錢川芎八分芍藥一錢熟地一兩薑棗水煎食遠熱服人參養榮湯世傳治潰瘍脾胃虧損氣血俱虛發熱惡寒四肢倦怠肌瘦面黃汲汲短氣食少作渴及瘡不收口人參一錢白朮一錢黃耆一錢桂心一錢當歸一錢甘草一錢炙白芍一錢五分熟地三錢茯苓二錢五味子炒杵七分遠志一錢五分薑棗水煎服加味養榮湯家傳人參三錢白朮炒三錢白芍二錢黃耆五錢桂心一錢當歸三錢甘草一錢熟地一兩茯苓二錢五味子七分遠志一錢銀花一兩薑棗水煎服治魂丹世傳治癰疽惡瘡疔毒等類大有神效乳香一錢沒藥一錢銅綠一錢枯礬一錢黃丹一錢穿山甲炙一錢輕粉五分蟾酥五分麝香少許共為細末蝸牛研為丸如綠豆大每服一丸至重者服二丸蔥白搗裹熱酒送下取汗透為妙內消神丹家傳治各癰惡瘡殭蠶二錢乳香去油三錢沒藥三錢枯礬三錢炙山甲三錢銅綠三錢黃丹三錢全蠍去尾足四錢輕粉一錢蟾酥一錢麝香二分各為末蝸牛研為丸每用一丸蔥白搗裹熱酒送下汗透為佳梅花點舌丹內府傳治一切諸般無名腫毒十三種紅絲等疔喉閉並傳寒等症神驗硃砂二錢雄黃二錢白硼二錢血竭一錢乳香去油二錢沒藥去油二錢蟾酥人乳浸一錢牛黃一錢苦葶藶二錢冰片一錢沉香一錢麝香六分珍珠六分上白者佳熊膽六分共為細末將人乳浸透蟾酥研入諸藥調勻和丸如梧桐子大金箔為衣凡遇瘡毒用藥一丸壓舌根底含化隨津嚥下藥盡用酒蔥白隨量飲之蓋被臥之出汗為度刻有效驗合藥宜秘之忌發物三七日更妙飛龍奪命丹啟玄專治癰疽疔毒無名惡瘡渾身憎寒噁心已成未成或黑陷毒氣內罨乃穿筋透骨之劑無經不通故能宣泄汗吐下三法俱備及中一切毒禽惡獸肉毒所致成瘡及脈沉緊細數蘊毒在裡並濕毒用之神效硼砂一錢硃砂二錢黃丹一錢斑蝥三錢蟾酥三錢血竭三錢乳香去油三錢沒藥三錢麝香五分人言一錢巴豆去油一錢半夏五分硇砂一錢共為細末用頭生小兒乳汁搗蝸牛為丸如綠豆大每五七丸各隨症引送下亦分上下前後服之一疔瘡初發渾身憎寒噁心先噙化一丸如覺身麻木用三五丸水吞下一發背癰疽初起作渴用水吞三五丸一乳蛾喉閉用一丸噙化下一下疳瘡用一丸奪命丹準繩蟾酥五分輕粉五分硃砂三錢枯礬一錢寒水石一錢銅綠一錢乳香一錢沒藥一錢蝸牛二十一個各為末蝸牛搗為丸加酒少許如綠豆大每服一丸嚼生蔥三五莖爛吐於手心包藥在內熱服汗出為效重者再服一丸內造蟾酥丸專治一切諸般惡毒發背癰疽魚口對口喉閉喉癰喉癮疹並三十六種住節紅絲等疔並蛇傷虎咬瘋犬惡舌所傷諸般大毒一併治之若瘡不痛或麻木或嘔吐痛未止病重者多昏憒此藥服之不起發者即發不痛者即痛痛甚者即止昏憒者即惺嘔吐者即改未成即消已成即潰真有回生之功乃惡瘡之至寶也蟾酥三錢酒化輕粉五分枯礬一錢寒水石一錢銅綠一錢乳香一錢膽礬一錢麝香一錢雄黃二錢蝸牛二十一個硃砂三錢為衣各為細末合藥於端午日午時在淨室中先將蝸牛研爛再同蟾酥和研調勻方入各藥共搗極勻丸如綠豆大硃砂為衣每服三丸引用蔥白五寸患者自嚼爛吐於男左女右手心包藥在內用無灰熱酒一鍾送下蓋被出汗如人行五六里出汗為度甚者再進一服修合時忌婦人雞犬見之經驗如神百發百中沖和膏啟玄治癰疽發背流注折傷損痛流注痰塊瘰疽軟癤及冷熱不明等瘡蔥酒隨症敷之紫荊皮炒五兩獨活炒三兩石菖蒲二兩赤芍藥炒二兩白芷一兩共為細末凡諸瘡瘍莫不因氣血凝滯之所生也紫荊皮系木之精能破氣逐血獨活是土之精能引氣活血拔骨中冷毒去肌肉中濕痹更與石菖蒲破石腫硬如神赤芍是火之精能止痛活血生血去風石菖蒲乃水之精能消腫止痛散血白芷是金之精能去風生肌止痛肌生則肉不死血活則經絡通肉不死則瘡不臭爛血活則瘡不焮腫故云風消血自散氣通硬可除蓋人之五體皮肉筋骨血也得五行之精而病除矣一瘡勢熱極不用酒調可用蔥泡湯調乘熱敷上最妙如熱減亦用酒蓋酒能生血行血也一瘡有黑暈瘡口無血色者是人曾用涼藥太過宜加肉桂當歸是喚起死血則黑暈自退也如血回只以正方用之一痛不止加乳香沒藥酒化溶於火銚內後將此酒調藥熱敷痛處一流注筋不能伸者用乳香沒藥照前酒調敷最能止痛一瘡口有胬肉突出者其症有三一曰著水二曰著風三曰著怒皆有胬肉突出宜用此膏少加南星末以去其風用薑汁酒調敷周圍如不消者必是俗人誤以手著力擠出膿核太重又或以涼藥冷了瘡口以致如此若投以熱藥則愈一瘡勢熱盛不可驟用涼藥恐涼逼住血凝作痛痛令瘡敗故宜溫冷相半使血得中和則瘡易愈宜此方相對停洪寶膏用蔥湯調塗貼之自效一發背癰疽流注皆賴此方終始收功最穩妙在通變活法取效在於掌握更無變壞等症況背癰乃生死相關輕重皆能保守能知此藥兼陰陽而奪化之樞機真神矣哉回陽玉龍膏啟玄治諸陰發背流注鼓椎風久損痛冷痹風濕諸腳氣冷腫無紅赤色痛不可忍者及足頑麻婦人冷血風等症蓋此藥性溫熱故治諸陰最妙草烏三兩炒南星炒一兩軍姜煨二兩香白芷一兩赤芍炒一兩肉桂五錢共為末熱酒調敷夫人之血氣周流一身周而復始無有間斷苟臟腑虧虛則風寒暑濕外邪得而襲之矣七情交感痰涎壅滯經絡不通寒熱交作兼之血脈凝泣隧道閉阻而成瘡瘍者多也故瘡瘍之症有虛有實有寒有熱實熱宜治虛寒難療必細識其經絡部位辨明其寒熱虛實則萬不失一也此方內有軍薑肉桂足以禦寒能生血熱血草烏南星能破惡除堅祛風化毒活死肌除骨痛消結塊赤芍白芷能散滯血止痛生肌加酒行藥性雖有十分冷症未有不愈者如發寒灰之焰枯木之春也大抵冷症則肌肉陰爛不知痛癢有知痛者多附於骨痛久則侵入骨髓非尋常藥力所能及矣此方祛陰毒回陽氣拔骨中痛如神當減當加活法開後一治陰發背滿瘡面黑爛四圍好肉用洪寶膏把住中間以此膏敷之一夜陽氣自回黑處皆紅當察其紅活已透即止此藥卻以沖和膏收功如欲作膿又以南星草烏為末加於沖和膏內用之如陽已回黑已紅惟中間一點黑而不能紅者蓋血已死也可用朴硝明礬末又方白丁香硇砂乳香末唾調勻點於黑紅交處一圈上以沖和膏蓋之次早去藥黑死肉如割去甘草水洗淨方可上生肌合口藥收功如黑肉未淨須去為妙一冷流注多附骨硬不消骨寒而痛筋縮不能伸屈庸俗誤用刀針又無膿血只有屋漏清汁或有瘀黑血宜此方敷之如稍緩加軍薑白芷肉桂草烏等分熱酒調敷則骨寒除而痛自止氣溫和而筋自伸肉亦軟而腫即消亦不可無木臘以其性能破堅腫亦不可多多解別藥性故也一治乳吹乳癰等初發切不可用涼藥恐凝住其血不能化乳宜此方中加南星薑汁酒勻調熱敷即消欲急消加草烏末能破惡除寒如已成癰則用沖和膏治之或加草烏南星二味最妙如破後當觀其源若源於冷用沖和收功源於熱用洪寶膏退熱生肌須加乳香沒藥止痛內服神效瓜蔞散治之一宿痰失道癰腫無膿者用此藥點頭病必旁出再作為佳不然則元陽耗為敗症如遇敗症當用玉龍膏敷之拔毒成膿內服通神散加桔梗半夏當歸肉桂等藥如病紅活熱驟則用沖和膏為佳切不可用涼藥此藥能拔毒成膿有膿即止亦不可過一治肚癰一症十有九死蓋人之脾胃屬坤土為陰血氣潮聚趨熱避寒故多為內癰不能外現間有微影欲出或又被冷水所觸及服涼藥雖有仙丹莫能施治可不慎乎凡有此症初覺腰痛且手按之痛苦走閃移動則為氣塊若推根不動外面微有紅腫則為內癰急以此方拔出毒氣作成外癰則用沖和膏收功內服通神散加忍冬藤治法如前若癰自能外現不可用此方只用沖和膏為妙當頂用玉龍膏貼之有頭自現自破若流膿不快依法用洪寶膏三分薑汁七分茶調敷之膿出皆盡內服十宣平補生肌外則用沖和膏收功此症陰多陽少最能損人如將安之際大服補氣血藥則易愈洪寶膏啟亥治諸熱癰疽等毒十分勢熱宜用此藥相兼用之蓋此藥性涼能化血又能破腫止痛若遇陰症陰瘡能助痛凝血死肌爛肉不可用也沖和膏性溫玉龍膏性熱洪寶膏性寒三膏當參詳臨證施治在於活法加減也天花粉三兩赤芍藥二兩薑黃一兩白芷一兩共為細末茶酒蜜湯乘熱塗之搗毒散準繩治瘡瘍腫毒疼痛大黃三兩白及二兩朴硝四兩共為末井水調搽如干再搽若瘡口焮腫宜用之若腫而不痛乃陰症也斷不宜用水澄膏郭氏白及四錢白蘞四錢鬱金一對大黃七錢五分黃柏七錢五分黃藥子七錢五分榆皮七錢五分乳香五錢沒藥五錢雄黃五錢共為細末用新汲水一碗將藥澄於水內藥定去水敷於腫處上用白紙封之用雞翎涼水潤濕鐵井欄準繩芙蓉葉重陽前收研末蒼耳子端午前收燒灰存性同研細末蜜水調敷清涼膏家傳治初患癰腫瘡癤熱焮大痛大黃芙蓉葉共為細末米醋調敷之千金方治石癰堅硬不作膿者莨菪子為末醋和敷瘡頭根即拔出烏龍掃毒膏啟玄治一切癰疽發背腫毒已潰未潰並皆治之文蛤八兩炒多年浮粉一斤曬乾入米醋浸一夜再曬乾蜒蚰三十條同搗一處再曬再搗成末再炒至黑色為細末入瓷罐收貯凡遇瘡疽用醋調敷患處留頭出毒氣綿紙蓋之干再用醋掃潤之如背癰疽發憒時痛不可忍用熟豬腦子去皮淨一個搗爛調此成膏毒上敷之留頭出毒氣紙蓋之如瘡紅紫熱毒勢甚痛用蜂蜜調敷更妙香蟾膏祖傳治發背疔毒活蝦蟆一個去骨麝香五釐共搗如膏敷在患處留頭如無頭都敷上一二日揭去倘未全愈再搗敷烏龍膏世傳治陰發背黑凹不知痛者老生薑半斤切片炒黑為末略攤土地上出火毒少頃即用豬膽汁明礬末調入薑末如糊敷在患處周圍用紙蓋之乾用熱水潤之知痛時黑水自出為妙如不知疼出黑水難治東籬散孫氏集效治癰疽疔腫無名惡毒野菊花一把連根莖搗爛酒煎熱服取渣以外敷之即愈收毒散啟玄治發背一兩頭開發不住勢在危急即以此藥貼之甚效鹽霜梅十個山皂角一挺不蛀的二味同燒灰存性共為細末如發熱者米醋調塗四圍及開處厚些即不走開或薑汁同醋調尤妙如發熱者蜜同醋調或茶滷調塗之立愈
