body:
  text: 卷十一風熱瘡風熱瘡多生於四肢胸脅初起如疙瘩癢而難忍爬之少快多爬久搔未有不成瘡者甚則鮮血淋漓似疥非疥乃肺經內熱而外感風寒寒熱相激而皮毛受之故成此症也世人以防風通聖散治之亦有愈者然鐸更有治其外而自愈紀之以便不願服藥之男婦也三聖地膚湯岐天師方地膚子一兩防風二錢黃芩三錢煎湯一大碗加豬膽二個取汁和藥同煎以鵝翎掃之即止癢癢止而瘡亦盡愈黃水瘡黃水瘡又名滴膿瘡言其膿水流到之處即便生瘡故名之也此瘡生在皮毛之外不在肌肉之內雖是脾經濕熱亦由肺經乾燥脾來顧母本以濕氣潤母也誰知此濕有熱熱得濕而生蟲欲救母而反害母之皮膚也治法內服除濕清熱之藥而佐之涼血之味血涼而熱退熱退而水更清亦易行也濕熱兩除何蟲不死又得外治以解其鬱毒又何能長存乎故隨洗而隨愈也安體散岐天師方內治黃水瘡茯苓三錢蒼朮二錢荊芥二錢防風一錢黃芩一錢當歸五錢蒲公英二錢半夏一錢水煎服四劑舒解丹岐天師傳外治黃水瘡神效雄黃五錢防風五錢荊芥三錢苦參三錢水煎湯取二碗洗瘡即愈粉黃膏章云樵傳治黃水瘡蛤粉一兩石膏五錢輕粉五錢黃柏五錢共為細末暑天用無根水秋冬用麻油調敷傷守瘡傷守瘡者言不守禁忌也凡生瘡毒必須堅守房帷無論大小皆宜如此大瘡毒而不守禁忌必致喪亡小瘡毒而不守禁忌必至痛苦今名傷守者猶言小瘡癤也醫生錯云傷手豈搔抓能害之乎凡犯色欲其瘡口必黑黯痛如刀割腐爛必深非大補精血神氣萬難奏效內服加味補中益氣湯或加味十全大補湯以補之外用末藥敷之始可轉危為安變死為生也補中益氣加金銀花湯祖傳治不慎色欲人參五錢黃耆一兩柴胡一錢升麻五分生甘草一錢當歸五錢陳皮五分白朮五錢金銀花一兩加棗二枚水煎服如虛極者倍加參耆歸術寒虛者加附子肉桂各一錢余不必加加味十全大補湯祖傳治傷守瘡熟地一兩川芎二錢當歸五錢生黃耆一兩白朮五錢茯苓二錢甘草一錢肉桂一錢白芍二錢人參二錢金銀花一兩水煎服救敗丹岐天師傳外治傷守人參二錢三七根末三錢孩兒茶三錢乳香一錢白殭蠶二錢輕鬆一錢發灰二錢各為細末摻於膏藥內貼之若不用膏藥者乾摻妙豬油調搽亦妙手足丫毒瘡手足丫毒瘡雖生於手足名同而丫宜辨也生於手丫者屬手經生於足丫者屬足經然手足亦宜辨也生於手足之背丫者是三陽經生於手足之掌丫者是三陰經看其何經而用何經之藥托裡調中更加引經之味則計日可以奏效矣倘內既服藥而外復加敷藥以箍其毒則毒不走散一出膿而即安尤治法之神也手足丫毒近於井穴最宜早治萬勿因循至輕變為重也全消飲岐天師傳治手足丫毒瘡當歸三錢生黃耆三錢紅花二錢生地三錢荊芥葉一錢五分貝母一錢茯苓二錢黃柏二錢地骨皮三錢菊花根一把水煎一碗急服數劑無不內消若失治一至潰爛多費時日矣然肯服此方亦不大潰箍毒神丹岐天師傳外治手足丫毒瘡地榆二錢天花粉一錢菊花根一把生甘草一錢芙蓉葉十四葉蒲公英鮮者一把將乾研末搗鮮藥取汁調之敷上則毒不走開內自化矣胎窬瘡胎窬瘡乃初生小兒背上或有一二孔也此等小兒明是臟腑不足少氣少血以長皮肉也倘雖有孔窬而肉膜遮護猶有生機急用氣血峻補湯大劑與母吞服兒食其乳尚有生機再嚼人參三七之片數分填於孔窬之內則氣血壯旺生皮亦速也苟孔窬之中無有脂膜洞見臟腑數日即死救之亦無益也總補母之氣血一時填隙而兒之先天大缺僅可延數年之日月不能享百歲之光陰也氣血峻補湯治兒生胎窬瘡黃耆一兩當歸一兩白朮五錢川芎五錢紅花五分益母草一錢水煎服二十劑至月餘後可服補中益氣湯數十劑濕毒瘡濕毒之瘡多生於兩足非在足脛即在足踝非在足背即在足跟其故何也蓋濕從下受而兩足親於地故先受之也夫水濕之氣寒冷者多而一入人身之內則人氣熏蒸必變為熱濕熱相合內必生蟲故初起之時微癢者正蟲之作祟非止氣血之不和也治之法必須去濕為主而少加殺蟲之味則愈病甚速轉不必解其熱也蓋濕解而熱自散況生瘡既久流膿流水氣血必虛安在熱存乎此除濕之所以神也除濕解毒湯祖傳治濕毒足瘡白朮五錢山藥五錢薏仁五錢金銀花一兩肉桂三分澤瀉二錢烏桕根一把水煎服十劑自愈如未愈者再用龍馬丹敷之妙龍馬丹岐天師傳統治濕毒瘡馬齒莧二錢黃柏五錢陳年石灰二錢輕粉一錢地龍糞三錢伏龍肝二錢黃丹三錢赤石脂三錢各為細末蜜調敷之一二次即愈火丹瘡附赤白遊風火丹瘡遍身俱現紅紫與發斑相同然斑隨現隨消不若火丹一身盡紅且生瘡也發斑熱鬱於內而發於外火丹熱鬱於外而趨於內發於外者有日散之機趨於內者有日深之勢故發斑輕而火丹重然而火丹有二種一赤火丹一白火丹也赤色皮乾白色皮濕似乎各異而熱鬱於皮毛之外由外而入內則赤白無異也大約赤者純是肺經之火熱若色帶白乃是脾經之火熱也故赤者竟解肺經之熱補水之不足以散火之有餘此消丹飲之為妙也白者解脾經之熱利水濕之氣從膀胱而下走不必又去外逐皮毛蓋濕氣之盛在脾而不在肺耳此桑白分解散之所以妙也更有一種赤白遊風往來不定小兒最多此症有似發斑但發斑有一定之根而赤白遊風無一定之色此胃火鬱熱不解故亦結瘡而不愈治之法必須清熱而清熱又必須涼血蓋血寒則凝滯不行雖火得血而可止終不能散火此清火消丹湯所以妙也三症分而治之自有奇驗正不可混耳消丹飲岐天師傳治紅紫火丹玄參三兩升麻二錢麥冬一兩桔梗二錢生甘草一錢水煎服一劑丹化為無矣小兒減藥之半桑白分解散伯高太師傳治白火丹薏仁二兩澤瀉三錢升麻一錢天花粉三錢桑白皮三錢神麯三錢水煎服小兒減藥之半清火消丹湯岐天師傳治赤白遊風丹生地一兩丹皮三錢甘草一錢玄參三錢牛膝二錢赤芍三錢天花粉一錢水煎服二劑消半四劑全消小兒減半赤遊丹又可外治用積年胞衣所化之水和金汁塗之即消神效經驗方外治小兒丹毒皮膚熱赤寒水石五錢白土一分為末米醋調塗之內丹內丹者生赤色於皮毛之內而外不十分顯出也點燈照之若用紗裹硃砂而透明故以內丹呼之此等之丹得於胎熱其母受胎之後不忌熱物信口貪食或感夏天風熱或好色浪戰皆能助火火邪內攻胎受其毒而傳氣於小兒乃發為丹毒也此火欲出而不得遽出隱隱外突於皮毛倘發於腰臍而作痛或大小便閉結不通皆死症也苟生於淵液京門等穴或左或右尚非死症以熱在膽經而不在腎經也方用荊芥祛風湯實可救治然救之亦必須早蓋內丹不早治亦必死耳荊芥祛風湯伯高太師傳治內丹荊芥二錢甘草一錢半夏五分麥冬五錢當歸三錢白芍三錢水煎服數劑愈散丹湯岐天師傳治火丹當歸三錢生甘草一錢赤芍藥三錢大黃一錢丹皮二錢柴胡八分黃芩一錢水煎服二劑愈飛灶丹小兒丹毒有十種一飛灶二吉灶三鬼火四天火五天灶六水激七胡次八野火九煙火十胡漏也皆父母胎毒所成治症必須辨明不可混治丹症原是難治之病況又辨之不明妄用藥餌安得十全且各丹不依症早治攻入腸胃十無一生可不慎乎飛灶丹者從頭頂上紅腫起此火毒在泥丸也本是難救然急用蔥白搗自然汁調白及炒黃柏塗之即消又不可不知也及柏散白及三錢黃柏三錢炒各為細末急用蔥白搗爛取自然汁塗在泥丸頂上一晝夜即消吉灶丹吉灶丹從頭上向腦後紅腫者是亦有腫而作疼者尤為可畏是足太陽膀胱風熱故作痛也更有渾身作熱者內宜服防風通聖散加減治之外宜用紫荊散調搽自愈防風通聖散世傳方防風荊芥連翹麻黃薄荷川芎當歸白芍白朮山梔子大黃芒硝黃芩石膏桔梗甘草滑石等分水煎服紫荊散紫荊皮一錢赤小豆一錢荊芥一錢地榆一錢各等分為細末以雞子清調塗神效鬼火丹鬼火丹先面上赤腫後漸漸由頭而下至身亦赤腫也是手足陽明經內風熱治宜用白虎湯以泄胃熱加防風荊芥薄荷桑白皮葛根以散其風引其從皮毛而外散也然大腸亦熱何故不瀉大腸之火不知胃之火甚於大腸胃火散而大腸火亦散不必又治之也但外用伏龍散末以雞子清調搽尤妙白虎加味湯世傳方內治鬼火丹石膏二錢知母一錢麥冬三錢半夏一錢防風五分荊芥二錢薄荷一錢甘草一錢桑白皮二錢葛根一錢竹葉三十片水煎服二劑伏龍散家傳外治鬼火丹伏龍肝末三錢炒黃柏三錢為末雞子清調搽神效天火丹天火丹從脊背先起赤點後則漸漸赤腫成一片是腎督脈中熱毒兼足太陽經風熱宜治腎而並治膀胱為是不可純用防風通聖也外用桑榆散外敷則得之矣解苦散岐天師傳內治天火丹玄參五錢生地五錢羌活一錢黃柏二錢白茯苓三錢升麻五分丹皮三錢水煎服四劑自散桑榆散家傳外治天火丹地榆二錢桑白皮二錢羌活一錢玄參三錢各為細末羊脂溶化調塗天灶丹天灶丹從兩臂起赤腫少黃色或止一臂見之皆手陽明經風熱內服解毒之藥外用柳枝燒灰為末水調塗之亦易愈也蓋天灶丹乃丹毒之最輕者故亦可輕治之耳輕解散岐天師傳內治天灶丹防風五分麥冬三錢生地三錢桑白皮二錢黃芩一錢柴胡八分白芍三錢天花粉五分水煎服二劑柳灰散家傳外治天灶丹柳枝燒灰五錢荊芥炒末二錢滑石三錢生甘草二錢為末水調塗之即愈水激丹水激丹初生於兩脅虛腫紅熱乃足少陽膽經風火也此丹亦熱之輕者治膽經之火而去其風可計日而痊也方用加味小柴胡湯治之最神外更以敷藥塗搽又何患乎加味小柴胡湯柴胡一錢半夏五分甘草五分黃芩一錢陳皮三分白芍二錢防風五分荊芥一錢水煎服數劑丹消缺屑散生缺屑二錢母豬糞燒灰二錢和蠟水調塗妙胡次丹胡次丹先從臍上起黃腫是任經濕熱也去其濕熱而丹毒自散古人用三黃解毒湯未免過峻恐小兒氣虛難受鐸受異人之傳另用化濕飲方治之尤覺安穩更用檳榔外治萬無一失也化濕飲岐天師傳內治胡次丹白果十個白朮一錢黃柏二錢山藥二錢茯苓三錢澤瀉一錢木通一錢赤芍二錢荊芥一錢天花粉一錢水煎服檳榔散檳榔為末二錢生甘草一錢米醋調搽自愈野火丹野火丹從兩腿上起赤腫痛甚如火之燒乃足陽明胃經風熱也內服涼膈散加減外以羊脂調末藥塗搽自易愈也此丹雖火盛極不可信是胃經熱熾竟用石膏湯與瀉黃散也恐小兒脾胃缺實不禁大瀉反恐胃氣損傷轉難救耳涼膈散世傳內治野火丹連翹二錢大黃一錢芒硝五分甘草一錢梔子二錢黃芩二錢薄荷一錢茯苓一錢水煎服二劑消腫散岐天師傳外治野火丹乳香一錢白及一錢火丹草一錢各為末羊脂調塗妙煙火丹煙火丹有從兩足跗起赤色腫痛乃足三陽經風熱也亦有從足底心起乃足少陰腎經大熱也內宜服滋陰抑火之藥使水旺足以制火也外以末藥兼治為妙抑火制陽丹岐天師傳內治煙火丹玄參五錢豨蘞草二錢黃柏一錢生地三錢熟地一兩丹皮三錢細甘草一錢沙參二錢牛膝一錢金叉石斛二錢水煎服柏土散家傳外治煙火丹豬槽下土黃柏末蜜調塗之自愈胡漏丹胡漏丹從陰上起黃腫皆厥陰肝經虛火發於外也內宜服補陰清火散風之藥外用末藥調搽可愈倘用當歸龍薈丸與瀉青散皆不能成功耳以上丹症小兒百日內發者不論是何丹皆胎毒也三日內治之皆可救遲則無及矣倘百日之外生丹者遲尚不至於死亡然亦必須急治不可令其入腹一入腹亦難救故腹脹不飲乳者必死無疑蓋丹症能食乳者皆可治療以其胃氣之未絶也更有一種紅線瘤者尤難救援以父服熱藥遺熱在胎非藥所能解耳清散湯岐天師傳內治胡漏丹白朮一錢茯苓一錢甘草五分當歸二錢炒梔子一錢荊芥一錢防風三分生地二錢麥冬二錢黃柏一錢水煎服屋土散岐天師傳外治胡漏丹瓦上陳土炒黃柏生甘草各研細末蜜與醋同調塗即消粉癭瘤癭與瘤雖俱生於肌上而癭生於頸下瘤則不止生於頸也癭則不破瘤則久而破者多矣癭感沙水之氣皮寬不急捶捶然也古云癭有三種一血癭一肉癭一氣癭血可破肉可割氣可針其實三種俱宜內消不宜外治惟瘤則可外治也然亦有宜有不宜者大約粉瘤宜用外治蓋粉瘤大而必軟久則加大似乎有膿而非膿也乃是粉漿藏於其內擠出宛如線香焚後之滓又受水濕之狀如已破矣必擠淨後用生肌藥搽之不再生否則仍復長也初生此瘤必須治之如不治日必大甚亦被其纍當用艾灸十數壯即以醋磨雄黃塗紙上剪如螺獅蓋大貼灸處外用膏藥貼一二日一換擠出其膿必愈妙法也消癭散岐天師傳統治各癭海藻一錢龍膽草一錢昆布五分土抓根二錢半夏一錢小麥面一撮甘草一錢乾薑五分附子一片水煎十劑必散化癭丹仲景夫子傳治諸癭海藻三錢桔梗三錢生甘草一錢陳皮一錢半夏三錢茯苓五錢水煎服筋瘤骨瘤石瘤筋瘤者乃筋結成於體上也初起之時必然細小按之乃筋也筋蓄則屈屈久成瘤而漸大矣然雖漸大亦不甚大也固是筋瘤亦無大害竟可以不治置之若至大時妄用刀針往往傷筋反至死亡故筋瘤忌割也必要割去亦宜於初生之日以芫花煮細扣線系之日久自落因線系而筋不能長大或可用利刀割斷輒用止血生肌之藥敷之可慶安全倘初生根大難用線系萬不可輕試利刀割斷也至於骨瘤石瘤亦生皮膚之上按之如有一骨生於其中或如石之堅按之不疼者是也皆不可外治或用陷腫散內治則可陷腫散千金方岐天師加減治骨瘤石瘤烏賊魚骨一錢白石英二分石硫黃二分鍾乳三分紫石二分乾薑一錢丹參八分琥珀末一錢大黃一錢附子三分朝燕尿一錢石礬一錢水煎服十劑全消消瘤丹仲景公傳可消諸瘤白朮三兩茯苓十兩人參三兩陳皮三錢生甘草一兩薏仁五兩芡實五兩澤瀉五兩半夏五兩各為末米飯為丸常服自消氣瘤瘤何名之曰氣蓋有時小有時大乃隨氣之消長也斷宜內散不宜外治既隨氣消長亦可隨氣治之其症不痛不紅皮色與瘤處同也其贅則軟而不硬氣旺則小氣衰反大氣舒則寬氣鬱則急故治法必須補其正氣開其鬱氣則氣瘤自散矣古人有用枳殼扣其外以艾火在外灸之似亦近理然終非妙法也不若純用補氣之味而佐之開鬱散滯之品即不全消亦必不添增其火也沉香化氣丸岐天師傳治氣瘤沉香一兩木香二兩白芍四兩白朮八兩人參二兩黃耆八兩枳殼一兩檳榔一兩茯苓四兩香附二兩附子五錢天花粉四兩各為細末蜜為丸每日服三錢一料全消外治仲景張公密傳統治各瘤神效但不可治日久之瘤也小瘤根細最效水銀一錢兒茶二錢共研至無星為度加入冰片二分再加入麝香五釐再研又入硼砂五釐再研不見水銀始可用此藥敷於瘤處肉瘤血瘤粉瘤氣瘤俱化為水約三日必消盡然後服消瘤丹每用一兩滾水吞服不拘時如筋骨之瘤內外二法俱不必用蓋二瘤無害於人不必治亦不須治也血瘤贅血瘤而贅生於皮外者乃臟腑之血瘀而又有濕氣入於血中故生於外也初生之時亦有細於發者久之而大矣小者如膽大者如茄以利刀割斷即用銀烙匙燒紅一烙即止血且不潰不再生也否則復出血瘤一月如舊鐸於腋中曾生此瘤甚小如細指也偶爾發癢友人紿生八角蝨余心疑而更癢自思蝨遇水銀則死而書齊之中無水銀也曾為人治下疳方中用水銀乃取而擦腋下甚重至痛而止夜臥則忘其痛矣早起見席上有血筋一條取觀之乃腋下所生血瘤已墮落矣余齧之不能斷始知前方能去瘤也因商酌載之治初起之瘤頗多驗銀鏽散家傳治初起血瘤水銀一錢冰片三分輕粉一錢兒茶三錢黃柏二錢朝腦一錢鏡鏽一錢貝母一錢各為末搽擦即墮落肉瘤贅肉瘤乃於皮上生一瘤宛如肉也初生如桃如栗漸漸加大如拳其根皆闊大非若血瘤之根細小也不疼不癢不紅不潰不軟不硬不冷不熱其形可醜而病則不苦也此等之瘤皆犯神道之忌故生於四體以紀罪衍不妨順受倘必欲治之用刀割傷用火燒灸不特無功轉添痛楚矣內托外消散治肉瘤血瘤粉瘤張仲景真人傳蓋濕熱生耳水銀一兩兒茶二兩共研至無星為度冰片一錢輕粉三錢麝香五分又入硼砂五分不見水銀始可用以此藥敷於瘤處肉瘤粉瘤俱化為水約三日必消盡然後再服湯藥用人參二錢白朮三錢茯苓三錢陳皮五分生甘草五分柴胡八分白芍三錢水煎服十劑永斷根矣如筋瘤難治然亦不必治也骨瘤亦不必治終身大如杏也治肉瘤或男婦生在面上頸上手上即可去之白芷五分人參五分煎湯生半夏十粒泡於白芷人參之內數日將半夏切平頻擦患處效如手取但不可治痰血之瘤也恐難收口錢又選傳
