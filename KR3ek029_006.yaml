body:
  text: 卷六胸乳上發胸乳上發者發於彧中神藏靈虛等穴也其穴俱屬足少陰腎經其症多心懸若飢飢不欲食舌乾咽腫乃心熱而不能下交於腎以致腎經之氣遏抑於外故生癰瘍於胸乳之上偏也有生於左者有生於右者甚則左右俱生皆腎水不能濟心火也必須大補其水而佐之內疏心火之藥則水生而火毒易散也倘不早治則毒攻於心去生便遠矣十州散巫真君傳治胸乳上生癰人參二錢熟地二兩山茱萸三錢生甘草二錢遠志二錢麥冬一兩金銀花一兩茯神三錢黃連一錢蒲公英四錢水五碗煎服八分連服數劑自散柑仁散治婦人裡外吹乳柑子核一歲一粒陰陽瓦焙乾枯為末陳酒熱送下即蓋被出汗而愈胸發胸發者發於玉堂膻中中庭鳩尾之四穴也又有發於胸者名曰井疽此症初起如豆肉色不變必須早治若不早治下入於腹必至死矣屬任脈之經絡四穴在心之外郭凡邪不可犯心一犯心輒死夫臟腑邪遠苟若犯心尚有下堂之走豈四穴逼近心君而反得逍遙無慮乎自然直入臟中亦勢之甚便而甚利也即曰經絡專屬任脈然任脈名陰脈之海周流諸陰循環無已一有癰毒則陰不能行況未生癰之前亦因陰脈不行而火毒乃結聚不散以致成癰矧既已生癰又何望其周流諸陰而無滯耶自然滯者益滯而結者益結矣苟不速為星散則火毒歸心死亡頃刻救心敗邪湯巫彭真君傳治正胸生疽人參一兩茯苓五錢麥冬五錢熟地一兩山藥一兩芡實一兩甘菊花五錢芍藥五錢忍冬藤二兩遠志三錢天花粉二錢王不留行三錢水數碗煎一碗一氣飲之火毒不結而散矣二劑必愈倘已潰爛必須多服始愈額髮額髮者發於額上攢竹之穴也夫曲差攢竹雖屬太陽之經然近於督脈之旁亦陰陽雙合之處也初發之時必然頭痛憎寒惡熱項似拔腰如折正顯太陽之症然太陽膀胱與少陰腎經為表裡之臟腑也發太陽之火即顧少陰之水則膀胱不燥內有滋潤自易發汗汗出而火毒隨之而盡散於表矣否則單以托表為事倘陰虛之人禁再發其汗乎吾恐因汗而愈虛反不肯遽消其火毒耳藤葛散巫彰真君傳治額上生癰忍冬藤二兩麻黃一錢茯神三錢香附子二錢白芷二錢當歸一兩川芎一兩蒲公英五錢乾葛三錢天花粉三錢水數碗煎一碗食後服初發者二劑即散如陰虛之人此方不可用另用轉敗湯兩脅雙發脅發者發於期門章門之穴也古名敗疵謂是女子之疾其實男女皆有之或發於左或發於右此足厥陰肝經之部位也然亦有上至淵腋輒筋之穴者雖二穴屬足少陽膽經然肝膽為表裡肝病必及膽故不可舍肝而治膽也夫膽多氣少血肝多血少氣總宜氣血雙補決不可猛浪用熱劑也天下人惱怒居多一有拂抑便即動氣兩脅脹滿因而成癰癰生於皮外者猶癰之輕者也更有生於脅之內者夫脅內生癰古人未談世多不信誰知脅痛而手不可按者肝葉生癰也肝之生癰半成於氣惱半成於憂鬱憂鬱而得之者其病緩氣惱而得之者其病驟憂鬱氣惱皆能爍干肝血肝血既干則肝血大燥無血養肝而憂鬱氣惱之無已欲不蘊結憤恨而成癰烏可得乎但癰生於內不可見也而外則可徵其脅之外必現紅紫之色而痛亦必在左而不在右其舌必現青色世有脅痛數日輒死者正因生癰毒敗而死治之法以平肝為主而佐之瀉火去毒之味萬勿因循時日令其內潰而始救之卒至於無功也有脅下生疽者在於京門帶脈之穴間痛癢徹心如針刺之痛漸潰至臍者死初腫脅不能轉動面垢百節骨痛痛則連心又名傳心疽治法亦照治脅癰治之化肝消毒湯岐公傳治兩脅脹滿發寒發熱痛極生癰白芍三兩當歸三兩炒梔子五錢生甘草三錢金銀花五兩水煎服十劑愈錦草湯伯高太師傳治脅上生癰並治肝癰白芍一兩當歸一兩炒梔子三錢生甘草五錢錦地羅一兩水煎服數劑愈宣郁化毒湯岐公傳治脾郁生脅癰柴胡二錢白芍一兩香附二錢薄荷二錢當歸一兩陳皮一錢枳殼一錢天花粉二錢生甘草三錢金銀花一兩水煎服十劑愈金銀平怒散伯高真君傳治脅痛生癰金銀花二兩白芍五錢當歸一兩柴胡一錢白芥子三錢生甘草三錢炒梔子三錢丹皮三錢水煎服一劑即消二劑全痊流注發流注發者即子母之發也先發於背後流串散走於四肢或來或去無有一定之部位此等瘡瘍多是陽症蓋風熱之毒也如母之生子輾轉靡已本是太陽風熱所生倘能直攻太陽用去風去火之劑而兼散其毒何至流串於四肢乎惟其因循失治或治之不得法使餘毒未淨邪氣逆傳於脾流於臀臂手足遂成不可療也攻邪遏流湯巫彭真君傳治子母流注瘡毒升麻一錢當歸五錢黃芩二錢瓜蔞二錢金銀花一兩炙甘草二錢連翹三錢秦艽二錢蒼耳一錢馬蘭根一錢牛膝一錢牽牛一錢水三碗煎八分半飢服數劑自愈環項發環項發者發於頸也環頸圍項無一空隙地完膚甚則癰大赤黑俗名落頭癰靈樞所言夭疽也必須急瀉其火蓋頭頸乃手足少陽經穴而又足陽陰之經穴也不急瀉三經之火則火束於頸項咽喉之間其熱不能急散則熱毒必下走淵腋將從外以入內也及至入內則前傷任督內熏肺肝發熱發寒拘倦悶亂恐怖不食有至十餘日而即死者可不慎乎故必須及早治之也釋項飲巫彭真君傳治環項生癰瘡白芷一錢葛根一錢柴胡一錢川芎三錢桔梗三錢生甘草二錢山豆根一錢麥冬三錢天冬三錢紫蘇一錢五分紫花地丁五錢天花粉三錢蒲公英五錢水數碗煎一碗服初發者用數劑即散必須此方早治為妙腎陰發腎陰發者發於腎囊乃生於囊之下糞門穀道之前乃任督脈所起之處也俗名囊癰若生於陰囊左右橫骨陰廉之穴者則名便毒便毒易治而囊癰最難治也以囊之下皮肉與他處迥別蓋他處皮肉或橫生或直行俱易生肌惟懸癰之處橫肉中有直理也直理中有橫紋也最艱合口一有損傷不易收功此處生癰雖因濕熱然皆貪色好酒以成之也夫貪酒好色亦人之常也節飲戒色安在不可收功乎不知腎囊乃衝任脈所會之處又諸筋所聚之處也其囊空虛最易凝聚氣血故易腫易大所以艱於收功耳症重者多胞腐有腐爛而止存睪丸亦有俱腐落而不死者以用藥調理之善也方用逐邪至神丹最奇已未潰俱可用若八仙丹雖亦神奇然止可用之於囊癰未潰之前而不可施之已潰之後也逐邪至神丹治便毒初起或左或右並治囊癰金銀花四兩蒲公英二兩人參一兩當歸二兩生甘草一兩大黃五錢天花粉二錢水煎服一劑即消二劑全愈八仙丹治囊癰大黃二錢金銀花四兩當歸尾一兩玄參二兩柴胡三錢炒梔子三錢黃柏三錢貝母三錢水煎服一劑輕二劑全愈若已出毒此方不可用矣張真人傳治便毒方大黃一兩當歸一兩金銀花二兩蒲公英一兩水五碗煎八分空腹服一劑即消鬼真君傳治騎馬癰初起神效金銀花八兩煎水兩碗入大黃一兩車前子五錢當歸一兩牛膝三錢地榆五錢生甘草五錢煎半碗空腹服之服即睡睡醒病如失不睡熟亦不妨過一日微瀉而愈奇法也忌房事一月對臍發對臍發者發於背下命門之穴也命門之穴正與臍對夫命門為十二經之主宰主宰不明則十二官危矣況生癰疽則命門之中無非邪火又安有生機哉不知命門之中原藏真火真火衰而後邪火之毒始得留於內矣然真火喜居穴中而邪火喜發穴外命門之外生癰疽正邪火外出也治之得法轉有生機不比腎俞之生毒也雖然邪火雖出於外而真火非水以養之則正火益虛邪火未必不出於外者仍入於內況邪火熾盛亦須以水折之非大補真水則邪火不散邪火不散則毒亦難消況命門之穴又督脈之經也督脈亦非得腎水則河車路斷不通真火反助邪火矣亦看五善七惡審症而照前論以治之也倘出血流清水心神恍惚睡中見鬼譫語大發渴者俱無真水之惡症也難於治療耳散火援命湯巫彭真君傳治命門生疽金銀花五兩豨薟五錢熟地一兩白朮一兩黃柏三錢車前子三錢水十碗先煎金銀花取水四碗先將二碗汁煎前藥一碗空腹飲之少頃再將前汁二碗又煎藥渣煎水一碗再服一連二服如治初發之疽即毒散而愈倘已潰敗流清水此方不可復用改煎援命救絕湯巫彭真君傳治命門潰癰人參三兩白朮四兩肉桂三錢附子一錢山茱萸一兩北五味三錢金銀花三兩茯神三錢水十碗煎汁一碗服之變善則生變惡則死尻發尻發者靈樞名曰銳疽其狀赤堅發於尾閭之間也此穴乃督脈之經穴夫尻乃足太陽之部分夫腎與膀胱為水臟水腑腎為陰而主骨腑為陽而太陽之氣主於膚表此處生疽雖是太陽膀胱之火毒起發於外亦緣少陰水氣虛耗不能制之於內也不能制火而督脈之路乾燥故火升於尾閭而水不能由尾閭而上溉故生銳疽銳者言其火毒之甚猛也痛最難忍艱於得膿正無水之驗也宜大補腎水而加托裡之藥少益之乳香沒藥以排膿止痛庶幾有瘳乎至於氣惱色欲尤宜戒絕苟一犯之輕則成漏重則喪亡可不慎哉制火潤尻散巫彭真君傳治尻上銳疽金銀花二兩玄參二兩苦參五錢生甘草三錢熟地八錢山茱萸三錢白芥子三錢茯苓三錢乳香一錢沒藥一錢水煎服手背發附手心發手背發者發於中渚液門之二穴也二穴乃手少陽三焦經之脈三焦無腑之形而經脈實有形也其脈起於關衝而中渚液門即關衝之第二穴與第三穴也是三焦既無腑而脈即其府也此處生疽即近於腑之謂也故亦至重況手少陽又多氣少血之府無血以化膿往往陽變為陰初起之時令人憎寒發熱及變陰時或作嘔吐則可危矣須審五善七惡以定吉凶治法詳照篇中之論治之至發於手心者乃發於勞宮之間也其經屬包絡初發時紅腫高突變成一疽疼痛非常晝夜無間俗名擎疽也多是冤孽相尋然亦因素有火熱蘊毒於中乘機而竊發也然火盛由於水衰不大料滋水惟小劑滅火未易救療用釋擎湯蕊珠湯重劑煎飲則未潰者自消已潰者自生肌而愈蕊珠湯伯高太師傳治手背生疽熟地一兩生地一兩麥冬一兩甘菊花一兩金銀花一兩四碗水煎一碗服連服四劑未潰者自消已潰者亦生肌而愈釋擎湯岐伯天師傳治手心生擎疽玄參二兩生地一兩金銀花二兩當歸一兩紫花地丁五錢貝母二錢水數碗煎八分服渣再煎服一劑輕二劑痛止已潰者再服四劑未潰者再服一劑無不全愈足背發附足跟疽足心發足背發者發於衝陽陷谷內庭之間乃足陽明胃經之穴也論胃經乃多氣多血之府疽生胃經似乎少輕然衝陽陷谷內庭乃足陽明經穴發仞之始其氣血尚未旺也況穴又在足之下而尚未升於身之上府為氣血之多而經穴中之氣血未可以多言也故此處生疽不可以多氣多血論而任用敗毒攻火之藥也初發之時令人發熱作嘔痛癢麻木俱宜照前論治之大約於補之中以行其散之功則得耳又云足背者即足跗也足跟生疽又名兔齧屬足太陽申脈陰陽二蹻發源之所皆由臟腑積熱也又足心發毒者名穿枚疽由於腎虛以補腎為要青紫飲巫彭真君傳治足背生癰疽疼痛高突牛膝三錢青蒿三錢紫花地丁一兩玄參五錢薔薇根五錢當歸五錢炙甘草二錢茯苓二錢水三碗煎一碗空腹連服數劑必消此方初起已潰俱效肺癰肺痿肺癰者癰生於肺葉也其初起之時胸膈必痛咳嗽之時更加痛極手按之處更增氣急其脈緊數此肺癰將潰也咽喉之間先自聞腥臭之氣隨吐膿血其脈但數而不緊此肺癰已潰也夫未潰者易消已潰者難療然治之得法亦有生者大約肺之生癰由於肺中有火而火成於肺氣之虛也治之法烏可舍補肺而別求方法乎然肺乃嬌臟藥食之所不受者也肺不能直補其氣補胃土之氣則肺金之氣自旺雖火盛則毒生火盛則毒亦盛似未可竟置瀉火瀉毒之味然不補肺氣則肺金氣怯而火毒更不易散也於補氣之中而行其攻散之法則正氣無傷而火毒自難存留也方用全肺湯內消不令其毒結此治未潰前之良法也用完肺散補胃以益肺而急救其敗壞此治已潰後之神方也至於消風散太乙膏皆可同治然總不若全肺完肺二藥之更神也更有久嗽之後肺管損傷皮膚黃瘦毛悴色焦咽嗌雌啞自汗盜汗眠臥不得口吐稠痰腥臭難聞必忍氣須臾輕輕吐出倘少重必大痛不已氣息奄奄全無振興之氣此肺痿生瘡非同肺癰也肺癰生於火毒治宜速肺痿生於勞傷治宜緩火毒宜補中用瀉勞傷宜補中帶清故治肺癰宜大劑治肺痿宜小劑如養肺湯延生湯最妙可選擇而用之也外有生疽於胸之上者乃紫宮玉堂之穴也屬於任脈不比生於肺內然陽症易治陰症亦有死者治法又不可單治肺經當合腎與肺共治之蓋任脈非腎水相滋則火不肯散而毒不宜消也肺癰生於肺之上多不可救按吐痰必疼痛欲死胃癰亦不可救按但吐痰轉覺少寬惟重服散火解毒湯可救也全肺湯岐天師傳治肺癰玄參三兩生甘草五錢金銀花五兩天花粉三錢茯苓三錢白芍三錢麥冬二兩水煎服一劑痛減再劑內消完肺散岐天師傳人參一兩玄參二兩蒲公英五錢金銀花二兩天花粉三錢生甘草三錢桔梗三錢黃芩一錢一劑膿必多二劑後膿少十劑膿血止又六劑全愈地羅甘桔玄冬湯伯高太師傳治肺癰胸膈作痛咳嗽尤痛手按氣急玄參二兩麥冬二兩錦地羅一兩生甘草一兩桔梗五錢貝母五錢水煎服一劑消半二三劑全愈養肺去痿丹岐天師傳治肺痿久嗽皮膚黃瘦毛悴色焦膈上作痛氣息奄奄金銀花三錢生甘草五分生地二錢麥冬三錢紫菀五分百部五分百合二錢款冬花三分貝母三分白薇三分水煎服服二十劑而膈上痛少輕者便有生機再服二十劑更輕服五十劑全愈清金消毒湯岐天師傳治肺經癰瘍玄參一兩生甘草一兩金銀花八兩當歸二兩麥冬一兩白芍三錢水煎服二劑愈玄天散南陽張真君傳治同前玄參八兩天門冬四兩桔梗二兩炙甘草一兩水十五碗煎二碗再用蒲公英五錢金銀花五錢飽食後服之初起者即消日久者即化毒生肌凡人生肺癰者初起之時咳而兩脅疼痛者是即宜速用此方神效腸癰腸癰者癰生於大小腸也其症口渴小便如淋時時汗出小腹痛一定而不移手皆不可按惡寒身皮錯腹皮急如腫此癰生於大小腸所同然也吾何以辨之乎屈右足者大腸癰也屈左足者小腸癰也世謂大腸之癰易治小腸之癰難醫然而大腸之癰可瀉其火從糟粕而出小腸之癰可泄其火從溲溺而泄也雖然大小腸生癰亦有不屈足者蓋生於腸內者必屈其足而生於腸外者皆不屈足也痛在左而左中不移小腸生癰也痛在右而右不移大腸生癰也以此辨症斷斷不爽惟是腸內生癰可聽其潰破而腸外生癰必不可使之潰破者以腸外無可出之路一潰破出膿膿將何往毒留在腹無不死者故治法必須亟消之萬不可因循失治至潰破而始治之以喪人性命耳清腸湯治大腸生癰手不可按右足屈而不伸金銀花三兩當歸二兩地榆一兩麥冬一兩玄參一兩生甘草三錢薏仁五錢黃芩二錢水煎服四劑全消開胃救亡湯治大腸生癰右足不伸腹痛便膿血肛門如刀之割此腸潰也人參一兩金銀花二兩山藥一兩生甘草三錢薏仁一兩玄參一兩白朮一兩山羊血研末一錢水煎調服十劑愈泄毒至神湯治小腸生癰左足不伸痛不可忍金銀花一兩茯苓一兩薏仁一兩生甘草三錢車前子三錢劉寄奴三錢澤瀉三錢肉桂一分水煎服六劑愈內化丹治小腸生癰足不屈而痛在左不可手按金銀花四兩當歸二兩車前子五錢生甘草三錢茯苓一兩薏仁一兩水煎服十劑愈三真湯仲景張真君傳治大小腸癰俱神效地榆一斤水十碗煎三碗再用生甘草二兩金銀花一兩同煎一碗服一劑服完則消不須兩服也救腸敗毒至聖丹岐天師傳治大小腸癰金銀花八兩煎水二碗當歸三兩地榆一兩薏仁五錢水十餘碗煎二碗同金銀花分作二服上午一服臨睡一服二劑愈腸癰必須內消而火邪甚急而甚大非杯水可救必須大劑始效然大劑敗毒恐傷元氣惟金銀花敗毒而又補陰故可重用也若少少用之反無效矣花草湯雷真君傳治癰疽初起生甘草五錢金銀花三兩當歸一兩玄參五錢天花粉三錢白礬一錢附子一片水煎服初起者一劑即消腫起者二劑即消又方孫真君方治背癰初起兼治各癰白礬一兩金銀花三兩水煎服一劑即消臀癰臀之上乃足太陽膀胱之所屬也本經多血少氣而臀上尤氣之難周到者也故不生癰則已一生癰則肉必大疼以氣少不及運動耳故初起即宜用補氣以生血而佐之化毒去火之品癰自易散倘不補其氣而專攻火毒則氣虛而血耗火毒雖去而肌肉內空轉難收口也倘癰少向胯骨之間近於環跳承扶之穴者又足少陽之部位也足少陽為少血多氣之府似與足太陽相反然補中用攻則二經相同兼補氣血而佐之化毒去火未嘗不共建奇功也木蓮散癰湯巫真君傳治臀癰神效生黃耆五錢當歸五錢木蓮三個豨薟一錢蒼耳子一錢紫花地丁五錢生地三錢玄參三錢牽牛一錢柴胡一錢赤芍二錢水煎服服二劑即散如已潰者此方不可服照背癰方法治之
